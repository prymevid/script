name: Generate English Exam PNG

on:
  workflow_dispatch:
    inputs:
      q: { description: 'Question text', required: true, type: string }
      a: { description: 'Option A', required: true, type: string }
      b: { description: 'Option B', required: true, type: string }
      c: { description: 'Option C', required: false, type: string, default: '' }
      d: { description: 'Option D', required: false, type: string, default: '' }
      x: { description: 'Question number/ID', required: true, type: string }

jobs:
  generate-png:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Generate exam question PNG
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          node --input-type=commonjs - <<'NODE'
          (async () => {
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');

          // Output directory
          const OUT_DIR = 'english-exam-output';
          fs.mkdirSync(OUT_DIR, { recursive: true });

          // Input values
          const q = {
            id: process.env.INPUT_X || '1',
            text: process.env.INPUT_Q || '',
            opts: {
              a: process.env.INPUT_A,
              b: process.env.INPUT_B,
              c: process.env.INPUT_C,
              d: process.env.INPUT_D
            }
          };
          const num = parseInt(q.id) || 1;
          const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          // ----- Fisher-Yates shuffle (used for icons & decorative elements) -----
          function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
          }

          // ----- Load icon images and convert to base64 -----
          const iconSize = 44; // Single dimension (square)
          const iconLetters = ['a', 'b', 'c', 'd'];
          const shuffledIconLetters = shuffleArray(iconLetters);
          // shuffledIconLetters maps: index 0 -> icon for 1st option, index 1 -> icon for 2nd option, etc.
          const iconBase64 = {};
          for (const letter of iconLetters) {
            const iconPath = path.join('icon', `${letter}.png`);
            if (fs.existsSync(iconPath)) {
              const buf = fs.readFileSync(iconPath);
              const resized = await sharp(buf).resize(iconSize, iconSize).png().toBuffer();
              iconBase64[letter] = `data:image/png;base64,${resized.toString('base64')}`;
            } else {
              console.warn(`Icon missing: ${iconPath}, using fallback letter.`);
              iconBase64[letter] = null;
            }
          }

          // ----- Academic color palettes (15) -----
          const STYLES = [
            { n: 'navy',        g1: '#1E3A8A', g2: '#3B82F6', card: '#FFFFFF', opts: ['#2563EB','#7C3AED','#DC2626','#059669'] },
            { n: 'crimson',     g1: '#991B1B', g2: '#DC2626', card: '#FEF2F2', opts: ['#B91C1C','#EA580C','#D97706','#B45309'] },
            { n: 'forest',      g1: '#065F46', g2: '#10B981', card: '#ECFDF5', opts: ['#047857','#059669','#34D399','#6EE7B7'] },
            { n: 'plum',        g1: '#4C1D95', g2: '#8B5CF6', card: '#F5F3FF', opts: ['#6D28D9','#7C3AED','#A78BFA','#C4B5FD'] },
            { n: 'slate',       g1: '#334155', g2: '#64748B', card: '#F8FAFC', opts: ['#475569','#94A3B8','#CBD5E1','#E2E8F0'] },
            { n: 'midnight',    g1: '#0F172A', g2: '#1E293B', card: '#0B1120', opts: ['#6366F1','#8B5CF6','#A855F7','#C084FC'], dark: true },
            { n: 'gold',        g1: '#B45309', g2: '#F59E0B', card: '#FFFBEB', opts: ['#92400E','#D97706','#FBBF24','#FDE68A'] },
            { n: 'teal',        g1: '#0F766E', g2: '#14B8A6', card: '#F0FDFA', opts: ['#0D9488','#2DD4BF','#5EEAD4','#99F6E4'] },
            { n: 'rose',        g1: '#9F1239', g2: '#F43F5E', card: '#FFF1F2', opts: ['#BE123C','#E11D48','#FB7185','#FDA4AF'] },
            { n: 'amber',       g1: '#92400E', g2: '#D97706', card: '#FFFBEB', opts: ['#B45309','#F59E0B','#FBBF24','#FDE68A'] },
            { n: 'indigo',      g1: '#312E81', g2: '#6366F1', card: '#EEF2FF', opts: ['#4338CA','#4F46E5','#818CF8','#A5B4FC'] },
            { n: 'emerald',     g1: '#064E3B', g2: '#059669', card: '#ECFDF5', opts: ['#047857','#10B981','#34D399','#6EE7B7'] },
            { n: 'stone',       g1: '#44403C', g2: '#78716C', card: '#FAFAF9', opts: ['#57534E','#78716C','#A8A29E','#D6D3D1'] },
            { n: 'sky',         g1: '#0369A1', g2: '#0EA5E9', card: '#F0F9FF', opts: ['#0284C7','#38BDF8','#7DD3FC','#BAE6FD'] },
            { n: 'violet',      g1: '#4C1D95', g2: '#8B5CF6', card: '#F5F3FF', opts: ['#6D28D9','#7C3AED','#A78BFA','#C4B5FD'] }
          ];
          const style = STYLES[Math.floor(Math.random() * STYLES.length)];
          const pillR = 18 + Math.floor(Math.random() * 10);
          const cardR = 32 + Math.floor(Math.random() * 12);
          const shadow = 14 + Math.floor(Math.random() * 10);

          // ----- Adaptive text layout -----
          const estimateWidth = (t, fs) => t.length * fs * 0.56;
          function wrapText(text, maxW, fs) {
            const words = String(text).trim().split(/\s+/);
            const lines = [];
            let cur = '';
            for (const w of words) {
              const test = cur ? cur + ' ' + w : w;
              if (estimateWidth(test, fs) <= maxW) { cur = test; continue; }
              if (cur) lines.push(cur);
              if (estimateWidth(w, fs) > maxW) {
                let part = '';
                for (const ch of w) {
                  if (estimateWidth(part + ch, fs) <= maxW) part += ch;
                  else { lines.push(part); part = ch; }
                }
                cur = part;
              } else cur = w;
            }
            if (cur) lines.push(cur);
            return lines;
          }

          function buildLayout() {
            const opts = ['a','b','c','d'].filter(k => q.opts[k]).map((k) => {
              let t = String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i, '').trim();
              if (t && /^[a-z]/.test(t)) t = t.charAt(0).toUpperCase() + t.slice(1);
              return { k: k.toUpperCase(), t };
            });
            const TW = 554, OW = 440;
            let qF = 34, oF = 25;
            for (let i = 0; i < 25; i++) {
              const qL = wrapText(q.text, TW, qF);
              const qH = qL.length * qF * 1.35;
              const od = opts.map(o => {
                const lines = wrapText(o.t, OW, oF);
                const lh = oF * 1.26;
                const pillH = Math.max(72, lines.length * lh + 34);
                return { ...o, lines, lh, pillH };
              });
              const th = 90 + qH + 30 + od.reduce((s, o) => s + o.pillH, 0) + Math.max(0, od.length - 1) * 16 + 56;
              if (th <= 1180 && qL.length <= 12 && od.every(o => o.lines.length <= 8)) return { qF, oF, qL, qH, od, th };
              if (qH > 400 || qL.length > 7) qF = Math.max(20, qF - 1);
              else oF = Math.max(17, oF - 1);
            }
            const qL = wrapText(q.text, TW, 20);
            const qH = qL.length * 20 * 1.35;
            const od = opts.map(o => {
              const lines = wrapText(o.t, OW, 17);
              const lh = 17 * 1.26;
              return { ...o, lines, lh, pillH: Math.max(72, lines.length * lh + 34) };
            });
            const th = 90 + qH + 30 + od.reduce((s, o) => s + o.pillH, 0) + Math.max(0, od.length - 1) * 16 + 56;
            return { qF: 20, oF: 17, qL, qH, od, th: Math.min(th, 1200) };
          }
          const L = buildLayout();
          const top = Math.max(20, (1280 - L.th) / 2 - 20);

          // ----- Academic decorative icons (shuffled fresh each run) -----
          const icons = [
            `<g opacity="0.14" transform="translate(80, 240)"><path d="M30 0 L50 12 L70 0 L70 40 L50 52 L30 40 Z" fill="#1E3A8A"/><path d="M30 0 L50 12 L50 52 L30 40 Z" fill="#3B82F6"/><path d="M70 0 L50 12 L50 52 L70 40 Z" fill="#2563EB"/><text x="50" y="68" font-size="18" fill="${style.dark?'white':'#1E293B'}" font-weight="600" text-anchor="middle">&#128214;</text></g>`,
            `<g opacity="0.12" transform="translate(550, 950) rotate(15)"><rect x="0" y="0" width="120" height="20" rx="4" fill="#D97706"/><polygon points="120,0 140,10 120,20" fill="#FCD34D"/><polygon points="140,10 150,8 148,12" fill="#333"/></g>`,
            `<g opacity="0.13" transform="translate(480, 200)"><path d="M20 30 L60 10 L100 30 L60 40 L20 30 Z" fill="#0F172A"/><rect x="30" y="25" width="60" height="8" fill="#1E293B"/><circle cx="60" cy="38" r="4" fill="#FBBF24"/></g>`,
            `<g opacity="0.1" stroke="${style.dark?'#94A3B8':'#475569'}" stroke-width="2" transform="translate(80, 900)"><line x1="0" y1="0" x2="200" y2="0"/><line x1="0" y1="15" x2="200" y2="15"/><line x1="20" y1="0" x2="20" y2="10"/><line x1="40" y1="0" x2="40" y2="15"/><line x1="60" y1="0" x2="60" y2="10"/><line x1="80" y1="0" x2="80" y2="15"/></g>`,
            `<g opacity="0.15" transform="translate(560, 800)"><circle cx="30" cy="30" r="20" fill="#DC2626"/><path d="M30 10 Q35 0 40 10" stroke="#15803D" stroke-width="3" fill="none"/><ellipse cx="30" cy="32" rx="8" ry="4" fill="#991B1B"/></g>`
          ];
          const academicDecor = shuffleArray(icons).slice(0, 2).join('');

          const textColor = style.dark ? '#F8FAFC' : '#0F172A';
          const cardFill = style.dark ? '#0F172A' : style.card;
          const cardStroke = style.dark ? 'rgba(255,255,255,0.09)' : 'rgba(15,23,42,0.09)';
          const optionBg = style.dark ? '#111827' : '#FFFFFF';
          const optionStroke = style.dark ? '#1F2937' : '#E5E7EB';

          // Helper to generate SVG with randomized icon images per option
          function renderOptions() {
            let y = 90 + L.qH + 30;
            let s = '';
            L.od.forEach((o, i) => {
              // Pick icon from shuffled mapping (random each run)
              const iconLetter = shuffledIconLetters[i];
              const iconData = iconBase64[iconLetter];
              const col = style.opts[i % 4];
              s += `<g>`;
              s += `<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="2"/>`;
              // Icon placement: centered vertically, x=76 (same as circle center)
              const iconX = 76 - iconSize/2;
              const iconY = y + (o.pillH - iconSize)/2;
              if (iconData) {
                s += `<image x="${iconX}" y="${iconY}" width="${iconSize}" height="${iconSize}" href="${iconData}"/>`;
              } else {
                // Fallback to colored circle with letter
                s += `<circle cx="76" cy="${y+o.pillH/2}" r="22" fill="${col}"/>`;
                s += `<text x="76" y="${y+o.pillH/2+7}" font-family="Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;
              }
              const tb = o.lines.length * o.lh;
              const fb = y + (o.pillH - tb)/2 + o.lh*0.75;
              o.lines.forEach((ln, li) => {
                s += `<text x="116" y="${fb + li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`;
              });
              s += `</g>`;
              y += o.pillH + 16;
            });
            return s;
          }

          // Mode indicator badge generator (shows active style + theme at top)
          function renderModeIndicator(styleName, themeName, isActive = true) {
            const statusColor = isActive ? '#10B981' : '#6B7280';
            const statusText = isActive ? 'ACTIVE' : 'SLEEPING';
            return `
              <g transform="translate(35,12)">
                <rect x="0" y="0" width="650" height="28" rx="14" fill="${style.dark ? '#1F2937' : '#FFFFFF'}" stroke="${cardStroke}" stroke-width="1" opacity="0.95"/>
                <g transform="translate(12,4)">
                  <circle cx="6" cy="10" r="5" fill="${statusColor}"/>
                  <text x="18" y="14" font-family="Arial" font-size="11" font-weight="600" fill="${textColor}">${statusText}</text>
                </g>
                <g transform="translate(140,4)">
                  <rect x="0" y="0" width="8" height="20" rx="4" fill="${style.g1}"/>
                  <rect x="10" y="0" width="8" height="20" rx="4" fill="${style.g2}"/>
                  <text x="24" y="14" font-family="Arial" font-size="11" font-weight="600" fill="${textColor}">Style: ${styleName}</text>
                </g>
                <g transform="translate(340,4)">
                  <rect x="0" y="2" width="20" height="16" rx="3" fill="none" stroke="${style.g1}" stroke-width="2"/>
                  <text x="26" y="14" font-family="Arial" font-size="11" font-weight="600" fill="${textColor}">Design: ${themeName}</text>
                </g>
                <g transform="translate(580,4)">
                  <rect x="0" y="0" width="58" height="20" rx="10" fill="${isActive ? '#10B981' : '#6B7280'}"/>
                  <text x="29" y="14" font-family="Arial" font-size="10" font-weight="700" fill="white" text-anchor="middle">${isActive ? 'ON' : 'OFF'}</text>
                </g>
              </g>
            `;
          }

          // ----- 18 Visual Themes (8 original + 10 new SVG visual designs) -----
          const THEMES = [
          // ===== 10 NEW SVG VISUAL DESIGNS BELOW =====
            
            // 9: Glassmorphism Card
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="${shadow}" flood-opacity="0.28"/></filter><linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,${style.dark?0.15:0.65})"/><stop offset="100%" stop-color="rgba(255,255,255,${style.dark?0.05:0.25})"/></linearGradient></defs><g opacity="0.14">${academicDecor}</g>${renderModeIndicator(style.n, 'Glassmorphism', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="20" y="20" width="610" height="${L.th-40}" rx="${cardR-6}" fill="url(#glass)" stroke="rgba(255,255,255,${style.dark?0.25:0.5})" stroke-width="1.5"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)" style="filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25))"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 10: Geometric Pattern Background
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="${shadow}" flood-opacity="0.24"/></filter><pattern id="geoPattern" width="40" height="40" patternUnits="userSpaceOnUse"><polygon points="20,0 40,20 20,40 0,20" fill="none" stroke="${style.g2}" stroke-width="1" opacity="0.08"/><circle cx="20" cy="20" r="3" fill="${style.g1}" opacity="0.12"/></pattern></defs><g opacity="0.12">${academicDecor}</g>${renderModeIndicator(style.n, 'Geometric Pattern', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#geoPattern)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 11: Floating Elements Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="${shadow+2}" flood-opacity="0.32"/></filter><filter id="float"><feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.18"/></filter></defs><g opacity="0.15">${academicDecor}</g>${renderModeIndicator(style.n, 'Floating Elements', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><g filter="url(#float)"><rect x="520" y="40" width="60" height="60" rx="12" fill="${style.g1}" opacity="0.15" transform="rotate(-8)"/><rect x="50" y="${L.th-120}" width="45" height="45" rx="22" fill="${style.g2}" opacity="0.12" transform="rotate(12)"/><circle cx="580" cy="${L.th-80}" r="28" fill="${style.g1}" opacity="0.1"/></g><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)" filter="url(#float)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 12: Split Header Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="${shadow}" flood-opacity="0.2"/></filter></defs><g opacity="0.16">${academicDecor}</g>${renderModeIndicator(style.n, 'Split Header', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="0" y="0" width="650" height="110" rx="${cardR}" fill="url(#g)"/><rect x="0" y="0" width="650" height="110" rx="${cardR}" fill="url(#g)" opacity="0.9"/><rect x="40" y="18" width="140" height="48" rx="24" fill="white" opacity="0.2"/><text x="110" y="49" font-family="Arial" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text><rect x="0" y="95" width="650" height="15" fill="${cardFill}"/><rect x="0" y="95" width="650" height="3" fill="${style.g2}" opacity="0.6"/>${L.qL.map((l,i)=>`<text x="48" y="${140+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 13: Corner Accent Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="${shadow}" flood-opacity="0.26"/></filter></defs><g opacity="0.14">${academicDecor}</g>${renderModeIndicator(style.n, 'Corner Accent', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><g><path d="M0,0 L80,0 L0,80 Z" fill="url(#g)"/><text x="28" y="42" font-family="Arial" font-size="20" font-weight="800" fill="white">Q${num}</text></g><g transform="translate(650,${L.th}) rotate(180)"><path d="M0,0 L60,0 L0,60 Z" fill="url(#g)" opacity="0.7"/></g><rect x="40" y="12" width="140" height="48" rx="24" fill="url(#g)"/><text x="110" y="43" font-family="Arial" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 14: Dotted Grid Background
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="${shadow}" flood-opacity="0.22"/></filter><pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="12" cy="12" r="2" fill="${style.g2}" opacity="0.08"/></pattern></defs><g opacity="0.13">${academicDecor}</g>${renderModeIndicator(style.n, 'Dotted Grid', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#dots)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 15: Wave Header Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="${shadow}" flood-opacity="0.24"/></filter><clipPath id="waveClip"><path d="M0,0 L720,0 L720,90 Q540,110 360,95 Q180,80 0,95 Z"/></clipPath></defs><g opacity="0.15">${academicDecor}</g>${renderModeIndicator(style.n, 'Wave Header', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><g clip-path="url(#waveClip)"><rect width="650" height="120" fill="url(#g)"/><path d="M0,85 Q162,100 325,92 Q488,84 650,98 L650,120 L0,120 Z" fill="${cardFill}" opacity="0.3"/></g><rect x="40" y="15" width="140" height="48" rx="24" fill="white" opacity="0.25"/><text x="110" y="46" font-family="Arial" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${145+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 16: Card Stack Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="${shadow}" flood-opacity="0.28"/></filter></defs><g opacity="0.14">${academicDecor}</g>${renderModeIndicator(style.n, 'Card Stack', true)}<g transform="translate(35,${top+28})"><rect x="15" y="15" width="620" height="${L.th-10}" rx="${cardR}" fill="${cardFill}" opacity="0.4" filter="url(#s)"/><rect x="8" y="8" width="634" height="${L.th}" rx="${cardR}" fill="${cardFill}" opacity="0.7" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)" style="filter:drop-shadow(0 6px 16px rgba(0,0,0,0.3))"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 17: Spotlight Focus Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><radialGradient id="spotlight" cx="50%" cy="30%" r="70%"><stop offset="0%" stop-color="${style.g2}" stop-opacity="0.18"/><stop offset="100%" stop-color="${style.g1}" stop-opacity="0"/></radialGradient><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="${shadow}" flood-opacity="0.26"/></filter></defs><g opacity="0.15">${academicDecor}</g>${renderModeIndicator(style.n, 'Spotlight Focus', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#spotlight)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)" style="filter:drop-shadow(0 0 20px ${style.g2})"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`,
            
            // 18: Frame Border Design
            (style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator) => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="50%" stop-color="${style.g2}"/><stop offset="100%" stop-color="${style.g1}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="20" stdDeviation="${shadow}" flood-opacity="0.25"/></filter></defs><g opacity="0.16">${academicDecor}</g>${renderModeIndicator(style.n, 'Frame Border', true)}<g transform="translate(35,${top+28})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="8" y="8" width="634" height="${L.th-16}" rx="${cardR-6}" fill="none" stroke="url(#frameGrad)" stroke-width="3" stroke-dasharray="12,6"/><rect x="18" y="18" width="614" height="${L.th-36}" rx="${cardR-12}" fill="none" stroke="${style.g2}" stroke-width="1" opacity="0.4"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${renderOptions()}</g></svg>`
          ];

          const themeIndex = Math.floor(Math.random() * THEMES.length);
          const themeNames = ['Clean Classic', 'Premium Academic', 'Ultra Premium', 'Neon Focus', 'Bold Academic', 'Vintage Paper', 'Gradient Border', 'Minimalist', 'Glassmorphism', 'Geometric Pattern', 'Floating Elements', 'Split Header', 'Corner Accent', 'Dotted Grid', 'Wave Header', 'Card Stack', 'Spotlight Focus', 'Frame Border'];
          const svg = THEMES[themeIndex](style, L, top, pillR, cardR, shadow, textColor, cardFill, cardStroke, optionBg, optionStroke, academicDecor, renderOptions, renderModeIndicator);

          // Random background image (blurred)
          const randomId = Math.floor(Math.random() * 1084);
          const img = await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r => r.arrayBuffer());
          const bg = await sharp(Buffer.from(img))
            .resize(720, 1280, { fit: 'cover' })
            .blur(14 + Math.floor(Math.random() * 8))
            .modulate({ brightness: 0.65, saturation: 1.1 })
            .toBuffer();

          const overlay = await sharp(Buffer.from(svg)).png().toBuffer();
          const finalPng = await sharp(bg).composite([{ input: overlay }]).png().toBuffer();

          const filename = `exam_q${q.id.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}.png`;
          const outPath = path.join(OUT_DIR, filename);
          fs.writeFileSync(outPath, finalPng);

          console.log(`Generated: ${outPath}`);
          console.log(`Style: ${style.n} | Theme: ${themeNames[themeIndex]} (variant ${themeIndex + 1}/18)`);
          console.log(`Icons used from /icon/ (size: ${iconSize}px)`);
          console.log(`Icon shuffle mapping: [${shuffledIconLetters.map((l,i) => `option ${i+1} -> icon ${l}.png`).join(', ')}]`);
          })();
          NODE

      - name: Commit and push PNG
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add english-exam-output/
          git diff --staged --quiet || (git commit -m "Add English exam question PNG" && git push)
