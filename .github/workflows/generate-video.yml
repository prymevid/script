name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q: { description: 'Question text', required: true, type: string }
      a: { description: 'Option A', required: true, type: string }
      b: { description: 'Option B', required: true, type: string }
      c: { description: 'Option C', required: false, type: string, default: '' }
      d: { description: 'Option D', required: false, type: string, default: '' }
      x: { description: 'Question number/ID', required: true, type: string }

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),{execSync}=require('child_process'),sharp=require('sharp');
          const OUT='roadrules/output',TMP='roadrules/temp',MUSIC='roadrules/song';
          [OUT,TMP].forEach(d=>fs.mkdirSync(d,{recursive:true}));

          const q={id:process.env.INPUT_X||'1',text:process.env.INPUT_Q||'',opts:{a:process.env.INPUT_A,b:process.env.INPUT_B,c:process.env.INPUT_C,d:process.env.INPUT_D}};
          const num=parseInt(q.id)||1;
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- STYLES (25 palettes) ---
          const STYLES=[
            {n:'aurora',g1:'#7C3AED',g2:'#EC4899',card:'#FFFFFF',opts:['#3B82F6','#10B981','#F59E0B','#EF4444']},
            {n:'ocean',g1:'#0EA5E9',g2:'#06B6D4',card:'#F8FAFC',opts:['#0284C7','#0891B2','#0EA5E9','#38BDF8']},
            {n:'sunset',g1:'#F97316',g2:'#DC2626',card:'#FFFBEB',opts:['#EA580C','#DC2626','#F59E0B','#FB923C']},
            {n:'emerald',g1:'#059669',g2:'#10B981',card:'#F0FDF4',opts:['#047857','#059669','#10B981','#34D399']},
            {n:'midnight',g1:'#1E293B',g2:'#0F172A',card:'#0B1120',opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'],dark:true},
            {n:'road',g1:'#EAB308',g2:'#CA8A04',card:'#FFFBEB',opts:['#1F2937','#374151','#4B5563','#6B7280']},
            {n:'neon',g1:'#EC4899',g2:'#8B5CF6',card:'#18181B',opts:['#22D3EE','#A78BFA','#F472B6','#FB7185'],dark:true},
            {n:'clean',g1:'#64748B',g2:'#94A3B8',card:'#FFFFFF',opts:['#0EA5E9','#10B981','#F59E0B','#EF4444']},
            {n:'violetDream',g1:'#8B5CF6',g2:'#D946EF',card:'#FAF5FF',opts:['#7C3AED','#A855F7','#C084FC','#E879F9']},
            {n:'crimson',g1:'#BE123C',g2:'#E11D48',card:'#FFF1F2',opts:['#9F1239','#BE123C','#E11D48','#FB7185']},
            {n:'tealMint',g1:'#0D9488',g2:'#14B8A6',card:'#F0FDFA',opts:['#0F766E','#0D9488','#14B8A6','#2DD4BF']},
            {n:'graphite',g1:'#334155',g2:'#0F172A',card:'#111827',opts:['#475569','#64748B','#94A3B8','#CBD5E1'],dark:true},
            {n:'candy',g1:'#F472B6',g2:'#FB7185',card:'#FFF7FC',opts:['#EC4899','#F472B6','#FB7185','#FDA4AF']},
            {n:'lagoon',g1:'#0369A1',g2:'#0891B2',card:'#ECFEFF',opts:['#075985','#0369A1','#0284C7','#0EA5E9']},
            {n:'amberGlow',g1:'#D97706',g2:'#F59E0B',card:'#FFFBEB',opts:['#B45309','#D97706','#F59E0B','#FBBF24']},
            {n:'indigoNight',g1:'#3730A3',g2:'#4F46E5',card:'#0B0F1F',opts:['#4338CA','#4F46E5','#6366F1','#818CF8'],dark:true},
            {n:'roseGold',g1:'#E11D48',g2:'#F59E0B',card:'#FFF1F2',opts:['#BE123C','#E11D48','#F43F5E','#FB7185']},
            {n:'forest',g1:'#14532D',g2:'#15803D',card:'#F0FDF4',opts:['#166534','#15803D','#16A34A','#22C55E']},
            {n:'slateBlue',g1:'#1E293B',g2:'#4338CA',card:'#0F1224',opts:['#334155','#475569','#6366F1','#818CF8'],dark:true},
            {n:'citrus',g1:'#65A30D',g2:'#EAB308',card:'#FEFCE8',opts:['#4D7C0F','#65A30D','#84CC16','#A3E635']},
            {n:'royal',g1:'#7C3AED',g2:'#2563EB',card:'#F5F3FF',opts:['#6D28D9','#7C3AED','#8B5CF6','#A78BFA']},
            {n:'charcoal',g1:'#18181B',g2:'#27272A',card:'#09090B',opts:['#3F3F46','#52525B','#71717A','#A1A1AA'],dark:true},
            {n:'blush',g1:'#DB2777',g2:'#F472B6',card:'#FDF2F8',opts:['#BE185D','#DB2777','#EC4899','#F9A8D4']},
            {n:'deepSea',g1:'#0C4A6E',g2:'#075985',card:'#0B1929',opts:['#0369A1','#0284C7','#0EA5E9','#38BDF8'],dark:true},
            {n:'honey',g1:'#A16207',g2:'#CA8A04',card:'#FEF3C7',opts:['#92400E','#B45309','#D97706','#F59E0B']},
          ];
          const style=STYLES[Math.floor(Math.random()*STYLES.length)];
          const pillR=18+Math.floor(Math.random()*10), cardR=32+Math.floor(Math.random()*12), shadow=18+Math.floor(Math.random()*10);

          // --- ADAPTIVE TEXT ---
          const estimateWidth=(t,fs)=>t.length*fs*0.56;
          function wrapText(text,maxW,fs){const w=String(text).trim().split(/\s+/),l=[];let c='';for(const wd of w){const t=c?c+' '+wd:wd;if(estimateWidth(t,fs)<=maxW){c=t;continue}if(c)l.push(c);if(estimateWidth(wd,fs)>maxW){let p='';for(const ch of wd){if(estimateWidth(p+ch,fs)<=maxW)p+=ch;else{l.push(p);p=ch}}c=p}else c=wd}if(c)l.push(c);return l}
          function buildLayout(){
            const opts=['a','b','c','d'].filter(k=>q.opts[k]).map(k=>{
              let t = String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i,'').trim();
              if (t && /^[a-z]/.test(t)) t = t.charAt(0).toUpperCase() + t.slice(1);
              return {k:k.toUpperCase(), t};
            });
            const TW=554,OW=440; let qF=34,oF=25;
            for(let i=0;i<25;i++){
              const qL=wrapText(q.text,TW,qF), qH=qL.length*qF*1.35;
              const od=opts.map(o=>{const ls=wrapText(o.t,OW,oF),lh=oF*1.26,ph=Math.max(72,ls.length*lh+34);return{...o,lines:ls,lh,pillH:ph}});
              const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
              if(th<=1180 && qL.length<=12 && od.every(o=>o.lines.length<=8)) return{qF,oF,qL,qH,od,th};
              if(qH>400 || qL.length>7) qF=Math.max(20,qF-1); else oF=Math.max(17,oF-1);
            }
            const qL=wrapText(q.text,TW,20), qH=qL.length*20*1.35;
            const od=opts.map(o=>{const ls=wrapText(o.t,OW,17),lh=17*1.26;return{...o,lines:ls,lh,pillH:Math.max(72,ls.length*lh+34)}});
            const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
            return{qF:20,oF:17,qL,qH,od,th:Math.min(th,1200)};
          }
          const L=buildLayout(), top=Math.max(20,(1280-L.th)/2-20);
          const icons=[`<g opacity="0.13"><polygon points="30,0 70,0 100,30 100,70 70,100 30,100 0,70 0,30" fill="#DC2626" transform="translate(80,200) scale(0.9)"/><text x="130" y="262" font-size="24" fill="white" font-weight="800" text-anchor="middle">STOP</text></g>`,`<g opacity="0.12"><polygon points="50,0 100,87 0,87" fill="#EAB308" stroke="#000" stroke-width="3" transform="translate(550,900) scale(0.9)"/><text x="600" y="965" font-size="22" fill="black" font-weight="800" text-anchor="middle">!</text></g>`,`<g opacity="0.14" transform="translate(500,250)"><rect x="0" y="0" width="60" height="140" rx="12" fill="#1F2937"/><circle cx="30" cy="30" r="18" fill="#DC2626"/><circle cx="30" cy="70" r="18" fill="#EAB308"/><circle cx="30" cy="110" r="18" fill="#16A34A"/></g>`,`<g opacity="0.13" transform="translate(100,950)"><circle cx="50" cy="50" r="48" fill="white" stroke="#DC2626" stroke-width="8"/><text x="50" y="62" font-size="36" font-weight="800" fill="black" text-anchor="middle">50</text></g>`];
          const roadDecor=icons.sort(()=>0.5-Math.random()).slice(0,2).join('');

          const textColor=style.dark?'#F8FAFC':'#0F172A';
          const cardFill=style.dark?'#0F172A':style.card;
          const cardStroke=style.dark?'rgba(255,255,255,0.09)':'rgba(15,23,42,0.09)';
          const optionBg=style.dark?'#111827':'#FFFFFF';
          const optionStroke=style.dark?'#1F2937':'#E5E7EB';

          // --- THEMES (15 total - 3 original + 12 new) ---
          const THEMES = [
            // 1 CLASSIC (original)
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="${shadow}" flood-opacity="0.22"/></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="${style.dark?'#1F2937':'#F8FAFC'}" stroke="${style.dark?'#374151':'#E2E8F0'}" stroke-width="2"/><circle cx="76" cy="${y+o.pillH/2}" r="22" fill="${style.opts[i%4]}"/><text x="76" y="${y+o.pillH/2+7}" font-family="Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s})()}</g></svg>`,

            // 2 PREMIUM GLASS (original)
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}" stop-opacity="0.22"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0.06"/></linearGradient><linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="${style.dark?0.12:0.85}"/><stop offset="60%" stop-color="white" stop-opacity="0"/></linearGradient><filter id="s" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="24" stdDeviation="${shadow}" flood-opacity="${style.dark?0.55:0.18}"/></filter><filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+8}" fill="${cardFill}" stroke="${cardStroke}" stroke-width="1.4" filter="url(#s)"/><rect x="0" y="0" width="650" height="${Math.min(240, L.th*0.45)}" rx="${cardR+8}" fill="url(#sheen)"/><rect x="1" y="1" width="648" height="${L.th-2}" rx="${cardR+6}" fill="url(#gSoft)" opacity="${style.dark?0.18:0.38}"/><g transform="translate(38,-32)" filter="url(#s)"><rect width="180" height="64" rx="20" fill="url(#g)"/><rect x="2.5" y="2.5" width="175" height="59" rx="17.5" fill="none" stroke="white" stroke-opacity="0.28" stroke-width="1.5"/><text x="90" y="41" font-family="Inter,Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle" letter-spacing="1.2">Q${num}</text></g>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter,Arial" font-size="${L.qF}" font-weight="750" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const col=style.opts[i%4];s+=`<g><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+2}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="1.6"/><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+2}" fill="url(#gSoft)" opacity="0.18"/><rect x="40" y="${y}" width="7" height="${o.pillH}" rx="3.5" fill="${col}"/><circle cx="78" cy="${y+o.pillH/2}" r="24" fill="${col}" opacity="0.18" filter="url(#glow)"/><circle cx="78" cy="${y+o.pillH/2}" r="19.5" fill="${col}"/><text x="78" y="${y+o.pillH/2+6.8}" font-family="Inter,Arial" font-size="19" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="118" y="${fb+li*o.lh}" font-family="Inter,Arial" font-size="${L.oF}" fill="${textColor}" opacity="0.96">${esc(ln)}</text>`);s+=`</g>`;y+=o.pillH+16});return s})()}<rect x="44" y="${L.th-10}" width="562" height="5" rx="2.5" fill="url(#g)" opacity="0.75"/></g></svg>`,

            // 3 ULTRA PREMIUM (original)
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1280"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}" stop-opacity="0.26"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0.09"/></linearGradient><linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="${style.dark?0.19:0.94}"/><stop offset="42%" stop-color="white" stop-opacity="0.08"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient><filter id="s" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="28" stdDeviation="${shadow+4}" flood-opacity="${style.dark?0.62:0.23}"/></filter><filter id="glow"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="textDepth" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-opacity="0.22"/></filter><linearGradient id="badgeHL" x1="0%" y1="0%" x2="100%" y2="120%"><stop offset="0%" stop-color="white" stop-opacity="0.42"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+10}" fill="${cardFill}" stroke="${cardStroke}" stroke-width="2.4" filter="url(#s)"/><rect x="5" y="5" width="640" height="${L.th-10}" rx="${cardR+6}" fill="${cardFill}"/><rect x="5" y="5" width="640" height="${Math.min(285, L.th*0.53)}" rx="${cardR+6}" fill="url(#sheen)"/><rect x="6" y="6" width="638" height="${L.th-12}" rx="${cardR+5}" fill="url(#gSoft)" opacity="${style.dark?0.23:0.44}"/><rect x="10" y="10" width="630" height="${L.th-20}" rx="${cardR+2}" fill="none" stroke="${style.dark?'#fff':'#0F172A'}" stroke-opacity="${style.dark?0.07:0.09}" stroke-width="1.8"/><g transform="translate(36,-36)" filter="url(#s)"><rect width="190" height="72" rx="24" fill="url(#g)"/><rect x="3.5" y="3.5" width="183" height="65" rx="20.5" fill="url(#g)"/><rect x="4" y="4" width="182" height="64" rx="20" fill="none" stroke="white" stroke-opacity="0.38" stroke-width="3"/><rect x="8" y="8" width="174" height="56" rx="16" fill="url(#g)"/><rect x="8" y="8" width="174" height="56" rx="16" fill="url(#badgeHL)" opacity="0.65"/><text x="95" y="45" font-family="Inter,Arial" font-size="28" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2" filter="url(#textDepth)">Q${num}</text></g>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter,Arial" font-size="${L.qF}" font-weight="750" fill="${textColor}" letter-spacing="-0.18" filter="url(#textDepth)">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const col=style.opts[i%4];s+=`<g><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+4}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="2"/><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+4}" fill="url(#gSoft)" opacity="0.16"/><rect x="40" y="${y}" width="9" height="${o.pillH}" rx="4" fill="${col}"/><rect x="40" y="${y}" width="3.5" height="${o.pillH}" rx="4" fill="white" opacity="0.38"/><circle cx="78" cy="${y+o.pillH/2}" r="27" fill="#fff" opacity="0.14"/><circle cx="78" cy="${y+o.pillH/2}" r="24.5" fill="${col}" opacity="0.19" filter="url(#glow)"/><circle cx="78" cy="${y+o.pillH/2}" r="19.8" fill="${col}"/><text x="78" y="${y+o.pillH/2+7.2}" font-family="Inter,Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle" filter="url(#textDepth)">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.76;o.lines.forEach((ln,li)=>s+=`<text x="118" y="${fb+li*o.lh}" font-family="Inter,Arial" font-size="${L.oF}" fill="${textColor}" opacity="0.97" filter="url(#textDepth)">${esc(ln)}</text>`);s+=`</g>`;y+=o.pillH+16});return s})()}<rect x="44" y="${L.th-16}" width="562" height="9" rx="4.5" fill="url(#g)" opacity="0.88"/><rect x="46" y="${L.th-14}" width="558" height="2.2" rx="1.1" fill="white" opacity="0.65"/></g></svg>`,

            // 4 NEO BRUTALIST
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient></defs><rect width="720" height="1280" fill="${style.dark?'#0A0A0A':'#F3F4F6'}"/><g transform="translate(45,${top+8})"><rect width="630" height="${L.th}" rx="12" fill="${style.dark?'#111':'#000'}" opacity="0.9"/><rect x="-8" y="-8" width="630" height="${L.th}" rx="12" fill="${cardFill}" stroke="${textColor}" stroke-width="4"/></g><g transform="translate(37,${top})"><rect width="630" height="${L.th}" rx="12" fill="${cardFill}" stroke="${textColor}" stroke-width="4"/><rect x="32" y="-24" width="150" height="52" fill="url(#g)" stroke="${textColor}" stroke-width="4"/><text x="107" y="12" font-family="Arial Black" font-size="24" font-weight="900" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="36" y="${88+i*L.qF*1.32}" font-family="Arial" font-size="${L.qF}" font-weight="800" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=88+L.qH+28,s='';L.od.forEach((o,i)=>{s+=`<rect x="32" y="${y}" width="566" height="${o.pillH}" fill="white" stroke="${textColor}" stroke-width="3.5"/><rect x="32" y="${y}" width="56" height="${o.pillH}" fill="${style.opts[i%4]}" stroke="${textColor}" stroke-width="3.5"/><text x="60" y="${y+o.pillH/2+7}" font-family="Arial Black" font-size="20" font-weight="900" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="104" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" font-weight="700" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+14});return s})()}</g></svg>`,

            // 5 MINIMAL LINE
