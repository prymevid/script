name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q: { description: 'Question text', required: true, type: string }
      a: { description: 'Option A', required: true, type: string }
      b: { description: 'Option B', required: true, type: string }
      c: { description: 'Option C', required: false, type: string, default: '' }
      d: { description: 'Option D', required: false, type: string, default: '' }
      x: { description: 'Question number/ID', required: true, type: string }

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');

          const OUT = 'roadrules/output', TMP = 'roadrules/temp', MUSIC = 'roadrules/song', DUR = 5;
          [OUT, TMP].forEach(d => fs.mkdirSync(d, { recursive: true }));

          const q = {
            id: process.env.INPUT_X || '1',
            text: process.env.INPUT_Q || '',
            opts: { a: process.env.INPUT_A, b: process.env.INPUT_B, c: process.env.INPUT_C, d: process.env.INPUT_D }
          };
          const num = parseInt(q.id) || 1;
          const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- ADAPTIVE TEXT ENGINE ---
          const estimateWidth = (text, fontSize) => text.length * fontSize * 0.55;
          function wrapText(text, maxWidth, fontSize) {
            const words = String(text).trim().split(/\s+/);
            const lines = []; let cur = '';
            for (const w of words) {
              const test = cur? cur + ' ' + w : w;
              if (estimateWidth(test, fontSize) <= maxWidth) { cur = test; continue; }
              if (cur) lines.push(cur);
              if (estimateWidth(w, fontSize) > maxWidth) {
                let part = '';
                for (const ch of w) {
                  if (estimateWidth(part+ch, fontSize) <= maxWidth) part += ch;
                  else { lines.push(part); part = ch; }
                }
                cur = part;
              } else cur = w;
            }
            if (cur) lines.push(cur);
            return lines;
          }

          function buildLayout() {
            const opts = ['a','b','c','d'].filter(k=>q.opts[k]).map(k=>({
              k: k.toUpperCase(),
              t: String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i,'').trim()
            }));
            const TEXT_W = 554, OPT_W = 440;
            let qFont = 34, oFont = 25;

            for (let i=0; i<15; i++) {
              const qLines = wrapText(q.text, TEXT_W, qFont);
              const qH = qLines.length * qFont * 1.35;
              const optData = opts.map(o=>{
                const lines = wrapText(o.t, OPT_W, oFont);
                const lh = oFont * 1.22;
                const pillH = Math.max(68, lines.length * lh + 28);
                return {...o, lines, lh, pillH};
              });
              const totalH = 90 + qH + 30 + optData.reduce((s,o)=>s+o.pillH,0) + (optData.length-1)*14 + 50;
              if (totalH <= 1060 && qLines.length <= 10 && optData.every(o=>o.lines.length<=5)) {
                return { qFont, oFont, qLines, qH, optData, totalH };
              }
              if (qH > 380 || qLines.length > 8) qFont = Math.max(22, qFont-1);
              else oFont = Math.max(18, oFont-1);
            }
            // final fallback
            const qLines = wrapText(q.text, TEXT_W, 22);
            return { qFont:22, oFont:18, qLines, qH: qLines.length*30, optData:[], totalH:900 };
          }

          const layout = buildLayout();
          const top = (1280 - layout.totalH) / 2 - 20;
          const colors = {A:'#3B82F6',B:'#10B981',C:'#F59E0B',D:'#EF4444'};

          let svg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">`;
          svg += `<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#EC4899"/></linearGradient><filter id="sh"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-opacity="0.18"/></filter></defs>`;
          svg += `<g transform="translate(35,${top})">`;
          svg += `<rect width="650" height="${layout.totalH}" rx="36" fill="white" filter="url(#sh)"/>`;
          svg += `<rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/>`;
          svg += `<text x="120" y="10" font-family="Arial,Helvetica" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>`;

          layout.qLines.forEach((l,i)=>{
            svg += `<text x="48" y="${90 + i*layout.qFont*1.35}" font-family="Arial" font-size="${layout.qFont}" font-weight="700" fill="#0F172A">${esc(l)}</text>`;
          });

          let y = 90 + layout.qH + 30;
          layout.optData.forEach(o=>{
            svg += `<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="22" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>`;
            svg += `<circle cx="76" cy="${y+o.pillH/2}" r="22" fill="${colors[o.k]}"/>`;
            svg += `<text x="76" y="${y+o.pillH/2+7}" font-family="Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;
            o.lines.forEach((ln,li)=>{
              svg += `<text x="116" y="${y+24 + li*o.lh}" font-family="Arial" font-size="${layout.oFont}" fill="#1E293B">${esc(ln)}</text>`;
            });
            y += o.pillH + 14;
          });
          svg += `</g></svg>`;

          (async () => {
            const img = await fetch('https://picsum.photos/1200/2000').then(r=>r.arrayBuffer());
            const bg = await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(18).modulate({brightness:0.65,saturation:1.1}).toBuffer();
            const overlay = await sharp(Buffer.from(svg)).png().toBuffer();
            const frame = path.join(TMP,'frame.jpg');
            await sharp(bg).composite([{input:overlay}]).jpeg({quality:92}).toFile(frame);

            let audio=null;
            if (fs.existsSync(MUSIC)) {
              const files = fs.readdirSync(MUSIC).filter(f=>/\.(mp3|m4a|wav)$/i.test(f));
              if (files.length) audio = path.join(MUSIC, files[Math.floor(Math.random()*files.length)]);
            }

            const out = path.join(OUT, `quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.mp4`);
            const args = ['-y','-loglevel','error','-loop','1','-i',frame];
            if (audio) args.push('-i',audio);
            args.push('-t',String(DUR),'-vf','format=yuv420p','-r','30','-c:v','libx264','-crf','23','-preset','veryfast');
            if (audio) args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out);
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add quiz video" && git push)
