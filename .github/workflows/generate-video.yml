            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient></defs><rect width="720" height="1280" fill="${style.dark?'#0F1115':'#FDFCFE'}"/><g transform="translate(50,${top-10})"><rect x="10" y="10" width="620" height="${L.th}" rx="30" fill="url(#g)" opacity="0.15"/><rect x="5" y="5" width="620" height="${L.th}" rx="30" fill="url(#g)" opacity="0.1"/><rect width="620" height="${L.th}" rx="30" fill="${cardFill}" stroke="${optionStroke}"/><circle cx="560" cy="34" r="26" fill="url(#g)"/><text x="560" y="42" font-family="Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle">${num}</text>${L.qL.map((l,i)=>`<text x="36" y="${80+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=80+L.qH+28,s='';L.od.forEach((o,i)=>{const col=style.opts[i%4];s+=`<rect x="32" y="${y}" width="556" height="${o.pillH}" rx="18" fill="${optionBg}" stroke="${col}" stroke-opacity="0.3" stroke-width="2"/><rect x="32" y="${y}" width="556" height="${o.pillH}" rx="18" fill="${col}" opacity="0.06"/><circle cx="66" cy="${y+o.pillH/2}" r="16" fill="${col}"/><text x="66" y="${y+o.pillH/2+5}" font-family="Arial" font-size="15" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="100" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+14});return s})()}</g></svg>`,

            // 15 LUXE GOLD
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#D4AF37"/><stop offset="50%" stop-color="#F9E79F"/><stop offset="100%" stop-color="#D4AF37"/></linearGradient></defs><rect width="720" height="1280" fill="${style.dark?'#080808':'#FFFCF8'}"/><g transform="translate(30,${top})"><rect width="660" height="${L.th}" rx="18" fill="${cardFill}" stroke="url(#gold)" stroke-width="3"/><rect x="8" y="8" width="644" height="${L.th-16}" rx="12" fill="none" stroke="${textColor}" stroke-opacity="0.08" stroke-width="1"/><rect x="42" y="-22" width="170" height="48" fill="${cardFill}" stroke="url(#gold)" stroke-width="2.5"/><text x="127" y="10" font-family="Georgia" font-size="24" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="2">Q${num}</text>${L.qL.map((l,i)=>`<text x="50" y="${84+i*L.qF*1.36}" font-family="Georgia" font-size="${L.qF+1}" font-weight="600" fill="${textColor}" letter-spacing="0.2">${esc(l)}</text>`).join('')}${(()=>{let y=84+L.qH+30,s='';L.od.forEach((o,i)=>{s+=`<rect x="46" y="${y}" width="568" height="${o.pillH}" fill="none" stroke="${textColor}" stroke-opacity="0.15" stroke-width="1"/><line x1="46" y1="${y+1}" x2="614" y2="${y+1}" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/><circle cx="82" cy="${y+o.pillH/2}" r="17" fill="none" stroke="url(#gold)" stroke-width="2"/><text x="82" y="${y+o.pillH/2+5}" font-family="Georgia" font-size="15" font-weight="700" fill="url(#gold)" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Georgia" font-size="${L.oF}" fill="${textColor}" opacity="0.92">${esc(ln)}</text>`);y+=o.pillH+16});return s})()}</g></svg>`,
          ];

          const themeIndex = Math.floor(Math.random()*THEMES.length);
          const svg = THEMES[themeIndex]();

          (async()=>{
            const randomId = Math.floor(Math.random()*1084);
            const img=await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(14+Math.floor(Math.random()*8)).modulate({brightness:0.6+Math.random()*0.12,saturation:1+Math.random()*0.2}).toBuffer();
            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const frame=path.join(TMP,'frame.png'); await sharp(bg).composite([{input:overlay}]).png().toFile(frame);
            let audio=null; if(fs.existsSync(MUSIC)){const f=fs.readdirSync(MUSIC).filter(x=>/\.(mp3|m4a|wav)$/i.test(x)); if(f.length) audio=path.join(MUSIC,f[Math.floor(Math.random()*f.length)])}
            const DUR=(4.9+Math.random()*0.6).toFixed(2), CRF=21+Math.floor(Math.random()*4), hue=(Math.random()*20-10).toFixed(1);
            const vf=`zoompan=z='min(zoom+0.0012,${(1+Math.random()*0.025).toFixed(3)})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=${(Math.random()*0.04-0.02).toFixed(3)}:saturation=${(1+Math.random()*0.1).toFixed(2)},hue=h=${hue},noise=alls=${2+Math.floor(Math.random()*3)}:allf=t+u,vignette=${(0.2+Math.random()*0.15).toFixed(2)},format=yuv420p`;
            const out=path.join(OUT,`quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${style.n}_t${themeIndex+1}_${Date.now()}.mp4`);
            const args=['-y','-loglevel','error','-loop','1','-i',frame]; if(audio)args.push('-i',audio);
            args.push('-t',DUR,'-vf',vf,'-r','30','-c:v','libx264','-crf',String(CRF),'-preset','veryfast');
            if(audio)args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out,style.n,'theme',themeIndex+1);
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add premium quiz video" && git push)
