// ══════════════════════════════════════════════════════════════════
// SEEDED RNG — unique fingerprint every run
// ══════════════════════════════════════════════════════════════════
const ENTROPY = Date.now() ^ (process.pid * 0x9e3779b9);
let _s = ENTROPY >>> 0;
const rng  = () => {
  _s = Math.imul(_s ^ (_s >>> 16), 0x45d9f3b);
  _s = Math.imul(_s ^ (_s >>> 16), 0x45d9f3b);
  _s ^= (_s >>> 16);
  return (_s >>> 0) / 4294967296;
};
const rand = (lo, hi) => lo + rng() * (hi - lo);
const ri   = (lo, hi) => Math.floor(rand(lo, hi + 1));
const pick = a => a[ri(0, a.length - 1)];
const uid  = crypto.randomBytes(6).toString('hex');

