name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q: { description: 'Question text', required: true, type: string }
      a: { description: 'Option A', required: true, type: string }
      b: { description: 'Option B', required: true, type: string }
      c: { description: 'Option C', required: false, type: string, default: '' }
      d: { description: 'Option D', required: false, type: string, default: '' }
      x: { description: 'Question number/ID', required: true, type: string }

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
        with: { node-version: '20' }
            - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp

            - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),{execSync}=require('child_process'),sharp=require('sharp');
          const OUT='roadrules/output',TMP='roadrules/temp',MUSIC='roadrules/song';
          [OUT,TMP].forEach(d=>fs.mkdirSync(d,{recursive:true}));

          const q={id:process.env.INPUT_X||'1',text:process.env.INPUT_Q||'',opts:{a:process.env.INPUT_A,b:process.env.INPUT_B,c:process.env.INPUT_C,d:process.env.INPUT_D}};
          const num=parseInt(q.id)||1;
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- STYLES (15 palettes) ---
          const STYLES=[
            {n:'aurora',g1:'#7C3AED',g2:'#EC4899',card:'#FFFFFF',opts:['#3B82F6','#10B981','#F59E0B','#EF4444']},
            {n:'ocean',g1:'#0EA5E9',g2:'#06B6D4',card:'#F8FAFC',opts:['#0284C7','#0891B2','#0EA5E9','#38BDF8']},
            {n:'sunset',g1:'#F97316',g2:'#DC2626',card:'#FFFBEB',opts:['#EA580C','#DC2626','#F59E0B','#FB923C']},
            {n:'emerald',g1:'#059669',g2:'#10B981',card:'#F0FDF4',opts:['#047857','#059669','#10B981','#34D399']},
            {n:'midnight',g1:'#1E293B',g2:'#0F172A',card:'#0B1120',opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'],dark:true},
            {n:'road',g1:'#EAB308',g2:'#CA8A04',card:'#FFFBEB',opts:['#1F2937','#374151','#4B5563','#6B7280']},
            {n:'neon',g1:'#EC4899',g2:'#8B5CF6',card:'#18181B',opts:['#22D3EE','#A78BFA','#F472B6','#FB7185'],dark:true},
            {n:'clean',g1:'#64748B',g2:'#94A3B8',card:'#FFFFFF',opts:['#0EA5E9','#10B981','#F59E0B','#EF4444']},
            {n:'coral',g1:'#F43F5E',g2:'#FB7185',card:'#FFF1F2',opts:['#E11D48','#F43F5E','#FB7185','#FDA4AF']},
            {n:'violet',g1:'#7C3AED',g2:'#A78BFA',card:'#F5F3FF',opts:['#6D28D9','#7C3AED','#8B5CF6','#A78BFA']},
            {n:'arctic',g1:'#0891B2',g2:'#22D3EE',card:'#ECFEFF',opts:['#0E7490','#0891B2','#06B6D4','#22D3EE']},
            {n:'forest',g1:'#166534',g2:'#22C55E',card:'#F0FDF4',opts:['#14532D','#166534','#16A34A','#22C55E']},
            {n:'graphite',g1:'#334155',g2:'#0F172A',card:'#0B1220',opts:['#475569','#64748B','#94A3B8','#CBD5E1'],dark:true},
            {n:'peach',g1:'#EA580C',g2:'#FDBA74',card:'#FFF7ED',opts:['#C2410C','#EA580C','#F97316','#FB923C']},
            {n:'royal',g1:'#4338CA',g2:'#818CF8',card:'#EEF2FF',opts:['#3730A3','#4338CA','#6366F1','#818CF8']},
          ];
          const style=STYLES[Math.floor(Math.random()*STYLES.length)];
          const pillR=18+Math.floor(Math.random()*10), cardR=32+Math.floor(Math.random()*12), shadow=18+Math.floor(Math.random()*10);

          // --- ADAPTIVE TEXT ---
          const estimateWidth=(t,fs)=>t.length*fs*0.56;
          function wrapText(text,maxW,fs){const w=String(text).trim().split(/\s+/),l=[];let c='';for(const wd of w){const t=c?c+' '+wd:wd;if(estimateWidth(t,fs)<=maxW){c=t;continue}if(c)l.push(c);if(estimateWidth(wd,fs)>maxW){let p='';for(const ch of wd){if(estimateWidth(p+ch,fs)<=maxW)p+=ch;else{l.push(p);p=ch}}c=p}else c=wd}if(c)l.push(c);return l}
          function buildLayout(){
            const opts=['a','b','c','d'].filter(k=>q.opts[k]).map(k=>{
              let t = String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i,'').trim();
              if (t && /^[a-z]/.test(t)) { t = t.charAt(0).toUpperCase() + t.slice(1); }
              return {k:k.toUpperCase(), t};
            });
            const TW=554,OW=440; let qF=34,oF=25;
            for(let i=0;i<25;i++){
              const qL=wrapText(q.text,TW,qF), qH=qL.length*qF*1.35;
              const od=opts.map(o=>{const ls=wrapText(o.t,OW,oF),lh=oF*1.26,ph=Math.max(72,ls.length*lh+34);return{...o,lines:ls,lh,pillH:ph}});
              const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
              if(th<=1180 && qL.length<=12 && od.every(o=>o.lines.length<=8)) return{qF,oF,qL,qH,od,th};
              if(qH>400 || qL.length>7) qF=Math.max(20,qF-1); else oF=Math.max(17,oF-1);
            }
            const qL=wrapText(q.text,TW,20), qH=qL.length*20*1.35;
            const od=opts.map(o=>{const ls=wrapText(o.t,OW,17),lh=17*1.26;return{...o,lines:ls,lh,pillH:Math.max(72,ls.length*lh+34)}});
            const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
            return{qF:20,oF:17,qL,qH,od,th:Math.min(th,1200)};
          }
          const L=buildLayout(), top=Math.max(20,(1280-L.th)/2-20);
          const icons=[`<g opacity="0.13"><polygon points="30,0 70,0 100,30 100,70 70,100 30,100 0,70 0,30" fill="#DC2626" transform="translate(80,200) scale(0.9)"/><text x="130" y="262" font-size="24" fill="white" font-weight="800" text-anchor="middle">STOP</text></g>`,`<g opacity="0.12"><polygon points="50,0 100,87 0,87" fill="#EAB308" stroke="#000" stroke-width="3" transform="translate(550,900) scale(0.9)"/><text x="600" y="965" font-size="22" fill="black" font-weight="800" text-anchor="middle">!</text></g>`,`<g opacity="0.14" transform="translate(500,250)"><rect x="0" y="0" width="60" height="140" rx="12" fill="#1F2937"/><circle cx="30" cy="30" r="18" fill="#DC2626"/><circle cx="30" cy="70" r="18" fill="#EAB308"/><circle cx="30" cy="110" r="18" fill="#16A34A"/></g>`,`<g opacity="0.13" transform="translate(100,950)"><circle cx="50" cy="50" r="48" fill="white" stroke="#DC2626" stroke-width="8"/><text x="50" y="62" font-size="36" font-weight="800" fill="black" text-anchor="middle">50</text></g>`];
          const roadDecor=icons.sort(()=>0.5-Math.random()).slice(0,2).join('');

          const textColor=style.dark?'#F8FAFC':'#0F172A';
          const cardFill=style.dark?'#0F172A':style.card;
          const cardStroke=style.dark?'rgba(255,255,0.09)':'rgba(15,23,42,0.09)';
          const optionBg=style.dark?'#111827':'#FFFFFF';
          const optionStroke=style.dark?'#1F2937':'#E5E7EB';

          // --- 8 THEMES (visual structure identical) ---
          const THEMES = [
            // 1 CLASSIC
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="${shadow}" flood-opacity="0.22"/></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/><rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/><text x="120" y="10" font-family="Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="${style.dark?'#1F2937':'#F8FAFC'}" stroke="${style.dark?'#374151':'#E2E8F0'}" stroke-width="2"/><circle cx="76" cy="${y+o.pillH/2}" r="22" fill="${style.opts[i%4]}"/><text x="76" y="${y+o.pillH/2+7}" font-family="Arial" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 2 PREMIUM GLASS
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}" stop-opacity="0.22"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0.06"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="24" stdDeviation="${shadow}" flood-opacity="${style.dark?0.55:0.18}"/></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+8}" fill="${cardFill}" stroke="${cardStroke}" stroke-width="1.4" filter="url(#s)"/><g transform="translate(38,-32)"><rect width="180" height="64" rx="20" fill="url(#g)"/><text x="90" y="41" font-family="Inter,Arial" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text></g>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter,Arial" font-size="${L.qF}" font-weight="750" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+2}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="1.6"/><rect x="40" y="${y}" width="7" height="${o.pillH}" rx="3.5" fill="${c}"/><circle cx="78" cy="${y+o.pillH/2}" r="19.5" fill="${c}"/><text x="78" y="${y+o.pillH/2+6.8}" font-family="Inter" font-size="19" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="118" y="${fb+li*o.lh}" font-family="Inter" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 3 ULTRA PREMIUM
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}" stop-opacity="0.26"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0.09"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="28" stdDeviation="${shadow+4}" flood-opacity="${style.dark?0.62:0.23}"/></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+10}" fill="${cardFill}" stroke="${cardStroke}" stroke-width="2.4" filter="url(#s)"/><rect x="6" y="6" width="638" height="${L.th-12}" rx="${cardR+5}" fill="url(#gSoft)" opacity="${style.dark?0.23:0.44}"/><g transform="translate(36,-36)"><rect width="190" height="72" rx="24" fill="url(#g)"/><text x="95" y="45" font-family="Inter" font-size="28" font-weight="800" fill="white" text-anchor="middle">Q${num}</text></g>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter" font-size="${L.qF}" font-weight="750" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+4}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="2"/><rect x="40" y="${y}" width="9" height="${o.pillH}" rx="4" fill="${c}"/><circle cx="78" cy="${y+o.pillH/2}" r="19.8" fill="${c}"/><text x="78" y="${y+o.pillH/2+7.2}" font-family="Inter" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.76;o.lines.forEach((ln,li)=>s+=`<text x="118" y="${fb+li*o.lh}" font-family="Inter" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 4 BRUTALIST POP
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect x="12" y="12" width="650" height="${L.th}" rx="${cardR-8}" fill="#000" opacity="0.85"/><rect width="650" height="${L.th}" rx="${cardR-8}" fill="${cardFill}" stroke="#000" stroke-width="6"/><rect x="38" y="-30" width="170" height="60" rx="14" fill="url(#g)" stroke="#000" stroke-width="5"/><text x="123" y="10" font-family="Arial Black" font-size="28" font-weight="900" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Arial Black" font-size="${L.qF}" font-weight="800" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="46" y="${y+6}" width="570" height="${o.pillH}" rx="${pillR-4}" fill="#000" opacity="0.9"/><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR-4}" fill="${optionBg}" stroke="#000" stroke-width="5"/><rect x="40" y="${y}" width="8" height="${o.pillH}" fill="${c}"/><circle cx="78" cy="${y+o.pillH/2}" r="23" fill="${c}" stroke="#000" stroke-width="4"/><text x="78" y="${y+o.pillH/2+7}" font-family="Arial Black" font-size="20" font-weight="900" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="118" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" font-weight="700" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+18});return s;})()}</g></svg>`,
            // 5 MINIMAL LINE
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient></defs><g opacity="0.14">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" stroke="${cardStroke}" stroke-width="1.2"/><line x1="48" y1="64" x2="602" y2="64" stroke="url(#g)" stroke-width="3"/><circle cx="62" cy="-6" r="22" fill="none" stroke="url(#g)" stroke-width="3"/><text x="62" y="0" font-family="Inter" font-size="18" font-weight="700" fill="${style.g1}" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter" font-size="${L.qF}" font-weight="600" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="none" stroke="${optionStroke}" stroke-width="1.4"/><circle cx="78" cy="${y+o.pillH/2}" r="18" fill="none" stroke="${c}" stroke-width="2.5"/><text x="78" y="${y+o.pillH/2+5.5}" font-family="Inter" font-size="15" font-weight="700" fill="${c}" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Inter" font-size="${L.oF}" fill="${textColor}" opacity="0.92">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 6 FLOAT ORB GLASS
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="b"><feGaussianBlur stdDeviation="28"/></filter><filter id="s"><feDropShadow dx="0" dy="18" stdDeviation="${shadow}" flood-opacity="0.22"/></filter></defs><g opacity="0.22"><circle cx="180" cy="300" r="140" fill="${style.g1}" filter="url(#b)" opacity="0.5"/><circle cx="560" cy="420" r="110" fill="${style.g2}" filter="url(#b)" opacity="0.45"/></g><g opacity="0.16">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+6}" fill="${style.dark?'rgba(15,23,42,0.72)':'rgba(255,255,255,0.68)'}" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" filter="url(#s)"/><rect x="40" y="-26" width="150" height="52" rx="26" fill="url(#g)"/><text x="115" y="9" font-family="Inter" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="${style.dark?'rgba(0,0.25)':'rgba(255,0.55)'}" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/><circle cx="78" cy="${y+o.pillH/2}" r="21" fill="${c}"/><text x="78" y="${y+o.pillH/2+6.5}" font-family="Inter" font-size="18" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Inter" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 7 RETRO GRID
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="${style.dark?'rgba(255,255,255,0.08)':'rgba(0,0,0.06)'}" stroke-width="1"/></pattern></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="22" fill="${cardFill}"/><rect x="8" y="8" width="634" height="${L.th-16}" rx="16" fill="url(#grid)" opacity="0.5"/><rect x="0" y="0" width="650" height="8" fill="url(#g)"/><rect x="40" y="-24" width="140" height="48" rx="8" fill="#111" stroke="${style.g1}" stroke-width="2"/><text x="110" y="8" font-family="Courier New" font-size="22" font-weight="700" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Courier New" font-size="${L.qF-1}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="10" fill="${optionBg}" stroke="${c}" stroke-width="2.5" stroke-dasharray="4 4"/><rect x="48" y="${y+8}" width="44" height="${o.pillH-16}" rx="6" fill="${c}"/><text x="70" y="${y+o.pillH/2+6}" font-family="Courier New" font-size="18" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="108" y="${fb+li*o.lh}" font-family="Courier New" font-size="${L.oF-1}" fill="${textColor}">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`,
            // 8 NEON SIGN
            ()=>`<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="nglow"><feGaussianBlur stdDeviation="6"/></filter><filter id="s"><feDropShadow dx="0" dy="16" stdDeviation="20" flood-opacity="0.5"/></filter></defs><g opacity="0.2">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR}" fill="#050507" stroke="url(#g)" stroke-width="2.5" filter="url(#s)"/><g transform="translate(42,-28)"><rect width="160" height="56" rx="28" fill="#0A0A0F" stroke="url(#g)" stroke-width="2"/><text x="80" y="36" font-family="Inter" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text></g>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Inter" font-size="${L.qF}" font-weight="700" fill="#E5E7EB">${esc(l)}</text>`).join('')}${(()=>{let y=90+L.qH+30,s='';L.od.forEach((o,i)=>{const c=style.opts[i%4];s+=`<rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="#0B0B12" stroke="${c}" stroke-width="1.8"/><circle cx="78" cy="${y+o.pillH/2}" r="20" fill="none" stroke="${c}" stroke-width="2.2"/><text x="78" y="${y+o.pillH/2+6}" font-family="Inter" font-size="17" font-weight="800" fill="${c}" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Inter" font-size="${L.oF}" fill="#D1D5DB">${esc(ln)}</text>`);y+=o.pillH+16});return s;})()}</g></svg>`
          ];

          const themeIndex = Math.floor(Math.random()*THEMES.length);
          const svg = THEMES[themeIndex]();

          (async()=>{
            const randomId = Math.floor(Math.random()*1084);
            const img=await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(14+Math.floor(Math.random()*8)).modulate({brightness:0.6+Math.random()*0.12,saturation:1+Math.random()*0.2}).toBuffer();
            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const frame=path.join(TMP,'frame.png'); await sharp(bg).composite([{input:overlay}]).png().toFile(frame);
            let audio=null; if(fs.existsSync(MUSIC)){const f=fs.readdirSync(MUSIC).filter(x=>/\.(mp3|m4a|wav)$/i.test(x)); if(f.length) audio=path.join(MUSIC,f[Math.floor(Math.random()*f.length)])}
            const DUR=(4.9+Math.random()*0.6).toFixed(2), CRF=21+Math.floor(Math.random()*4), hue=(Math.random()*20-10).toFixed(1);
            const vf=`zoompan=z='min(zoom+0.0012,${(1+Math.random()*0.025).toFixed(3)})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=${(Math.random()*0.04-0.02).toFixed(3)}:saturation=${(1+Math.random()*0.1).toFixed(2)},hue=h=${hue},noise=alls=${2+Math.floor(Math.random()*3)}:allf=t+u,vignette=${(0.2+Math.random()*0.15).toFixed(2)},format=yuv420p`;
            const out=path.join(OUT,`quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.mp4`);
            const args=['-y','-loglevel','error','-loop','1','-i',frame]; if(audio)args.push('-i',audio);
            args.push('-t',DUR,'-vf',vf,'-r','30','-c:v','libx264','-crf',String(CRF),'-preset','veryfast');
            if(audio)args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out,style.n,'theme',themeIndex+1);
          })();
          NODE

            - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add premium quiz video" && git push)
