name: Generate Question Video

on:
  workflow_dispatch:
    inputs:
      q:
        description: 'Question text'
        required: true
      a:
        description: 'Option A'
        required: true
      b:
        description: 'Option B'
        required: true
      c:
        description: 'Option C'
        required: false
      d:
        description: 'Option D'
        required: false
      x:
        description: 'Video ID / Filename'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create Question JSON
        working-directory: roadrules
        run: |
          echo '[{
            "id": "${{ github.event.inputs.x }}",
            "text": "${{ github.event.inputs.q }}",
            "a": "${{ github.event.inputs.a }}",
            "b": "${{ github.event.inputs.b }}",
            "c": "${{ github.event.inputs.c }}",
            "d": "${{ github.event.inputs.d }}"
          }]' > amategeko.json

      - name: Run Video Generator
        working-directory: roadrules
        run: node video.js

      - name: Commit and Push Video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Generate video ${{ github.event.inputs.x }}" && git push)
