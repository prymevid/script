            // THEME 15: ROUNDED TAGS (centered layout)
            ()=>{
              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gSoft" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}" stop-opacity="0.12"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0.04"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="${shadow}" flood-opacity="0.2"/></filter></defs><g opacity="0.18">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+12}" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR+12}" fill="url(#gSoft)"/><rect x="265" y="-28" width="120" height="56" rx="28" fill="url(#g)"/><text x="325" y="10" font-family="Arial" font-size="24" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>${L.qL.map((l,i)=>`<text x="325" y="${90+i*L.qF*1.35}" font-family="Arial" font-size="${L.qF}" font-weight="700" fill="${textColor}" text-anchor="middle">${esc(l)}</text>`).join('')}${(() => {let y=90+L.qH+34, s=''; L.od.forEach((o,i)=>{const col=style.opts[i%4]; const tw=Math.min(540, o.lines.reduce((m,ln)=>Math.max(m,estimateWidth(ln,L.oF)),0)+140); const sx=(650-tw)/2; s+=`<g><rect x="${sx}" y="${y}" width="${tw}" height="${o.pillH}" rx="${pillR+8}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="1.5"/><rect x="${sx}" y="${y}" width="${tw}" height="${o.pillH}" rx="${pillR+8}" fill="${col}" opacity="0.06"/><circle cx="${sx+30}" cy="${y+o.pillH/2}" r="18" fill="${col}"/><text x="${sx+30}" y="${y+o.pillH/2+6.5}" font-family="Arial" font-size="17" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="${sx+60}" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);s+=`</g>`;y+=o.pillH+16}); return s;})()}</g></svg>`;
            }
          ];

          const themeNames=['classic','glass','ultrapremium','minimalist','boldbadge','softbubble','darkluxury','outlined','dividers','numbersq','splitheader','accentdots','innerframe','topbar','roundedtags'];
          const themeIndex = Math.floor(Math.random()*THEMES.length);
          const svg = THEMES[themeIndex]();

          (async()=>{
            const randomId = Math.floor(Math.random()*1084);
            const img=await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(14+Math.floor(Math.random()*8)).modulate({brightness:0.6+Math.random()*0.12,saturation:1+Math.random()*0.2}).toBuffer();
            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const frame=path.join(TMP,'frame.png'); await sharp(bg).composite([{input:overlay}]).png().toFile(frame);
            let audio=null; if(fs.existsSync(MUSIC)){const f=fs.readdirSync(MUSIC).filter(x=>/\.(mp3|m4a|wav)$/i.test(x)); if(f.length) audio=path.join(MUSIC,f[Math.floor(Math.random()*f.length)])}
            const DUR=(4.9+Math.random()*0.6).toFixed(2), CRF=21+Math.floor(Math.random()*4), hue=(Math.random()*20-10).toFixed(1);
            const vf=`zoompan=z='min(zoom+0.0012,${(1+Math.random()*0.025).toFixed(3)})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=${(Math.random()*0.04-0.02).toFixed(3)}:saturation=${(1+Math.random()*0.1).toFixed(2)},hue=h=${hue},noise=alls=${2+Math.floor(Math.random()*3)}:allf=t+u,vignette=${(0.2+Math.random()*0.15).toFixed(2)},format=yuv420p`;
            const themeName=themeNames[themeIndex];
            const out=path.join(OUT,`quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${themeName}_${style.n}_${Date.now()}.mp4`);
            const args=['-y','-loglevel','error','-loop','1','-i',frame]; if(audio)args.push('-i',audio);
            args.push('-t',DUR,'-vf',vf,'-r','30','-c:v','libx264','-crf',String(CRF),'-preset','veryfast');
            if(audio)args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out,'style:',style.n,'theme:',themeName);
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add premium quiz video" && git push)
