name: Generate Styled Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npm list --depth=0

      - name: Create temporary folder
        run: |
          mkdir -p temporary
          ls -la

      - name: Run image generator
        id: generate
        env:
          CLOUDFLARE_API_TOKEN: "cfat_Uw96scgogunXsMcU4I3Q29kZ9fhfmPQOvysmNXxj2ea0d871"
          CLOUDFLARE_ACCOUNT_ID: "0d0a0a287282172b39fb04d9334d8346"
        run: |
          echo "Starting image generation..."
          node generate-image.js "${{ github.event.inputs.prompt }}"
          echo "Exit code: $?"
          ls -la temporary/
          echo "::set-output name=files::$(ls temporary/ | wc -l)"

      - name: Check if image was created
        run: |
          if [ -z "$(ls -A temporary/)" ]; then
            echo "⚠️ WARNING: No files found in temporary folder"
            exit 1
          else
            echo "✅ Files found:"
            ls -la temporary/
          fi

      - name: Commit and push images
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add temporary/
          git status
          git diff --staged --quiet || (git commit -m "Add generated images" && git push)
