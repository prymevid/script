name: Generate Simple Image

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch form-data

      - name: Generate image
        env:
          CLOUDFLARE_API_TOKEN: "cfat_WoW652tCPKPL4FqAruBnYHaf01eC7upAXWAeQ8Y6b42cb6a5"
          CLOUDFLARE_ACCOUNT_ID: "b5ac16e609bbc6c43bbecd81f7bc6bd7"
        run: |
          node generate-simple-image.js "${{ github.event.inputs.prompt }}"

      - name: Commit and push image
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add temporary/
          git diff --staged --quiet || (git commit -m "Add generated image" && git push)
