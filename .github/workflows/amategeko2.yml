name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q:
        description: 'Question text'
        required: true
        type: string
      a:
        description: 'Option A'
        required: true
        type: string
      b:
        description: 'Option B'
        required: true
        type: string
      c:
        description: 'Option C'
        required: false
        type: string
        default: ''
      d:
        description: 'Option D'
        required: false
        type: string
        default: ''
      x:
        description: 'Question number/ID'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          TEMP_JS="temp_$(date +%s)_$RANDOM.js"

          cat > "$TEMP_JS" << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');

          const TOGGLES = {
            SHOW_QUESTION_PREFIX: true,
            USE_EXTERNAL_AUDIO: true,
            CONVERT_TO_UPPERCASE: true,
            ENABLE_TEXT_STROKE: false,
            ENABLE_TEXT_SHADOW: false,
            SHOW_OPTION_LETTERS: false
          };

          const PREFIX_CONFIG = {
            PREFIX_TEXT: "Q",
            SEPARATOR: ".",
            SPACE_AFTER_SEPARATOR: " ",
            INCLUDE_NUMBER: true,
            START_NUMBER: 1,
            PREFIX_FONT_SIZE: 26,
            PREFIX_COLOR: "black",
            PREFIX_BOLD: false,
            SAME_LINE_AS_QUESTION: true
          };

          const DURATION_CONFIG = {
            FIXED_DURATION: 5,
            MIN_DURATION: 5,
            MAX_DURATION: 15
          };

          const TEXT_CONFIG = {
            FONT: 'roadrules/fonts/popb.ttf',
            FONT_SIZE: 36,
            TITLE_FONT_SIZE: 26,
            OPTION_FONT_SIZE: 26,
            FONT_COLOR: 'black',
            LINE_SPACING: 20,               // space between lines inside a block
            LINE_WIDTHS: {
              QUESTION: 42,
              OPTION: 42,
              PREFIX: 10
            },
            TEXT_Y_OFFSET: -25,            // overall vertical shift (negative = up)
            PARAGRAPH_MARGINS: {
              // Pixel gaps between blocks (can be decimals like 0.2, 3.5)
              BETWEEN_QUESTION_AND_OPTIONS: 20,   // gap after question
              BETWEEN_OPTIONS: 10                  // gap between answers
            },
            ALIGNMENT: {
              MODE: 'left',
              LEFT_MARGIN: 30,
              RIGHT_MARGIN: 10
            },
            STROKE: { COLOR: 'black', WIDTH: 1 },
            SHADOW: { COLOR: 'black@0.5', X: 2, Y: 2 },
            LABEL: {
              ENABLED: true,
              COLOR: 'white',
              OPACITY: 1.0
            }
          };

          const DIR_CONFIG = {
            MUSIC_DIR: 'roadrules/song',
            OUTPUT_DIR: 'roadrules/output',
            TEMP_DIR: 'roadrules/temp'
          };

          const PROCESSING_CONFIG = {
            AUDIO_EXTENSIONS: ['.mp3', '.m4a', '.wav'],
            MAX_RETRIES: 3,
            RETRY_DELAY: 2000
          };

          const FFMPEG_CONFIG = {
            VIDEO_CODEC: 'libx264',
            AUDIO_CODEC: 'aac',
            LOGLEVEL: 'error',
            CRF: 28,
            PRESET: 'slow',
            AUDIO_BITRATE: '128k',
            FASTSTART: true,
            TUNE: null
          };

          const INSTAGRAM_CONFIG = {
            TARGET_WIDTH: 720,
            TARGET_HEIGHT: 1280,
            FRAME_RATE: 30,
            PIXEL_FORMAT: 'yuv420p'
          };

          const questionObj = {
            id: process.env.INPUT_X || '1',
            text: process.env.INPUT_Q || '',
            options: {
              a: process.env.INPUT_A || '',
              b: process.env.INPUT_B || '',
              c: process.env.INPUT_C || '',
              d: process.env.INPUT_D || ''
            }
          };

          const questionNumber = parseInt(process.env.INPUT_X) || 1;

          function applyTextCase(text) {
            return TOGGLES.CONVERT_TO_UPPERCASE ? String(text).toUpperCase() : String(text);
          }

          function formatText(text, maxWidth) {
            const words = applyTextCase(text).split(' ');
            let lines = [''];
            words.forEach(word => {
              const lastLine = lines[lines.length - 1];
              if ((lastLine + ' ' + word).length <= maxWidth) {
                lines[lines.length - 1] = (lastLine + ' ' + word).trim();
              } else {
                lines.push(word);
              }
            });
            return lines;
          }

          function formatTextWithPrefix(prefix, text, maxWidth) {
            const words = (applyTextCase(prefix) + applyTextCase(text)).split(' ');
            let lines = [''];
            words.forEach(word => {
              const lastLine = lines[lines.length - 1];
              if ((lastLine + ' ' + word).length <= maxWidth) {
                lines[lines.length - 1] = (lastLine + ' ' + word).trim();
              } else {
                lines.push(word);
              }
            });
            return lines;
          }

          // Build an array of text blocks (question then each present option)
          // Each block: { text: "full\nwrapped\nstring", lineCount: number }
          function buildTextBlocks(qObj, qNumber) {
            const blocks = [];

            // ---- Question block ----
            let prefixText = '';
            if (TOGGLES.SHOW_QUESTION_PREFIX) {
              prefixText = PREFIX_CONFIG.PREFIX_TEXT;
              if (PREFIX_CONFIG.INCLUDE_NUMBER) prefixText += qNumber;
              prefixText += PREFIX_CONFIG.SEPARATOR + PREFIX_CONFIG.SPACE_AFTER_SEPARATOR;
            }
            let questionLines;
            if (TOGGLES.SHOW_QUESTION_PREFIX && PREFIX_CONFIG.SAME_LINE_AS_QUESTION) {
              questionLines = formatTextWithPrefix(prefixText, qObj.text, TEXT_CONFIG.LINE_WIDTHS.QUESTION);
            } else {
              // Prefix on its own line first
              if (TOGGLES.SHOW_QUESTION_PREFIX) {
                const prefixLines = formatText(prefixText, TEXT_CONFIG.LINE_WIDTHS.PREFIX);
                blocks.push({
                  text: prefixLines.join('\n'),
                  lineCount: prefixLines.length
                });
              }
              questionLines = formatText(qObj.text, TEXT_CONFIG.LINE_WIDTHS.QUESTION);
            }
            blocks.push({
              text: questionLines.join('\n'),
              lineCount: questionLines.length
            });

            // ---- Option blocks ----
            const optionKeys = ['a', 'b', 'c', 'd'];
            optionKeys.forEach(key => {
              if (qObj.options[key] && qObj.options[key].trim() !== '') {
                const optionText = TOGGLES.SHOW_OPTION_LETTERS
                  ? key.toUpperCase() + '. ' + qObj.options[key]
                  : qObj.options[key];
                const wrapped = formatText(optionText, TEXT_CONFIG.LINE_WIDTHS.OPTION);
                blocks.push({
                  text: wrapped.join('\n'),
                  lineCount: wrapped.length
                });
              }
            });

            return blocks;
          }

          function escapeFilePath(filePath) {
            return "'" + filePath.replace(/'/g, "'\\''") + "'";
          }

          function getXPosition() {
            switch (TEXT_CONFIG.ALIGNMENT.MODE) {
              case 'left':  return TEXT_CONFIG.ALIGNMENT.LEFT_MARGIN;
              case 'right': return 'w-' + TEXT_CONFIG.ALIGNMENT.RIGHT_MARGIN + '-text_w';
              default:      return '(w-text_w)/2';
            }
          }

          // Height of one block in pixels
          function blockHeight(lineCount) {
            return (lineCount - 1) * TEXT_CONFIG.LINE_SPACING + TEXT_CONFIG.TITLE_FONT_SIZE;
          }

          async function run() {
            if (!questionObj.text) throw new Error('No question text provided');

            [DIR_CONFIG.OUTPUT_DIR, DIR_CONFIG.TEMP_DIR].forEach(dir => {
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            });

            const finalDuration = Math.min(
              Math.max(DURATION_CONFIG.FIXED_DURATION, DURATION_CONFIG.MIN_DURATION),
              DURATION_CONFIG.MAX_DURATION
            );
            console.log(`Video duration: ${finalDuration}s`);

            const imagePath = path.join(DIR_CONFIG.TEMP_DIR, 'background.jpg');
            await downloadRandomImage(imagePath);

            const blocks = buildTextBlocks(questionObj, questionNumber);
            if (blocks.length === 0) throw new Error('No text blocks generated');

            // Gaps: after question block use BETWEEN_QUESTION_AND_OPTIONS;
            // between options use BETWEEN_OPTIONS
            const gapAfterQuestion = TEXT_CONFIG.PARAGRAPH_MARGINS.BETWEEN_QUESTION_AND_OPTIONS;
            const gapBetweenOptions = TEXT_CONFIG.PARAGRAPH_MARGINS.BETWEEN_OPTIONS;

            // Compute total height
            let totalHeight = blockHeight(blocks[0].lineCount);
            for (let i = 1; i < blocks.length; i++) {
              const gap = (i === 1) ? gapAfterQuestion : gapBetweenOptions;
              totalHeight += gap + blockHeight(blocks[i].lineCount);
            }

            // Starting Y position (centered + offset)
            const offset = TEXT_CONFIG.TEXT_Y_OFFSET;
            const sign = offset >= 0 ? '+' : '-';
            const startY = `(h-${totalHeight})/2${sign}${Math.abs(offset)}`;

            // Write each block to a temp file and build drawtext filters
            const safeId = String(questionObj.id).replace(/[^a-zA-Z0-9]/g, '_');
            const tempTextFiles = [];
            const drawtextFilters = [];

            let currentYExpr = startY; // FFmpeg expression string, we'll update step by step using expression addition
            // To keep it simple, we'll compute absolute y expressions per block using a helper string.
            // We'll build an expression like: (h-{totalHeight})/2{sign}{absOffset}+{cumSum}
            // We'll store cumulative pixel offset and generate a constant expression.

            // We'll precompute pixel cumulative offsets as strings:
            let cumY = 0;
            let isFirstOption = true;

            // For the drawbox we need the final Y (startY) and height = totalHeight.
            // The box x: LEFT_MARGIN, w: TARGET_WIDTH - LEFT_MARGIN - RIGHT_MARGIN
            const boxX = TEXT_CONFIG.ALIGNMENT.LEFT_MARGIN;
            const boxW = INSTAGRAM_CONFIG.TARGET_WIDTH - boxX - TEXT_CONFIG.ALIGNMENT.RIGHT_MARGIN;

            for (const [i, block] of blocks.entries()) {
              // Write block to temp file
              const tempPath = path.join(DIR_CONFIG.TEMP_DIR, `text_${safeId}_${i}.txt`);
              fs.writeFileSync(tempPath, block.text, 'utf8');
              tempTextFiles.push(tempPath);

              const yExpr = `${startY}+${cumY}`;
              const enable = `:enable='between(t,0,${finalDuration})'`;

              let filter = `drawtext=textfile=${escapeFilePath(tempPath)}` +
                           `:x=${getXPosition()}` +
                           `:y=${yExpr}` +
                           `:fontfile=${TEXT_CONFIG.FONT}` +
                           `:fontsize=${TEXT_CONFIG.TITLE_FONT_SIZE}` +
                           `:fontcolor=${TEXT_CONFIG.FONT_COLOR}` +
                           `:line_spacing=${TEXT_CONFIG.LINE_SPACING - TEXT_CONFIG.TITLE_FONT_SIZE}`;

              // No individual boxes – we draw one global box later
              // Add stroke/shadow if needed
              if (TOGGLES.ENABLE_TEXT_STROKE && TEXT_CONFIG.STROKE.WIDTH > 0) {
                filter += `:borderw=${TEXT_CONFIG.STROKE.WIDTH}:bordercolor=${TEXT_CONFIG.STROKE.COLOR}`;
              }
              if (TOGGLES.ENABLE_TEXT_SHADOW && !TOGGLES.ENABLE_TEXT_STROKE) {
                filter += `:shadowx=${TEXT_CONFIG.SHADOW.X}:shadowy=${TEXT_CONFIG.SHADOW.Y}:shadowcolor=${TEXT_CONFIG.SHADOW.COLOR}`;
              }

              filter += enable;
              drawtextFilters.push(filter);

              // Update cumulative offset
              cumY += blockHeight(block.lineCount);
              if (i < blocks.length - 1) {
                const gap = (i === 0) ? gapAfterQuestion : gapBetweenOptions;
                cumY += gap;
              }
            }

            // Build filtergraph: background -> boxblur -> drawbox (global white rectangle) -> multiple drawtext
            let filterComplex = `[0:v]boxblur=5:1,format=${INSTAGRAM_CONFIG.PIXEL_FORMAT}[blurred];`;

            // Draw the global white box behind all text
            if (TEXT_CONFIG.LABEL.ENABLED) {
              filterComplex += `[blurred]drawbox=x=${boxX}:y=${startY}:w=${boxW}:h=${totalHeight}:color=${TEXT_CONFIG.LABEL.COLOR}@${TEXT_CONFIG.LABEL.OPACITY}:t=fill[boxed];`;
            } else {
              filterComplex += `[blurred]null[boxed];`;
            }

            // Chain drawtext filters
            let prevOut = 'boxed';
            for (let i = 0; i < drawtextFilters.length; i++) {
              const nextOut = (i === drawtextFilters.length - 1) ? 'vout' : `t${i}`;
              filterComplex += `[${prevOut}]${drawtextFilters[i]}[${nextOut}];`;
              prevOut = nextOut;
            }

            const tempFilePath = path.join(DIR_CONFIG.TEMP_DIR, `temp_${safeId}.mp4`);
            const outputFilename = `quiz_${safeId}_${Date.now()}.mp4`;
            const outputFilePath = path.join(DIR_CONFIG.OUTPUT_DIR, outputFilename);

            let audioSource = null;
            if (TOGGLES.USE_EXTERNAL_AUDIO) {
              audioSource = getRandomAudio();
              if (audioSource) {
                const audioDuration = getDuration(audioSource);
                console.log(`Audio: ${path.basename(audioSource)} (${audioDuration.toFixed(2)}s)`);
              }
            }

            const ffmpegArgs = ['-y', '-loglevel', FFMPEG_CONFIG.LOGLEVEL];
            ffmpegArgs.push('-loop', '1', '-i', imagePath);
            if (audioSource) ffmpegArgs.push('-i', audioSource);

            ffmpegArgs.push('-filter_complex', filterComplex);
            ffmpegArgs.push('-map', '[vout]');
            if (audioSource) {
              ffmpegArgs.push('-map', '1:a');
            } else {
              ffmpegArgs.push('-map', '0:a?');
            }
            ffmpegArgs.push(...getEncodingArgs());
            if (audioSource) {
              ffmpegArgs.push('-c:a', FFMPEG_CONFIG.AUDIO_CODEC, '-b:a', FFMPEG_CONFIG.AUDIO_BITRATE);
            } else {
              ffmpegArgs.push('-c:a', 'copy');
            }
            ffmpegArgs.push('-t', finalDuration.toString(), tempFilePath);

            console.log('Running ffmpeg...');
            try {
              execSync(`ffmpeg ${ffmpegArgs.map(a => `"${a}"`).join(' ')}`, { stdio: 'inherit' });
            } finally {
              // Cleanup temp text files and image
              for (const f of tempTextFiles) {
                if (fs.existsSync(f)) fs.unlinkSync(f);
              }
              if (fs.existsSync(imagePath)) fs.unlinkSync(imagePath);
            }

            if (!fs.existsSync(tempFilePath)) throw new Error('FFmpeg did not produce output');
            fs.renameSync(tempFilePath, outputFilePath);

            const fileSizeKB = Math.round(fs.statSync(outputFilePath).size / 1024);
            console.log(`SUCCESS: ${outputFilePath} (${fileSizeKB} KB)`);

            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${outputFilename}\n`);
            }
          }

          function getDuration(filePath) {
            try {
              const result = execSync(
                `ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "${filePath}"`
              ).toString();
              return parseFloat(result) || 10;
            } catch {
              return 10;
            }
          }

          function getEncodingArgs() {
            const args = [
              '-c:v', FFMPEG_CONFIG.VIDEO_CODEC,
              '-crf', FFMPEG_CONFIG.CRF.toString(),
              '-preset', FFMPEG_CONFIG.PRESET,
              '-r', INSTAGRAM_CONFIG.FRAME_RATE.toString()
            ];
            if (FFMPEG_CONFIG.TUNE) args.push('-tune', FFMPEG_CONFIG.TUNE);
            if (FFMPEG_CONFIG.FASTSTART) args.push('-movflags', '+faststart');
            return args;
          }

          function getRandomAudio() {
            if (!fs.existsSync(DIR_CONFIG.MUSIC_DIR)) return null;
            const audioFiles = fs.readdirSync(DIR_CONFIG.MUSIC_DIR)
              .filter(f => PROCESSING_CONFIG.AUDIO_EXTENSIONS.some(ext => f.endsWith(ext)));
            if (audioFiles.length === 0) return null;
            return path.join(DIR_CONFIG.MUSIC_DIR, audioFiles[Math.floor(Math.random() * audioFiles.length)]);
          }

          async function downloadRandomImage(destPath) {
            const url = "https://picsum.photos/1200/2000";
            console.log(`Fetching random image from ${url}`);
            
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const arrayBuffer = await response.arrayBuffer();
            const buffer = Buffer.from(arrayBuffer);

            await sharp(buffer)
              .resize(INSTAGRAM_CONFIG.TARGET_WIDTH, INSTAGRAM_CONFIG.TARGET_HEIGHT, {
                fit: "contain",
                background: { r: 0, g: 0, b: 0 }
              })
              .jpeg()
              .toFile(destPath);
          }

          run()
            .then(() => process.exit(0))
            .catch(err => { 
              console.error(err); 
              process.exit(1); 
            });
          EOF

          node "$TEMP_JS"
          rm -f "$TEMP_JS"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add quiz video" && git push)
