name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q:
        description: 'Question text'
        required: true
        type: string
      a:
        description: 'Option A'
        required: true
        type: string
      b:
        description: 'Option B'
        required: true
        type: string
      c:
        description: 'Option C'
        required: false
        type: string
        default: ''
      d:
        description: 'Option D'
        required: false
        type: string
        default: ''
      x:
        description: 'Question number/ID'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          TEMP_JS="temp_$(date +%s)_$RANDOM.js"

          cat > "$TEMP_JS" << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');

          const TOGGLES = {
            SHOW_QUESTION_PREFIX: true,
            USE_EXTERNAL_AUDIO: true,
            CONVERT_TO_UPPERCASE: true,
            ENABLE_TEXT_STROKE: false,
            ENABLE_TEXT_SHADOW: false,
            SHOW_OPTION_LETTERS: false
          };

          const PREFIX_CONFIG = {
            PREFIX_TEXT: "Q",
            SEPARATOR: ".",
            SPACE_AFTER_SEPARATOR: " ",
            INCLUDE_NUMBER: true,
            START_NUMBER: 1,
            PREFIX_FONT_SIZE: 26,
            PREFIX_COLOR: "black",
            PREFIX_BOLD: false,
            SAME_LINE_AS_QUESTION: true
          };

          const DURATION_CONFIG = {
            FIXED_DURATION: 5,
            MIN_DURATION: 5,
            MAX_DURATION: 15
          };

          const TEXT_CONFIG = {
            FONT: 'roadrules/fonts/popb.ttf',
            FONT_SIZE: 36,
            TITLE_FONT_SIZE: 26,
            OPTION_FONT_SIZE: 26,
            FONT_COLOR: 'black',
            LINE_SPACING: 20,
            LINE_WIDTHS: {
              QUESTION: 45,
              OPTION: 45,
              PREFIX: 10
            },
            TEXT_Y_OFFSET: -25,
            // Margins are now fractions of a **line height** (FONT_SIZE + LINE_SPACING).
            // 1.0 = one full line gap, 0.5 = half a line, 0.2 = a very small gap, etc.
            PARAGRAPH_MARGINS: {
              BETWEEN_QUESTION_AND_OPTIONS: 0.5,
              BETWEEN_OPTIONS: 0.5
            },
            ALIGNMENT: {
              MODE: 'left',
              LEFT_MARGIN: 30,
              RIGHT_MARGIN: 10
            },
            STROKE: { COLOR: 'black', WIDTH: 1 },
            SHADOW: { COLOR: 'black@0.5', X: 2, Y: 2 },
            LABEL: {
              ENABLED: true,
              COLOR: 'white',
              BORDER_WIDTH: 20,
              OPACITY: 1.0
            }
          };

          const DIR_CONFIG = {
            MUSIC_DIR: 'roadrules/song',
            OUTPUT_DIR: 'roadrules/output',
            TEMP_DIR: 'roadrules/temp'
          };

          const PROCESSING_CONFIG = {
            AUDIO_EXTENSIONS: ['.mp3', '.m4a', '.wav'],
            MAX_RETRIES: 3,
            RETRY_DELAY: 2000
          };

          const FFMPEG_CONFIG = {
            VIDEO_CODEC: 'libx264',
            AUDIO_CODEC: 'aac',
            LOGLEVEL: 'error',
            CRF: 28,
            PRESET: 'slow',
            AUDIO_BITRATE: '128k',
            FASTSTART: true,
            TUNE: null
          };

          const INSTAGRAM_CONFIG = {
            TARGET_WIDTH: 720,
            TARGET_HEIGHT: 1280,
            FRAME_RATE: 30,
            PIXEL_FORMAT: 'yuv420p'
          };

          const questionObj = {
            id: process.env.INPUT_X || '1',
            text: process.env.INPUT_Q || '',
            options: {
              a: process.env.INPUT_A || '',
              b: process.env.INPUT_B || '',
              c: process.env.INPUT_C || '',
              d: process.env.INPUT_D || ''
            }
          };

          const questionNumber = parseInt(process.env.INPUT_X) || 1;

          function applyTextCase(text) {
            return TOGGLES.CONVERT_TO_UPPERCASE ? String(text).toUpperCase() : String(text);
          }

          function formatText(text, maxWidth) {
            const words = applyTextCase(text).split(' ');
            let lines = [''];
            words.forEach(word => {
              const lastLine = lines[lines.length - 1];
              if ((lastLine + ' ' + word).length <= maxWidth) {
                lines[lines.length - 1] = (lastLine + ' ' + word).trim();
              } else {
                lines.push(word);
              }
            });
            return lines;
          }

          function formatTextWithPrefix(prefix, text, maxWidth) {
            const full = applyTextCase(prefix) + applyTextCase(text);
            return formatText(full, maxWidth);
          }

          // Returns an array of block objects: { text: string (multiline), numLines: number, fontsize: number }
          function buildTextBlocks(qObj, qNumber) {
            const blocks = [];
            const questionFontSize = TEXT_CONFIG.TITLE_FONT_SIZE;
            const optionFontSize = TEXT_CONFIG.OPTION_FONT_SIZE;
            const questionMaxWidth = TEXT_CONFIG.LINE_WIDTHS.QUESTION;
            const optionMaxWidth = TEXT_CONFIG.LINE_WIDTHS.OPTION;

            // --- Question block ---
            let questionLines;
            if (TOGGLES.SHOW_QUESTION_PREFIX && PREFIX_CONFIG.SAME_LINE_AS_QUESTION) {
              let prefix = PREFIX_CONFIG.PREFIX_TEXT;
              if (PREFIX_CONFIG.INCLUDE_NUMBER) prefix += qNumber;
              prefix += PREFIX_CONFIG.SEPARATOR + PREFIX_CONFIG.SPACE_AFTER_SEPARATOR;
              questionLines = formatTextWithPrefix(prefix, qObj.text, questionMaxWidth);
            } else {
              if (TOGGLES.SHOW_QUESTION_PREFIX) {
                let prefix = PREFIX_CONFIG.PREFIX_TEXT;
                if (PREFIX_CONFIG.INCLUDE_NUMBER) prefix += qNumber;
                prefix += PREFIX_CONFIG.SEPARATOR + PREFIX_CONFIG.SPACE_AFTER_SEPARATOR;
                questionLines = formatText(prefix, TEXT_CONFIG.LINE_WIDTHS.PREFIX);
                questionLines = questionLines.concat(formatText(qObj.text, questionMaxWidth));
              } else {
                questionLines = formatText(qObj.text, questionMaxWidth);
              }
            }
            blocks.push({
              text: questionLines.join('\n'),
              numLines: questionLines.length,
              fontsize: questionFontSize
            });

            // --- Option blocks ---
            const optionKeys = ['a', 'b', 'c', 'd'];
            optionKeys.forEach(key => {
              const opt = qObj.options[key];
              if (opt) {
                const optText = TOGGLES.SHOW_OPTION_LETTERS
                  ? key.toUpperCase() + '. ' + opt
                  : opt;
                const lines = formatText(optText, optionMaxWidth);
                blocks.push({
                  text: lines.join('\n'),
                  numLines: lines.length,
                  fontsize: optionFontSize
                });
              }
            });

            return blocks;
          }

          // Height of a text block = numLines * fontsize + (numLines-1) * line_spacing
          function calcBlockHeight(numLines, fontsize, lineSpacing) {
            return numLines * fontsize + (numLines - 1) * lineSpacing;
          }

          // Escape path for FFmpeg filters
          function escapeFilePath(filePath) {
            return "'" + filePath.replace(/'/g, "'\\''") + "'";
          }

          // X position for left/right/center alignment
          function getXPosition() {
            switch (TEXT_CONFIG.ALIGNMENT.MODE) {
              case 'left':  return TEXT_CONFIG.ALIGNMENT.LEFT_MARGIN;
              case 'right': return 'w-' + TEXT_CONFIG.ALIGNMENT.RIGHT_MARGIN + '-text_w';
              default:      return '(w-text_w)/2';
            }
          }

          // Builds a drawtext filter for **one block** with a known Y position
          function buildDrawTextFilter(textFile, fontsize, yExpr, duration) {
            let filter = `drawtext=textfile=${escapeFilePath(textFile)}` +
                         `:x=${getXPosition()}` +
                         `:y=${yExpr}` +
                         `:fontfile=${TEXT_CONFIG.FONT}` +
                         `:fontsize=${fontsize}` +
                         `:fontcolor=${TEXT_CONFIG.FONT_COLOR}` +
                         `:line_spacing=${TEXT_CONFIG.LINE_SPACING}`;

            if (TEXT_CONFIG.LABEL.ENABLED) {
              filter += `:box=1:boxcolor=${TEXT_CONFIG.LABEL.COLOR}@${TEXT_CONFIG.LABEL.OPACITY}:boxborderw=${TEXT_CONFIG.LABEL.BORDER_WIDTH}`;
            }

            if (TOGGLES.ENABLE_TEXT_STROKE && TEXT_CONFIG.STROKE.WIDTH > 0) {
              filter += `:borderw=${TEXT_CONFIG.STROKE.WIDTH}:bordercolor=${TEXT_CONFIG.STROKE.COLOR}`;
            }
            if (TOGGLES.ENABLE_TEXT_SHADOW && !TOGGLES.ENABLE_TEXT_STROKE) {
              filter += `:shadowx=${TEXT_CONFIG.SHADOW.X}:shadowy=${TEXT_CONFIG.SHADOW.Y}:shadowcolor=${TEXT_CONFIG.SHADOW.COLOR}`;
            }

            filter += `:enable='between(t,0,${duration})'`;
            return filter;
          }

          function getDuration(filePath) {
            try {
              const result = execSync(
                `ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "${filePath}"`
              ).toString();
              return parseFloat(result) || 10;
            } catch {
              return 10;
            }
          }

          function getEncodingArgs() {
            const args = [
              '-c:v', FFMPEG_CONFIG.VIDEO_CODEC,
              '-crf', FFMPEG_CONFIG.CRF.toString(),
              '-preset', FFMPEG_CONFIG.PRESET,
              '-r', INSTAGRAM_CONFIG.FRAME_RATE.toString()
            ];
            if (FFMPEG_CONFIG.TUNE) args.push('-tune', FFMPEG_CONFIG.TUNE);
            if (FFMPEG_CONFIG.FASTSTART) args.push('-movflags', '+faststart');
            return args;
          }

          function getRandomAudio() {
            if (!fs.existsSync(DIR_CONFIG.MUSIC_DIR)) return null;
            const audioFiles = fs.readdirSync(DIR_CONFIG.MUSIC_DIR)
              .filter(f => PROCESSING_CONFIG.AUDIO_EXTENSIONS.some(ext => f.endsWith(ext)));
            if (audioFiles.length === 0) return null;
            return path.join(DIR_CONFIG.MUSIC_DIR, audioFiles[Math.floor(Math.random() * audioFiles.length)]);
          }

          async function downloadRandomImage(destPath) {
            const url = "https://picsum.photos/1200/2000";
            console.log(`Fetching random image from ${url}`);

            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            const arrayBuffer = await response.arrayBuffer();
            const buffer = Buffer.from(arrayBuffer);

            await sharp(buffer)
              .resize(INSTAGRAM_CONFIG.TARGET_WIDTH, INSTAGRAM_CONFIG.TARGET_HEIGHT, {
                fit: "contain",
                background: { r: 0, g: 0, b: 0 }
              })
              .jpeg()
              .toFile(destPath);
          }

          async function run() {
            if (!questionObj.text) throw new Error('No question text provided');

            [DIR_CONFIG.OUTPUT_DIR, DIR_CONFIG.TEMP_DIR].forEach(dir => {
              if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            });

            const finalDuration = Math.min(
              Math.max(DURATION_CONFIG.FIXED_DURATION, DURATION_CONFIG.MIN_DURATION),
              DURATION_CONFIG.MAX_DURATION
            );
            console.log(`Video duration: ${finalDuration}s`);

            const imagePath = path.join(DIR_CONFIG.TEMP_DIR, 'background.jpg');
            await downloadRandomImage(imagePath);

            const blocks = buildTextBlocks(questionObj, questionNumber);
            console.log('Text blocks:', blocks.map(b => `${b.numLines} lines, fontsize=${b.fontsize}`));

            // Calculate heights and positions
            const lineSpacing = TEXT_CONFIG.LINE_SPACING;
            const marginQtoOpt = TEXT_CONFIG.PARAGRAPH_MARGINS.BETWEEN_QUESTION_AND_OPTIONS;
            const marginOpts = TEXT_CONFIG.PARAGRAPH_MARGINS.BETWEEN_OPTIONS;

            // Base unit for margins: one line height = fontsize + lineSpacing (using the average fontsize? We'll use the fontsize of the preceding block)
            // To keep it simple, we define the base unit as the fontsize + lineSpacing of the block before the gap.
            // For gap after question block (fontsize = question font), for gap after option blocks (option font).
            const questionBaseUnit = TEXT_CONFIG.TITLE_FONT_SIZE + lineSpacing;
            const optionBaseUnit = TEXT_CONFIG.OPTION_FONT_SIZE + lineSpacing;

            let totalHeight = 0;
            const blockHeights = blocks.map((block, idx) => {
              const h = calcBlockHeight(block.numLines, block.fontsize, lineSpacing);
              if (idx === 0) {
                totalHeight += h;
              } else {
                // gap before this option block
                if (idx === 1) {
                  totalHeight += marginQtoOpt * questionBaseUnit;
                } else {
                  totalHeight += marginOpts * optionBaseUnit;
                }
                totalHeight += h;
              }
              return h;
            });

            const offset = TEXT_CONFIG.TEXT_Y_OFFSET;
            const sign = offset >= 0 ? '+' : '-';
            // Start Y for the first block
            const startY = `(h-${totalHeight})/2${sign}${Math.abs(offset)}`;

            // Build an array of Y expressions for each block
            const yExpressions = [];
            let currentY = startY;
            blocks.forEach((block, i) => {
              yExpressions.push(currentY);
              if (i < blocks.length - 1) {
                const gapUnit = (i === 0) ? marginQtoOpt * questionBaseUnit : marginOpts * optionBaseUnit;
                currentY = `${currentY}+${blockHeights[i]}+${gapUnit}`;
              }
            });

            // Write each block to a temporary text file
            const safeId = String(questionObj.id).replace(/[^a-zA-Z0-9]/g, '_');
            const textFiles = [];
            blocks.forEach((block, i) => {
              const filePath = path.join(DIR_CONFIG.TEMP_DIR, `text_${safeId}_${i}.txt`);
              fs.writeFileSync(filePath, block.text, 'utf8');
              textFiles.push({ filePath, fontsize: block.fontsize, yExpr: yExpressions[i] });
            });

            // Build filter chains: [blurred] drawtext1 [v1]; [v1] drawtext2 [v2]; ...
            let filterComplex = `[0:v]boxblur=5:1,format=${INSTAGRAM_CONFIG.PIXEL_FORMAT}[blurred]`;
            let previousLabel = 'blurred';
            textFiles.forEach((tf, idx) => {
              const nextLabel = (idx === textFiles.length - 1) ? 'vout' : `v${idx}`;
              const filterStr = buildDrawTextFilter(tf.filePath, tf.fontsize, tf.yExpr, finalDuration);
              filterComplex += `;[${previousLabel}]${filterStr}[${nextLabel}]`;
              previousLabel = nextLabel;
            });

            const tempFilePath = path.join(DIR_CONFIG.TEMP_DIR, `temp_${safeId}.mp4`);
            const outputFilename = `quiz_${safeId}_${Date.now()}.mp4`;
            const outputFilePath = path.join(DIR_CONFIG.OUTPUT_DIR, outputFilename);

            let audioSource = null;
            let audioDuration = null;
            if (TOGGLES.USE_EXTERNAL_AUDIO) {
              audioSource = getRandomAudio();
              if (audioSource) {
                audioDuration = getDuration(audioSource);
                console.log(`Audio: ${path.basename(audioSource)} (${audioDuration.toFixed(2)}s)`);
              }
            }

            const ffmpegArgs = ['-y', '-loglevel', FFMPEG_CONFIG.LOGLEVEL];
            ffmpegArgs.push('-loop', '1', '-i', imagePath);
            if (audioSource) ffmpegArgs.push('-i', audioSource);

            ffmpegArgs.push('-filter_complex', filterComplex);
            ffmpegArgs.push('-map', '[vout]');
            if (audioSource) {
              ffmpegArgs.push('-map', '1:a');
            } else {
              ffmpegArgs.push('-map', '0:a?');
            }
            ffmpegArgs.push(...getEncodingArgs());
            if (audioSource) {
              ffmpegArgs.push('-c:a', FFMPEG_CONFIG.AUDIO_CODEC, '-b:a', FFMPEG_CONFIG.AUDIO_BITRATE);
            } else {
              ffmpegArgs.push('-c:a', 'copy');
            }
            ffmpegArgs.push('-t', finalDuration.toString(), tempFilePath);

            console.log('Running ffmpeg...');
            try {
              execSync(`ffmpeg ${ffmpegArgs.map(a => `"${a}"`).join(' ')}`, { stdio: 'inherit' });
            } finally {
              // Clean up temporary text files and background image
              textFiles.forEach(tf => {
                if (fs.existsSync(tf.filePath)) fs.unlinkSync(tf.filePath);
              });
              if (fs.existsSync(imagePath)) fs.unlinkSync(imagePath);
            }

            if (!fs.existsSync(tempFilePath)) throw new Error('FFmpeg did not produce output');
            fs.renameSync(tempFilePath, outputFilePath);

            const fileSizeKB = Math.round(fs.statSync(outputFilePath).size / 1024);
            console.log(`SUCCESS: ${outputFilePath} (${fileSizeKB} KB)`);

            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${outputFilename}\n`);
            }
          }

          run()
            .then(() => process.exit(0))
            .catch(err => {
              console.error(err);
              process.exit(1);
            });
          EOF

          node "$TEMP_JS"
          rm -f "$TEMP_JS"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add quiz video" && git push)
