name: Amategeko yumuhanda 2

on:
  workflow_dispatch:
    inputs:
      q:
        description: 'Question text'
        required: true
        type: string
      a:
        description: 'Option A'
        required: true
        type: string
      b:
        description: 'Option B'
        required: true
        type: string
      c:
        description: 'Option C'
        required: false
        type: string
        default: ''
      d:
        description: 'Option D'
        required: false
        type: string
        default: ''
      x:
        description: 'Question number/ID'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          TEMP_JS="temp_$(date +%s)_$RANDOM.js"

          cat > "$TEMP_JS" << 'ENDSCRIPT'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');

          // ═══════════════════════════════════════════════
          // FEATURE TOGGLES
          // ═══════════════════════════════════════════════
          const TOGGLES = {
            SHOW_QUESTION_PREFIX: true,
            USE_EXTERNAL_AUDIO: true,
            CONVERT_TO_UPPERCASE: true,
            ENABLE_TEXT_STROKE: false,
            ENABLE_TEXT_SHADOW: false,
            SHOW_OPTION_LETTERS: true
          };

          // ═══════════════════════════════════════════════
          // PREFIX (example: "Q1. ")
          // ═══════════════════════════════════════════════
          const PREFIX_CONFIG = {
            PREFIX_TEXT: "Q",
            SEPARATOR: ".",
            SPACE_AFTER_SEPARATOR: " ",
            INCLUDE_NUMBER: true,
            SAME_LINE_AS_QUESTION: true
          };

          // ═══════════════════════════════════════════════
          // VIDEO LENGTH
          // ═══════════════════════════════════════════════
          const DURATION_CONFIG = {
            FIXED_DURATION: 5,
            MIN_DURATION: 5,
            MAX_DURATION: 15
          };

          // ═══════════════════════════════════════════════
          // TEXT STYLE (constant font size, tight spacing)
          // ═══════════════════════════════════════════════
          const FONT_FILE = 'roadrules/fonts/popb.ttf';
          const FONT_SIZE = 26;                     // never changes
          const FONT_COLOR = 'black';
          const LINE_SPACING = FONT_SIZE;           // tightest possible
          const MAX_CHARS_PER_LINE = 42;            // constant width for all text

          // ═══════════════════════════════════════════════
          // SPACING (pixels, NOT full line‑heights)
          // ═══════════════════════════════════════════════
          const GAP_AFTER_QUESTION = 20;             // small space after question block
          const GAP_BETWEEN_OPTIONS = 12;            // even smaller space between options

          // ═══════════════════════════════════════════════
          // LABEL (white background box behind text)
          // ═══════════════════════════════════════════════
          const LABEL_CONFIG = {
            ENABLED: true,
            COLOR: 'white',
            BORDER_WIDTH: 13,
            OPACITY: 1.0
          };

          // ═══════════════════════════════════════════════
          // DIRECTORIES & AUDIO
          // ═══════════════════════════════════════════════
          const DIR_CONFIG = {
            MUSIC_DIR: 'roadrules/song',
            OUTPUT_DIR: 'roadrules/output',
            TEMP_DIR: 'roadrules/temp'
          };
          const AUDIO_EXTENSIONS = ['.mp3', '.m4a', '.wav'];

          // ═══════════════════════════════════════════════
          // INSTAGRAM OUTPUT SIZE
          // ═══════════════════════════════════════════════
          const TARGET_WIDTH = 720;
          const TARGET_HEIGHT = 1280;

          // ═══════════════════════════════════════════════
          // INPUT DATA
          // ═══════════════════════════════════════════════
          const questionObj = {
            id: process.env.INPUT_X || '1',
            text: process.env.INPUT_Q || '',
            options: {
              a: process.env.INPUT_A || '',
              b: process.env.INPUT_B || '',
              c: process.env.INPUT_C || '',
              d: process.env.INPUT_D || ''
            }
          };
          const questionNumber = parseInt(process.env.INPUT_X) || 1;

          // ═══════════════════════════════════════════════
          // UPPERCASE HELPER
          // ═══════════════════════════════════════════════
          function applyCase(text) {
            return TOGGLES.CONVERT_TO_UPPERCASE ? text.toUpperCase() : text;
          }

          // ═══════════════════════════════════════════════
          // TEXT WRAPPING (constant character width)
          // ═══════════════════════════════════════════════
          function wrapText(text, maxChars) {
            const words = applyCase(text).split(' ');
            const lines = [];
            let currentLine = '';
            for (const word of words) {
              const testLine = currentLine ? currentLine + ' ' + word : word;
              if (testLine.length <= maxChars) {
                currentLine = testLine;
              } else {
                if (currentLine) lines.push(currentLine);
                currentLine = word;
                // extra‑long single word handling
                while (currentLine.length > maxChars) {
                  lines.push(currentLine.substr(0, maxChars));
                  currentLine = currentLine.substr(maxChars);
                }
              }
            }
            if (currentLine) lines.push(currentLine);
            return lines;
          }

          // ═══════════════════════════════════════════════
          // BUILD QUESTION BLOCK (prefix + text)
          // ═══════════════════════════════════════════════
          function buildQuestionBlock() {
            let fullText = '';
            if (TOGGLES.SHOW_QUESTION_PREFIX) {
              let prefix = PREFIX_CONFIG.PREFIX_TEXT;
              if (PREFIX_CONFIG.INCLUDE_NUMBER) prefix += questionNumber;
              prefix += PREFIX_CONFIG.SEPARATOR + PREFIX_CONFIG.SPACE_AFTER_SEPARATOR;
              if (PREFIX_CONFIG.SAME_LINE_AS_QUESTION) {
                fullText = prefix + questionObj.text;
              } else {
                // not used here, keep simple
                fullText = prefix + questionObj.text;
              }
            } else {
              fullText = questionObj.text;
            }
            return wrapText(fullText, MAX_CHARS_PER_LINE);
          }

          // ═══════════════════════════════════════════════
          // BUILD OPTION BLOCK (with optional letter)
          // ═══════════════════════════════════════════════
          function buildOptionBlock(optionText, letter) {
            const prefix = TOGGLES.SHOW_OPTION_LETTERS ? letter + '. ' : '';
            return wrapText(prefix + optionText, MAX_CHARS_PER_LINE);
          }

          // ═══════════════════════════════════════════════
          // CALCULATE BLOCK HEIGHT (lines * font_size)
          // ═══════════════════════════════════════════════
          function blockHeight(lines) {
            return lines.length * FONT_SIZE;
          }

          // ═══════════════════════════════════════════════
          // ESCAPE PATH FOR FFMPEG FILTER GRAPH
          // ═══════════════════════════════════════════════
          function escapeFilterPath(p) {
            return p.replace(/\\/g, '/').replace(/:/g, '\\:').replace(/'/g, "'\\''");
          }

          // ═══════════════════════════════════════════════
          // BUILD drawtext FILTER FOR A TEXT FILE
          // ═══════════════════════════════════════════════
          function drawtextFilter(textFilePath, yPos) {
            let filter = `drawtext=textfile='${escapeFilterPath(textFilePath)}'` +
                         `:x=(w-text_w)/2` +
                         `:y=${yPos}` +
                         `:fontfile=${FONT_FILE}` +
                         `:fontsize=${FONT_SIZE}` +
                         `:fontcolor=${FONT_COLOR}` +
                         `:line_spacing=${LINE_SPACING}`;

            if (LABEL_CONFIG.ENABLED) {
              filter += `:box=1:boxcolor=${LABEL_CONFIG.COLOR}@${LABEL_CONFIG.OPACITY}:boxborderw=${LABEL_CONFIG.BORDER_WIDTH}`;
            }
            if (TOGGLES.ENABLE_TEXT_STROKE) {
              filter += `:borderw=1:bordercolor=black`;
            }
            if (TOGGLES.ENABLE_TEXT_SHADOW && !TOGGLES.ENABLE_TEXT_STROKE) {
              filter += `:shadowx=2:shadowy=2:shadowcolor=black@0.5`;
            }
            return filter;
          }

          // ═══════════════════════════════════════════════
          // RANDOM AUDIO FROM MUSIC_DIR
          // ═══════════════════════════════════════════════
          function getRandomAudio() {
            if (!fs.existsSync(DIR_CONFIG.MUSIC_DIR)) return null;
            const files = fs.readdirSync(DIR_CONFIG.MUSIC_DIR)
              .filter(f => AUDIO_EXTENSIONS.some(ext => f.toLowerCase().endsWith(ext)));
            if (files.length === 0) return null;
            return path.join(DIR_CONFIG.MUSIC_DIR, files[Math.floor(Math.random() * files.length)]);
          }

          // ═══════════════════════════════════════════════
          // DOWNLOAD A RANDOM BACKGROUND IMAGE
          // ═══════════════════════════════════════════════
          async function downloadRandomImage(destPath) {
            console.log('Fetching random image...');
            const response = await fetch('https://picsum.photos/1200/2000');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const buffer = Buffer.from(await response.arrayBuffer());
            await sharp(buffer)
              .resize(TARGET_WIDTH, TARGET_HEIGHT, { fit: 'contain', background: { r: 0, g: 0, b: 0 } })
              .jpeg()
              .toFile(destPath);
          }

          // ═══════════════════════════════════════════════
          // GET AUDIO DURATION
          // ═══════════════════════════════════════════════
          function getDuration(filePath) {
            try {
              const cmd = `ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "${filePath}"`;
              return parseFloat(execSync(cmd).toString().trim()) || 10;
            } catch { return 10; }
          }

          // ═══════════════════════════════════════════════
          // MAIN
          // ═══════════════════════════════════════════════
          async function main() {
            if (!questionObj.text) throw new Error('No question text');

            // ensure directories exist
            for (const d of [DIR_CONFIG.OUTPUT_DIR, DIR_CONFIG.TEMP_DIR]) {
              if (!fs.existsSync(d)) fs.mkdirSync(d, { recursive: true });
            }

            // 1. build all text blocks
            const questionLines = buildQuestionBlock();
            const optionLetters = ['A', 'B', 'C', 'D'];
            const optionBlocks = optionLetters
              .map((letter, idx) => {
                const key = ['a', 'b', 'c', 'd'][idx];
                const txt = questionObj.options[key];
                return txt ? { letter, lines: buildOptionBlock(txt, letter) } : null;
              })
              .filter(Boolean);

            if (optionBlocks.length === 0) throw new Error('At least one option required');

            // 2. calculate total height and starting Y
            let totalHeight = blockHeight(questionLines);
            totalHeight += GAP_AFTER_QUESTION;
            for (let i = 0; i < optionBlocks.length; i++) {
              totalHeight += blockHeight(optionBlocks[i].lines);
              if (i < optionBlocks.length - 1) totalHeight += GAP_BETWEEN_OPTIONS;
            }
            const startY = Math.max(0, Math.floor((TARGET_HEIGHT - totalHeight) / 2));

            // 3. write text files and build filter chain
            const tempFiles = [];
            let currentY = startY;
            const filterParts = [];

            // question block
            const qTxtFile = path.join(DIR_CONFIG.TEMP_DIR, `q_${Date.now()}_${Math.random().toString(36).substr(2,6)}.txt`);
            fs.writeFileSync(qTxtFile, questionLines.join('\n'), 'utf8');
            tempFiles.push(qTxtFile);
            filterParts.push(drawtextFilter(qTxtFile, currentY));
            currentY += blockHeight(questionLines) + GAP_AFTER_QUESTION;

            // option blocks
            for (let i = 0; i < optionBlocks.length; i++) {
              const block = optionBlocks[i];
              const optTxtFile = path.join(DIR_CONFIG.TEMP_DIR, `opt_${i}_${Date.now()}_${Math.random().toString(36).substr(2,6)}.txt`);
              fs.writeFileSync(optTxtFile, block.lines.join('\n'), 'utf8');
              tempFiles.push(optTxtFile);
              filterParts.push(drawtextFilter(optTxtFile, currentY));
              currentY += blockHeight(block.lines);
              if (i < optionBlocks.length - 1) currentY += GAP_BETWEEN_OPTIONS;
            }

            // full filter: blur background then chain all drawtext filters
            const filterComplex = `[0:v]boxblur=5:1,format=yuv420p[blurred];[blurred]${filterParts.join(',')}[vout]`;

            // 4. choose output path
            const safeId = questionObj.id.replace(/[^a-zA-Z0-9]/g, '_');
            const outputFile = path.join(DIR_CONFIG.OUTPUT_DIR, `quiz_${safeId}_${Date.now()}.mp4`);
            const tempVideo = path.join(DIR_CONFIG.TEMP_DIR, `temp_${safeId}.mp4`);

            // 5. background image
            const bgImage = path.join(DIR_CONFIG.TEMP_DIR, 'bg.jpg');
            await downloadRandomImage(bgImage);

            // 6. audio
            let audioFile = null;
            if (TOGGLES.USE_EXTERNAL_AUDIO) {
              audioFile = getRandomAudio();
              if (audioFile) console.log(`Using audio: ${path.basename(audioFile)}`);
            }

            const duration = DURATION_CONFIG.FIXED_DURATION;

            // 7. ffmpeg command
            const ffmpegArgs = [
              '-y', '-loglevel', 'error',
              '-loop', '1', '-i', bgImage
            ];
            if (audioFile) ffmpegArgs.push('-i', audioFile);

            ffmpegArgs.push(
              '-filter_complex', filterComplex,
              '-map', '[vout]',
              ...(audioFile ? ['-map', '1:a'] : []),
              '-c:v', 'libx264', '-crf', '28', '-preset', 'slow',
              '-r', '30', '-pix_fmt', 'yuv420p', '-movflags', '+faststart',
              ...(audioFile ? ['-c:a', 'aac', '-b:a', '128k'] : []),
              '-t', duration.toString(),
              tempVideo
            );

            console.log('Running ffmpeg...');
            try {
              execSync(`ffmpeg ${ffmpegArgs.map(a => `"${a}"`).join(' ')}`, { stdio: 'inherit' });
            } catch (e) {
              // ffmpeg error already printed, throw to stop
              throw e;
            } finally {
              // clean temp files
              for (const f of tempFiles) {
                if (fs.existsSync(f)) fs.unlinkSync(f);
              }
              if (fs.existsSync(bgImage)) fs.unlinkSync(bgImage);
            }

            if (!fs.existsSync(tempVideo)) throw new Error('FFmpeg did not create output');
            fs.renameSync(tempVideo, outputFile);

            const sizeKB = Math.round(fs.statSync(outputFile).size / 1024);
            console.log(`✅ Done: ${outputFile} (${sizeKB} KB)`);

            // output for GitHub Actions
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${path.basename(outputFile)}\n`);
            }
          }

          main().catch(err => {
            console.error('❌', err);
            process.exit(1);
          });
          ENDSCRIPT

          node "$TEMP_JS"
          rm -f "$TEMP_JS"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add quiz video" && git push)
