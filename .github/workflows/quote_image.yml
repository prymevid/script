name: Quote Image Generator (Sharp Engine)

on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image'
        required: true
        type: string
        default: 'Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.'
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # Sharp provides pre-built binaries, making it significantly faster to install in CI than canvas/ffmpeg
        run: npm install axios sharp

      - name: Ensure output directory exists
        run: mkdir -p englishquotes/output

      - name: Write and execute render engine
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > render_engine.js
          const axios = require('axios');
          const sharp = require('sharp');
          const fs = require('fs/promises');
          const path = require('path');

          // =============== CONFIGURATION ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          
          const CANVAS_WIDTH = 1080;
          const CANVAS_HEIGHT = 1350; // 4:5 Portrait ratio
          const PICSUM_URL = `https://picsum.photos/${CANVAS_WIDTH}/${CANVAS_HEIGHT}?random=`;
          
          // Typography & Layout Dimensions
          const FONT_FAMILY = 'Arial, Helvetica, sans-serif';
          const FONT_SIZE = 48;
          const LINE_HEIGHT = 65; // in pixels
          const BOX_PADDING = 80;
          const MAX_BOX_WIDTH = 880;
          const CHARS_PER_LINE = 36; // Approx character fit for 880px width at 48px font
          // ============= END CONFIGURATION =============

          const quote = process.env.QUOTE_TEXT || "Life is what happens when you're busy making other plans.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          /**
           * Fetches a random image from Picsum and returns the ArrayBuffer
           */
          async function fetchBackgroundImage() {
            console.log('📡 Fetching random background from Picsum...');
            const response = await axios.get(PICSUM_URL + Date.now(), { responseType: 'arraybuffer' });
            return Buffer.from(response.data);
          }

          /**
           * Wraps text into an array of lines based on approximate character counts
           */
          function wrapText(text, maxChars) {
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';

            for (const word of words) {
              if ((currentLine + word).length > maxChars) {
                lines.push(currentLine.trim());
                currentLine = word + ' ';
              } else {
                currentLine += word + ' ';
              }
            }
            if (currentLine) lines.push(currentLine.trim());
            return lines;
          }

          /**
           * Main Rendering Pipeline using Sharp
           */
          async function generateComposition() {
            const timestamp = Date.now();
            
            // 1. Fetch Background
            const bgBuffer = await fetchBackgroundImage();

            // 2. Calculate Geometry
            const lines = wrapText(quote, CHARS_PER_LINE);
            const textHeight = lines.length * LINE_HEIGHT;
            const boxHeight = textHeight + (BOX_PADDING * 2.5); // Add space for padding and top icon
            const boxX = Math.floor((CANVAS_WIDTH - MAX_BOX_WIDTH) / 2);
            const boxY = Math.floor((CANVAS_HEIGHT - boxHeight) / 2);

            console.log(`📐 Calculated Box Geometry: ${MAX_BOX_WIDTH}x${boxHeight} at (${boxX}, ${boxY})`);

            // 3. Extract the background region where the glass box will sit
            const blurredCrop = await sharp(bgBuffer)
              .extract({ left: boxX, top: boxY, width: MAX_BOX_WIDTH, height: Math.floor(boxHeight) })
              .blur(32) // 1. BLUR
              .toBuffer();

            // 4. Create SVG definitions for the Sharp compositing chain
            // 2. COLOR + TRANSPARENCY
            const tintSvg = `<svg><rect fill="#ffffff" fill-opacity="0.22" width="100%" height="100%" rx="40" ry="40"/></svg>`;
            // 4. ROUND CORNERS (Masking out the bounding box corners)
            const maskSvg = `<svg><rect fill="white" width="100%" height="100%" rx="40" ry="40"/></svg>`;

            // 5. Process the Glass Panel
            const glassPanelBuffer = await sharp(blurredCrop)
              .composite([
                // 3. APPLY TINT OVER BLUR
                { input: Buffer.from(tintSvg), blend: 'over' },
                // Mask the corners to make it transparent outside the shape
                { input: Buffer.from(maskSvg), blend: 'dest-in' }
              ])
              .png() // Force PNG to preserve the alpha channel from dest-in mask
              .toBuffer();

            // 6. Generate Vector Typography Overlay (SVG)
            // We use SVG to maintain crisp vector text over the pixel-based image
            const textCenterY = boxY + BOX_PADDING + (textHeight / 2);
            const startingY = textCenterY - ((lines.length - 1) * LINE_HEIGHT) / 2;

            const tspanElements = lines.map((line, index) => {
              return `<tspan x="${CANVAS_WIDTH / 2}" y="${startingY + (index * LINE_HEIGHT)}">${line}</tspan>`;
            }).join('');

            const overlaySvg = `
              <svg width="${CANVAS_WIDTH}" height="${CANVAS_HEIGHT}">
                <style>
                  .quote-icon { font: bold 160px serif; fill: rgba(255, 255, 255, 0.9); }
                  .quote-text { font: 500 ${FONT_SIZE}px ${FONT_FAMILY}; fill: #ffffff; }
                  .text-shadow { filter: drop-shadow(0px 4px 6px rgba(0, 0, 0, 0.4)); }
                  .footer-text { font: bold 26px ${FONT_FAMILY}; fill: rgba(255, 255, 255, 0.8); }
                </style>
                <text x="${boxX + 40}" y="${boxY + 120}" class="quote-icon">“</text>
                
                <text text-anchor="middle" dominant-baseline="middle" class="quote-text text-shadow">
                  ${tspanElements}
                </text>
                
                <text x="${CANVAS_WIDTH / 2}" y="${CANVAS_HEIGHT - 60}" text-anchor="middle" class="footer-text">www.reallygreatsite.com</text>
              </svg>
            `;

            // 7. Final Assembly
            const outputFilename = `quote_${runId}_${timestamp}.jpg`;
            const outputPath = path.join(OUTPUT_DIR, outputFilename);

            await sharp(bgBuffer)
              .composite([
                // Optional: Global darken for background contrast
                { input: Buffer.from(`<svg><rect width="${CANVAS_WIDTH}" height="${CANVAS_HEIGHT}" fill="black" fill-opacity="0.15"/></svg>`), blend: 'over' },
                // The isolated, processed glass panel
                { input: glassPanelBuffer, left: boxX, top: boxY, blend: 'over' },
                // The vector typography overlay
                { input: Buffer.from(overlaySvg), left: 0, top: 0, blend: 'over' }
              ])
              .jpeg({ quality: 95, progressive: true })
              .toFile(outputPath);

            console.log(`✅ Successfully generated Sharp visual: ${outputFilename}`);
            return outputFilename;
          }

          async function main() {
            try {
              const filename = await generateComposition();
              await fs.writeFile('output_filename.txt', filename, 'utf8');
            } catch (err) {
              console.error('❌ Critical failure during image generation:', err);
              process.exit(1);
            }
          }

          main();
          SCRIPT_EOF

          node render_engine.js
          rm -f render_engine.js

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: generated sharp glassmorphism quote image [skip ci]"
          git push

      - name: Output raw image URL
        run: |
          FILENAME=$(cat output_filename.txt)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/englishquotes/output/${FILENAME}"
          echo "RAW_URL=${RAW_URL}" >> $GITHUB_OUTPUT
          echo "✅ Asset securely pushed. Raw URL: ${RAW_URL}"
        id: output_url

    outputs:
      raw_url: ${{ steps.output_url.outputs.RAW_URL }}
