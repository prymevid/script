const axios = require('axios');
const fs = require('fs');
const { exec } = require('child_process');
const path = require('path');

// =============== CONFIGURATION ===============
const BASE_DIR = path.join(process.cwd(), 'englishquotes');
const OUTPUT_DIR = path.join(BASE_DIR, 'output');
const TEMP_DIR = path.join(BASE_DIR, 'temporary');
const FONT_FILE = path.join(process.cwd(), 'fonts', 'crimbold.ttf'); // Ensure this font exists

const IMAGE_WIDTH = 1080; // Higher res for better quality
const IMAGE_HEIGHT = 1350; // 4:5 Aspect ratio like the reference
const FONT_SIZE = 48;
const LINE_SPACING = 60;
const WEBSITE_URL = "www.reallygreatsite.com";

// Glass Box Settings
const BOX_WIDTH = 800;
const BOX_OPACITY = 0.4; // Semi-transparent
const BOX_COLOR = "black";
// ============= END CONFIGURATION =============

const quote = process.env.QUOTE_TEXT || "Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.";
const runId = process.env.RUN_ID_EXT || Date.now().toString();

async function fetchImage() {
    // Fetching high-res nature/scenic images
    const response = await axios.get(`https://picsum.photos/${IMAGE_WIDTH}/${IMAGE_HEIGHT}?blur=1`, {
        responseType: 'arraybuffer'
    });
    console.log('📸 Background image downloaded');
    return response.data;
}

function wrapText(text, maxChars) {
    const words = text.split(' ');
    let lines = [];
    let currentLine = words[0];
    words.slice(1).forEach(word => {
        if ((currentLine + ' ' + word).length < maxChars) {
            currentLine += ' ' + word;
        } else {
            lines.push(currentLine);
            currentLine = word;
        }
    });
    lines.push(currentLine);
    return lines;
}

async function processImage(imageBuffer, quoteText) {
    const timestamp = Date.now();
    const inputFile = path.join(TEMP_DIR, `input_${timestamp}.jpg`);
    const outputFilename = `quote_${runId}_${timestamp}.jpg`;
    const outputFile = path.join(OUTPUT_DIR, outputFilename);

    fs.writeFileSync(inputFile, imageBuffer);

    // Sanitize text for FFmpeg
    const safeQuote = quoteText.replace(/'/g, "\u2019").replace(/:/g, '\\:').replace(/"/g, '\\"');
    const lines = wrapText(safeQuote, 35);
    const totalTextHeight = lines.length * LINE_SPACING;
    
    // Calculate Box Height based on text (with padding)
    const boxHeight = totalTextHeight + 200;
    const boxY = `(h-${boxHeight})/2`;
    const boxX = `(w-${BOX_WIDTH})/2`;

    // 1. Filter for Image Adjustments
    const imgAdj = "eq=brightness=-0.1:contrast=1.1:saturation=1.2";

    // 2. Filter for the Glass Box
    const glassBox = `drawbox=x=${boxX}:y=${boxY}:w=${BOX_WIDTH}:h=${boxHeight}:color=${BOX_COLOR}@${BOX_OPACITY}:t=fill`;

    // 3. Filter for Quote Mark Icon (Large Unicode “)
    const quoteIcon = `drawtext=text='“':fontfile=${FONT_FILE}:fontsize=120:fontcolor=white:x=${boxX}+40:y=${boxY}+20`;

    // 4. Filter for Quote Text (Centered in box)
    const textCommands = lines.map((line, i) => {
        const yPos = `(${boxY} + 120 + ${i * LINE_SPACING})`;
        return `drawtext=text='${line}':fontfile=${FONT_FILE}:fontsize=${FONT_SIZE}:fontcolor=white:x=(w-text_w)/2:y=${yPos}`;
    }).join(',');

    // 5. Filter for Website Footer
    const footer = `drawtext=text='${WEBSITE_URL}':fontfile=${FONT_FILE}:fontsize=30:fontcolor=white@0.8:x=(w-text_w)/2:y=h-100`;

    const fullFilter = `${imgAdj},${glassBox},${quoteIcon},${textCommands},${footer}`;

    const cmd = `ffmpeg -i "${inputFile}" -vf "${fullFilter}" -q:v 2 -y "${outputFile}"`;

    await new Promise((resolve, reject) => {
        exec(cmd, (error, stdout, stderr) => {
            if (fs.existsSync(inputFile)) fs.unlinkSync(inputFile);
            if (error) {
                console.error('❌ FFmpeg error:', stderr);
                reject(error);
            } else {
                console.log(`✅ Quote Image Generated: ${outputFilename}`);
                resolve();
            }
        });
    });

    return outputFilename;
}

async function main() {
    if (!fs.existsSync(FONT_FILE)) {
        console.error(`❌ Font missing at ${FONT_FILE}. Please ensure fonts/crimbold.ttf exists.`);
        process.exit(1);
    }

    try {
        const image = await fetchImage();
        const filename = await processImage(image, quote);
        fs.writeFileSync('output_filename.txt', filename);
    } catch (err) {
        console.error('Fatal error:', err);
        process.exit(1);
    }
}

main();
