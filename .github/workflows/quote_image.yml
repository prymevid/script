name: Quote Image Generator
on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image'
        required: true
        type: string
        default: 'Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.'
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: |
          sudo apt-get update && sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev
          npm install axios canvas
          mkdir -p englishquotes/output
      - env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: node -e "const a=require('axios'),f=require('fs'),p=require('path'),{createCanvas:c,loadImage:l}=require('canvas'),W=1080,H=1350,q=process.env.QUOTE_TEXT||'Life is what happens when you are busy making other plans.',r=process.env.RUN_ID_EXT||Date.now().toString(),O=p.join(process.cwd(),'englishquotes/output');(async()=>{let i=await l((await a.get('https://picsum.photos/'+W+'/'+H+'?blur=3&random='+Date.now(),{responseType:'arraybuffer'})).data),t=c(W,H),x=t.getContext('2d');x.drawImage(i,0,0,W,H);let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(0,0,0,0.2)'),g.addColorStop(1,'rgba(0,0,0,0.7)'),x.fillStyle=g,x.fillRect(0,0,W,H);x.font='500 48px Arial,Helvetica,sans-serif';let b=880,m=b-160,ws=q.split(' '),ls=[],cl=ws[0];for(let k=1;k<ws.length;k++){let w=ws[k];if(x.measureText(cl+' '+w).width<m)cl+=' '+w;else ls.push(cl),cl=w}ls.push(cl);let h=ls.length*67.2,bh=h+152,bx=(W-b)/2,by=(H-bh)/2;x.save();x.beginPath();let rp=(X,Y,w,h,r)=>{x.moveTo(X+r,Y),x.lineTo(X+w-r,Y),x.quadraticCurveTo(X+w,Y,X+w,Y+r),x.lineTo(X+w,Y+h-r),x.quadraticCurveTo(X+w,Y+h,X+w-r,Y+h),x.lineTo(X+r,Y+h),x.quadraticCurveTo(X,Y+h,X,Y+h-r),x.lineTo(X,Y+r),x.quadraticCurveTo(X,Y,X+r,Y),x.closePath()};rp(bx,by,b,bh,40);let d=x.getImageData(bx,by,b,bh),B=20;for(let P=0;P<3;P++){let T=new Uint8ClampedArray(d.data.length);for(let y=0;y<bh;y++)for(let x=0;x<b;x++){let R=0,G=0,B=0,A=0,C=0;for(let dx=-B;dx<=B;dx++){let nx=x+dx;if(nx>=0&&nx<b){let i=(y*b+nx)*4;R+=d.data[i],G+=d.data[i+1],B+=d.data[i+2],A+=d.data[i+3],C++}}let i=(y*b+x)*4;T[i]=R/C,T[i+1]=G/C,T[i+2]=B/C,T[i+3]=A/C}for(let i=0;i<d.data.length;i++)d.data[i]=T[i];for(let y=0;y<bh;y++)for(let x=0;x<b;x++){let R=0,G=0,B=0,A=0,C=0;for(let dy=-B;dy<=B;dy++){let ny=y+dy;if(ny>=0&&ny<bh){let i=(ny*b+x)*4;R+=d.data[i],G+=d.data[i+1],B+=d.data[i+2],A+=d.data[i+3],C++}}let i=(y*b+x)*4;T[i]=R/C,T[i+1]=G/C,T[i+2]=B/C,T[i+3]=A/C}for(let i=0;i<d.data.length;i++)d.data[i]=T[i]}let bc=c(b,bh),bcx=bc.getContext('2d');bcx.putImageData(d,0,0),x.clip(),x.drawImage(bc,bx,by),x.shadowColor='rgba(0,0,0,0.25)',x.shadowBlur=40,x.shadowOffsetY=20,x.fillStyle='rgba(255,255,255,0.18)',x.fill(),x.fillStyle='rgba(255,255,255,0.9)',x.font='bold 160px serif',x.textAlign='left',x.textBaseline='top',x.fillText('“',bx+30,by-20),x.fillStyle='#FFF',x.font='500 48px Arial,Helvetica,sans-serif',x.textAlign='center',x.textBaseline='middle',x.shadowColor='rgba(0,0,0,0.5)',x.shadowBlur=4,x.shadowOffsetY=2;let sy=by+80+h/2-((ls.length-1)*67.2)/2;ls.forEach((l,i)=>x.fillText(l,W/2,sy+i*67.2));x.shadowColor='transparent',x.fillStyle='rgba(255,255,255,0.8)',x.font='bold 28px Arial,Helvetica,sans-serif',x.fillText('www.reallygreatsite.com',W/2,H-60);let fc=c(W,H),fcx=fc.getContext('2d');fcx.filter='saturate(1.9) brightness(0.3) contrast(1.7)',fcx.drawImage(t,0,0);let fn='quote_'+r+'_'+Date.now()+'.jpg',fp=p.join(O,fn);f.writeFileSync(fp,fc.toBuffer('image/jpeg',{quality:0.95})),console.log('✅ Successfully generated visual:',fn),f.writeFileSync('output_filename.txt',fn)})().catch(e=>{console.error(e),process.exit(1)})"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: generated glassmorphism quote image [skip ci]"
          git push
      - id: out
        run: |
          F=$(cat output_filename.txt)
          echo "RAW_URL=https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/englishquotes/output/$F" >> $GITHUB_OUTPUT
    outputs:
      raw_url: ${{ steps.out.outputs.RAW_URL }}
