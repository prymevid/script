name: Quote Image Generator

on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image (use **word** for bold)'
        required: true
        type: string
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install axios sharp
          sudo apt-get install -y ffmpeg

      - name: Ensure directories exist
        run: |
          mkdir -p englishquotes/output
          mkdir -p englishquotes/temporary
          mkdir -p fonts

      - name: Write and run quote image script
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > run_quote.js
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');

          // =============== CONFIGURATION ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          const TEMP_DIR = path.join(BASE_DIR, 'temporary');

          const WIDTH = 1080;
          const HEIGHT = 1350;
          const BOX_WIDTH = 860;
          const BOX_HEIGHT = 420;
          const BOX_RADIUS = 45;
          const BOX_Y = 520;
          const FONT_SIZE = 42;
          const LINE_HEIGHT = 60;
          const WEBSITE_TEXT = 'www.reallygreatsite.com';
          // ============= END CONFIGURATION =============

          const quote = process.env.QUOTE_TEXT || "Life is what happens when you're busy making other plans.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          async function fetchImage() {
            const url = `https://picsum.photos/${WIDTH}/${HEIGHT}?random=${Date.now()}`;
            const response = await axios.get(url, { responseType: 'arraybuffer' });
            console.log('📸 Random image downloaded from Picsum');
            return Buffer.from(response.data);
          }

          function wrapText(text, maxChars = 34) {
            const words = text.split(' ');
            let lines = [];
            let current = '';
            words.forEach(w => {
              const test = current? current + ' ' + w : w;
              if (test.length > maxChars) {
                lines.push(current);
                current = w;
              } else {
                current = test;
              }
            });
            if (current) lines.push(current);
            return lines;
          }

          function escapeXml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }

          function lineToTspans(line) {
            const parts = line.split(/(\*\*.*?\*\*)/g);
            return parts.map(p => {
              if (p.startsWith('**') && p.endsWith('**')) {
                return `<tspan class="bold">${escapeXml(p.slice(2,-2))}</tspan>`;
              }
              return `<tspan class="regular">${escapeXml(p)}</tspan>`;
            }).join('');
          }

          function buildTextSVG(lines) {
            const startY = BOX_HEIGHT/2 - ((lines.length-1)*LINE_HEIGHT)/2 + 10;
            const tspans = lines.map((line,i) => {
              const y = startY + i*LINE_HEIGHT;
              return `<text x="${BOX_WIDTH/2}" y="${y}" class="line">${lineToTspans(line)}</text>`;
            }).join('\n');

            return Buffer.from(`
              <svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}" xmlns="http://www.w3.org/2000/svg">
                <style>
                 .line { font-family: 'Inter','Helvetica Neue',Arial,sans-serif; font-size:${FONT_SIZE}px; fill:white; text-anchor:middle; }
                 .bold { font-weight:700; }
                 .regular { font-weight:400; }
                </style>
                ${tspans}
              </svg>
            `);
          }

          async function createGlassCard(baseBuffer) {
            const x = Math.round((WIDTH - BOX_WIDTH)/2);
            const y = BOX_Y;

            // 1. Blur the full image for glass effect
            const blurred = await sharp(baseBuffer).blur(28).toBuffer();

            // 2. Crop the area where glass will sit
            const crop = await sharp(blurred)
             .extract({ left: x, top: y, width: BOX_WIDTH, height: BOX_HEIGHT })
             .toBuffer();

            // 3. Add translucent white tint
            const tint = Buffer.from(`<svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}"><rect x="0" y="0" width="${BOX_WIDTH}" height="${BOX_HEIGHT}" rx="${BOX_RADIUS}" ry="${BOX_RADIUS}" fill="#ffffff" fill-opacity="0.18"/></svg>`);
            const tinted = await sharp(crop).composite([{ input: tint }]).png().toBuffer();

            // 4. Apply rounded corners mask
            const mask = Buffer.from(`<svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}"><rect x="0" y="0" width="${BOX_WIDTH}" height="${BOX_HEIGHT}" rx="${BOX_RADIUS}" ry="${BOX_RADIUS}" fill="white"/></svg>`);
            const rounded = await sharp(tinted).composite([{ input: mask, blend: 'dest-in' }]).png().toBuffer();

            return { buffer: rounded, x, y };
          }

          async function processImage(imageBuffer, quoteText) {
            const timestamp = Date.now();
            const outputFilename = `quote_${runId}_${timestamp}.jpg`;
            const outputFile = path.join(OUTPUT_DIR, outputFilename);

            // Base image - enhance like sample
            const base = await sharp(imageBuffer)
             .resize(WIDTH, HEIGHT, { fit: 'cover' })
             .modulate({ brightness: 0.88, saturation: 1.05 })
             .toBuffer();

            const glass = await createGlassCard(base);

            // Quote icon
            const quoteIcon = Buffer.from(`
              <svg width="90" height="70" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="65" font-family="Georgia,serif" font-size="140" fill="white" fill-opacity="0.95">“</text>
              </svg>
            `);

            // Text
            const lines = wrapText(quoteText);
            const textSvg = buildTextSVG(lines);

            // Footer
            const footer = Buffer.from(`
              <svg width="${WIDTH}" height="80" xmlns="http://www.w3.org/2000/svg">
                <text x="${WIDTH/2}" y="50" font-family="Inter,Arial,sans-serif" font-size="34" fill="white" text-anchor="middle" opacity="0.92">${WEBSITE_TEXT}</text>
              </svg>
            `);

            await sharp(base)
             .composite([
                { input: glass.buffer, left: glass.x, top: glass.y },
                { input: quoteIcon, left: glass.x - 8, top: glass.y - 55 },
                { input: textSvg, left: glass.x, top: glass.y + 15 },
                { input: footer, left: 0, top: HEIGHT - 110 }
              ])
             .jpeg({ quality: 92 })
             .toFile(outputFile);

            console.log(`✅ Saved: ${outputFilename}`);
            return outputFilename;
          }

          async function main() {
            console.log('🚀 Quote Image Generator Started');
            console.log(`📝 Quote: "${quote.substring(0, 60)}${quote.length > 60? '...' : ''}"`);

            const image = await fetchImage();
            const filename = await processImage(image, quote);

            fs.writeFileSync('output_filename.txt', filename);
            console.log(`🎯 Output filename written: ${filename}`);
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          SCRIPT_EOF

          node run_quote.js
          rm -f run_quote.js

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: add quote image [skip ci]"
          git push

      - name: Output raw image URL
        run: |
          FILENAME=$(cat output_filename.txt)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/englishquotes/output/${FILENAME}"
          echo "RAW_URL=${RAW_URL}" >> $GITHUB_OUTPUT
          echo "✅ Raw URL: ${RAW_URL}"
        id: output_url

    outputs:
      raw_url: ${{ steps.output_url.outputs.RAW_URL }}
