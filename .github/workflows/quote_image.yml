name: Quote Image Generator
on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image'
        required: true
        type: string
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install axios
          sudo apt-get install -y ffmpeg
      - name: Ensure directories exist
        run: |
          mkdir -p englishquotes/output
          mkdir -p englishquotes/temporary
      - name: Write and run quote image script
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > run_quote.js
          const axios = require('axios');
          const fs = require('fs');
          const { exec } = require('child_process');
          const path = require('path');

          // =============== CONFIGURATION ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          const TEMP_DIR = path.join(BASE_DIR, 'temporary');
          const FONT_FILE = path.join(process.cwd(), 'fonts', 'crimbold.ttf');
          const IMAGE_WIDTH = 640;
          const IMAGE_HEIGHT = 800;
          const FONT_SIZE = 37;
          const LINE_SPACING = 42;
          const IMAGE_BRIGHTNESS = -0.3;
          const IMAGE_CONTRAST = 0.6;
          const IMAGE_SATURATION = 0.75;

          // =============== GLASS BOX AND VISUAL DESIGN CONFIG (to match the exact image style) ===============
          const BOX_WIDTH_PERCENT = 0.88;
          const BOX_WIDTH = Math.floor(IMAGE_WIDTH * BOX_WIDTH_PERCENT);
          const BOX_OPACITY = 0.62;
          const BOX_COLOR = 'black';
          const BOX_PADDING_X = 50;
          const BOX_PADDING_Y = 45;
          const QUOTE_MARK_FONT_SIZE = 130;
          const URL_FONT_SIZE = 19;
          const URL_Y_OFFSET = 45;
          // ============= END GLASS BOX AND VISUAL DESIGN CONFIG =============

          const quote = process.env.QUOTE_TEXT || "Life is what happens when you're busy making other plans.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          async function fetchImage() {
            const response = await axios.get('https://picsum.photos/640/800', {
              responseType: 'arraybuffer'
            });
            console.log('📸 Random image downloaded from Picsum (always fresh)');
            return response.data;
          }

          function wrapText(text) {
            const words = text.split(' ');
            let lines = [];
            let currentLine = words[0];
            // Wrap based on actual glass box inner width (not full image) for perfect visual match
            const maxWidth = BOX_WIDTH - 110;
            words.slice(1).forEach(word => {
              let testLine = currentLine + ' ' + word;
              if (testLine.length * (FONT_SIZE * 0.65) < maxWidth) {
                currentLine = testLine;
              } else {
                lines.push(currentLine);
                currentLine = word;
              }
            });
            lines.push(currentLine);
            return lines;
          }

          async function processImage(imageBuffer, quoteText) {
            const timestamp = Date.now();
            const inputFile = path.join(TEMP_DIR, `temp_${timestamp}.jpg`);
            const outputFilename = `quote_${runId}_${timestamp}.jpg`;
            const outputFile = path.join(OUTPUT_DIR, outputFilename);

            fs.writeFileSync(inputFile, imageBuffer);

            const safeQuote = quoteText
              .replace(/'/g, "\u2019")
              .replace(/"/g, '\\"')
              .replace(/`/g, '\\`')
              .replace(/:/g, '\\:');

            const lines = wrapText(safeQuote);
            const numLines = lines.length;
            const totalTextHeight = numLines * LINE_SPACING;

            // Calculate glass box size and position (centered, exactly like the example image)
            const quoteSpaceHeight = QUOTE_MARK_FONT_SIZE * 0.75;
            const boxHeight = totalTextHeight + quoteSpaceHeight + (BOX_PADDING_Y * 2) + 30;
            const boxX = Math.floor((IMAGE_WIDTH - BOX_WIDTH) / 2);
            const boxY = Math.floor((IMAGE_HEIGHT - boxHeight) / 2);

            // Precise positioning inside the glass box
            const quoteMarkX = boxX + 35;
            const quoteMarkY = boxY + 28;
            const textYBase = boxY + BOX_PADDING_Y + quoteSpaceHeight + 5;
            const urlY = IMAGE_HEIGHT - URL_Y_OFFSET;

            // Build all drawtext commands (quote mark + multi-line text + URL)
            const drawTextCommands = [];

            // 1. Large opening quotation mark (exactly like the image)
            drawTextCommands.push(
              `drawtext=text='“':fontfile=${FONT_FILE}:fontsize=${QUOTE_MARK_FONT_SIZE}:fontcolor=white:shadowcolor=black@0.9:shadowx=3:shadowy=3:x=${quoteMarkX}:y=${quoteMarkY}`
            );

            // 2. Main quote text lines (centered inside glass box)
            lines.forEach((line, i) => {
              const yPos = textYBase + (i * LINE_SPACING);
              drawTextCommands.push(
                `drawtext=text='${line}':fontfile=${FONT_FILE}:fontsize=${FONT_SIZE}:fontcolor=white:shadowcolor=black@1.0:shadowx=2:shadowy=2:x=(w-text_w)/2:y=${yPos}`
              );
            });

            // 3. Website URL at bottom (exactly like the image)
            drawTextCommands.push(
              `drawtext=text='www.reallygreatsite.com':fontfile=${FONT_FILE}:fontsize=${URL_FONT_SIZE}:fontcolor=white@0.85:shadowcolor=black@0.7:shadowx=1:shadowy=1:x=(w-text_w)/2:y=${urlY}`
            );

            const textCommandsStr = drawTextCommands.join(',');

            // Full FFmpeg filter chain: warm golden-hour look + glass box + all text elements
            const vfFilter = `eq=brightness=${IMAGE_BRIGHTNESS}:contrast=${IMAGE_CONTRAST}:saturation=${IMAGE_SATURATION},curves=all='0/0 0.5/0.5 1/1',drawbox=x=${boxX}:y=${boxY}:w=${BOX_WIDTH}:h=${boxHeight}:color=${BOX_COLOR}@${BOX_OPACITY}:t=fill,${textCommandsStr}`;

            const cmd = `ffmpeg -i "${inputFile}" -vf "${vfFilter}" -q:v 1 -y "${outputFile}"`;

            await new Promise((resolve, reject) => {
              exec(cmd, (error, stdout, stderr) => {
                if (fs.existsSync(inputFile)) fs.unlinkSync(inputFile);
                if (error) {
                  console.error('❌ FFmpeg error:', stderr);
                  reject(error);
                } else {
                  console.log(`✅ Saved: ${outputFilename} (glass box + quote mark + URL applied)`);
                  resolve();
                }
              });
            });

            return outputFilename;
          }

          async function main() {
            console.log('🚀 Quote Image Generator Started');
            console.log(`📝 Quote: "${quote.substring(0, 60)}${quote.length > 60 ? '...' : ''}"`);

            if (!fs.existsSync(FONT_FILE)) {
              console.error(`❌ Font not found: ${FONT_FILE}`);
              process.exit(1);
            }

            const image = await fetchImage();
            const filename = await processImage(image, quote);

            fs.writeFileSync('output_filename.txt', filename);
            console.log(`🎯 Output filename written: ${filename}`);
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          SCRIPT_EOF
          node run_quote.js
          rm -f run_quote.js
      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: add quote image [skip ci]"
          git push
      - name: Output raw image URL
        run: |
          FILENAME=$(cat output_filename.txt)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/englishquotes/output/${FILENAME}"
          echo "RAW_URL=${RAW_URL}" >> $GITHUB_OUTPUT
          echo "✅ Raw URL: ${RAW_URL}"
        id: output_url
    outputs:
      raw_url: ${{ steps.output_url.outputs.RAW_URL }}
