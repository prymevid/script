name: Quote Image Generator
on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image (use **word** for bold)'
        required: true
        type: string
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm install axios sharp
          sudo apt-get install -y ffmpeg
      - name: Ensure directories exist
        run: |
          mkdir -p englishquotes/output
          mkdir -p englishquotes/temporary
      - name: Write and run quote image script
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > run_quote.js
          const axios = require('axios');
          const fs = require('fs');
          const { exec } = require('child_process');
          const path = require('path');
          const sharp = require('sharp');

          // =============== CONFIGURATION (kept your values) ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          const TEMP_DIR = path.join(BASE_DIR, 'temporary');
          const FONT_REGULAR = path.join(process.cwd(), 'fonts', 'regular.ttf');
          const FONT_BOLD = path.join(process.cwd(), 'fonts', 'crimbold.ttf');
          const IMAGE_WIDTH = 640;
          const IMAGE_HEIGHT = 800;
          const FONT_SIZE = 34;
          const LINE_SPACING = 48;
          const IMAGE_BRIGHTNESS = -0.15;
          const IMAGE_CONTRAST = 0.9;
          const IMAGE_SATURATION = 0.85;

          // =============== NEW GLASS BOX CONFIG (matches your image) ===============
          const BOX_WIDTH_PERCENT = 0.82;
          const BOX_WIDTH = Math.floor(IMAGE_WIDTH * BOX_WIDTH_PERCENT);
          const BOX_OPACITY = 0.22;
          const BOX_COLOR = 'white';
          const BOX_RADIUS = 42;
          const BOX_PADDING_Y = 55;
          const QUOTE_MARK_FONT_SIZE = 110;
          const URL_FONT_SIZE = 24;
          // ============= END CONFIG =============

          const quote = process.env.QUOTE_TEXT || "Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          async function fetchImage() {
            const response = await axios.get('https://picsum.photos/640/800', { responseType: 'arraybuffer' });
            return response.data;
          }

          function wrapText(text) {
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';
            const maxWidth = BOX_WIDTH - 80;
            const avgCharWidth = FONT_SIZE * 0.55;

            words.forEach(word => {
              const testLine = currentLine? currentLine + ' ' + word : word;
              if (testLine.replace(/\*\*/g,'').length * avgCharWidth < maxWidth) {
                currentLine = testLine;
              } else {
                lines.push(currentLine);
                currentLine = word;
              }
            });
            if (currentLine) lines.push(currentLine);
            return lines;
          }

          function parseBold(text) {
            const parts = [];
            const regex = /\*\*(.*?)\*\*/g;
            let lastIndex = 0;
            let match;
            while ((match = regex.exec(text))!== null) {
              if (match.index > lastIndex) {
                parts.push({ text: text.slice(lastIndex, match.index), bold: false });
              }
              parts.push({ text: match[1], bold: true });
              lastIndex = regex.lastIndex;
            }
            if (lastIndex < text.length) {
              parts.push({ text: text.slice(lastIndex), bold: false });
            }
            return parts;
          }

          async function processImage(imageBuffer, quoteText) {
            const timestamp = Date.now();
            const inputFile = path.join(TEMP_DIR, `temp_${timestamp}.jpg`);
            const boxFile = path.join(TEMP_DIR, `box_${timestamp}.png`);
            const outputFilename = `quote_${runId}_${timestamp}.jpg`;
            const outputFile = path.join(OUTPUT_DIR, outputFilename);

            fs.writeFileSync(inputFile, imageBuffer);
            const lines = wrapText(quoteText);
            const numLines = lines.length;
            const totalTextHeight = numLines * LINE_SPACING;
            const boxHeight = totalTextHeight + (BOX_PADDING_Y * 2);
            const boxX = Math.floor((IMAGE_WIDTH - BOX_WIDTH) / 2);
            const boxY = Math.floor((IMAGE_HEIGHT - boxHeight) / 2);

            // 1. Create rounded glass box PNG
            const svg = `<svg width="${BOX_WIDTH}" height="${boxHeight}" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="${BOX_WIDTH}" height="${boxHeight}" rx="${BOX_RADIUS}" ry="${BOX_RADIUS}" fill="${BOX_COLOR}" fill-opacity="${BOX_OPACITY}"/></svg>`;
            await sharp(Buffer.from(svg)).png().toFile(boxFile);

            // 2. Build drawtext filters
            const filters = [];
            // Quote mark
            filters.push(`drawtext=text='“':fontfile=${FONT_BOLD}:fontsize=${QUOTE_MARK_FONT_SIZE}:fontcolor=white:x=${boxX+18}:y=${boxY-55}:shadowcolor=black@0.3:shadowx=2:shadowy=2`);

            // Quote lines with bold support
            lines.forEach((line, i) => {
              const yPos = boxY + BOX_PADDING_Y + (i * LINE_SPACING) - 10;
              const parts = parseBold(line);
              let totalWidth = parts.reduce((w,p) => w + p.text.length * FONT_SIZE * (p.bold?0.62:0.55), 0);
              let xCursor = (IMAGE_WIDTH - totalWidth) / 2;

              parts.forEach(part => {
                const font = part.bold? FONT_BOLD : FONT_REGULAR;
                const safe = part.text.replace(/'/g,"’").replace(/:/g,'\\:');
                if (safe.trim()) {
                  filters.push(`drawtext=text='${safe} ':fontfile=${font}:fontsize=${FONT_SIZE}:fontcolor=white:x=${xCursor}:y=${yPos}:shadowcolor=black@0.8:shadowx=2:shadowy=2`);
                  xCursor += part.text.length * FONT_SIZE * (part.bold?0.62:0.55) + FONT_SIZE*0.3;
                }
              });
            });

            // URL at bottom (partial bold)
            const urlY = IMAGE_HEIGHT - 65;
            filters.push(`drawtext=text='www.':fontfile=${FONT_REGULAR}:fontsize=${URL_FONT_SIZE}:fontcolor=white:x=(w-text_w)/2-90:y=${urlY}`);
            filters.push(`drawtext=text='reallygreatsite':fontfile=${FONT_BOLD}:fontsize=${URL_FONT_SIZE}:fontcolor=white:x=(w-text_w)/2+5:y=${urlY}`);
            filters.push(`drawtext=text='.com':fontfile=${FONT_REGULAR}:fontsize=${URL_FONT_SIZE}:fontcolor=white:x=(w-text_w)/2+175:y=${urlY}`);

            const filterComplex = `[0:v]eq=brightness=${IMAGE_BRIGHTNESS}:contrast=${IMAGE_CONTRAST}:saturation=${IMAGE_SATURATION}[bg];[bg][1:v]overlay=${boxX}:${boxY}[tmp];[tmp]${filters.join(',')}`;

            const cmd = `ffmpeg -i "${inputFile}" -i "${boxFile}" -filter_complex "${filterComplex}" -q:v 1 -y "${outputFile}"`;

            await new Promise((resolve, reject) => {
              exec(cmd, (error) => {
                fs.unlinkSync(inputFile); fs.unlinkSync(boxFile);
                if (error) reject(error); else resolve();
              });
            });
            return outputFilename;
          }

          async function main() {
            console.log('🚀 Starting with rounded glass box');
            const image = await fetchImage();
            const filename = await processImage(image, quote);
            fs.writeFileSync('output_filename.txt', filename);
          }
          main().catch(err => { console.error(err); process.exit(1); });
          SCRIPT_EOF
          node run_quote.js
      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: add quote image [skip ci]"
          git push
