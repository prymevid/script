name: Quote Image Generator

on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image'
        required: true
        type: string
        default: 'Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.'
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for git rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Graphics Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Node Dependencies
        run: npm install axios canvas

      - name: Ensure output directory exists
        run: mkdir -p englishquotes/output

      - name: Write and execute render engine
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > render_engine.js
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');
          const { createCanvas, loadImage } = require('canvas');

          // =============== CONFIGURATION ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          
          const CANVAS_WIDTH = 1080;
          const CANVAS_HEIGHT = 1350; // 4:5 Portrait ratio
          const PICSUM_URL = `https://picsum.photos/${CANVAS_WIDTH}/${CANVAS_HEIGHT}?random=`;
          
          // Typography
          const FONT_FAMILY = 'sans-serif';
          const FONT_SIZE = 48;
          const LINE_HEIGHT = 1.4;
          const BOX_PADDING = 80;
          const MAX_BOX_WIDTH = 880;

          // Glassmorphism settings
          const BLUR_AMOUNT = 12;          // ← Adjust blur intensity (pixels)
          const BOX_DARK_OVERLAY = 0.25;    // ← Opacity of dark tint inside box (0-1)
          const BOX_BORDER_OPACITY = 0.4;    // ← Glass edge brightness
          // ============= END CONFIGURATION =============

          const quote = process.env.QUOTE_TEXT || "Life is what happens when you're busy making other plans.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          async function fetchBackgroundImage() {
            console.log('📡 Fetching random background from Picsum...');
            const response = await axios.get(PICSUM_URL + Date.now(), { responseType: 'arraybuffer' });
            return await loadImage(Buffer.from(response.data));
          }

          function buildRoundedPath(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
          }

          function calculateTextWrap(ctx, text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
              const word = words[i];
              const width = ctx.measureText(currentLine + " " + word).width;
              if (width < maxWidth) {
                currentLine += " " + word;
              } else {
                lines.push(currentLine);
                currentLine = word;
              }
            }
            lines.push(currentLine);
            return lines;
          }

          async function generateComposition() {
            const canvas = createCanvas(CANVAS_WIDTH, CANVAS_HEIGHT);
            const ctx = canvas.getContext('2d');

            // 1. Render Background
            const bgImage = await fetchBackgroundImage();
            ctx.drawImage(bgImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 2. Apply Background Vignette / Darken for contrast (entire image)
            const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.7)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 3. Prepare Text Metrics
            ctx.font = `500 ${FONT_SIZE}px ${FONT_FAMILY}`;
            const maxTextWidth = MAX_BOX_WIDTH - (BOX_PADDING * 2);
            const lines = calculateTextWrap(ctx, quote, maxTextWidth);
            
            const textHeight = lines.length * (FONT_SIZE * LINE_HEIGHT);
            const boxHeight = textHeight + (BOX_PADDING * 2.5);
            const boxX = (CANVAS_WIDTH - MAX_BOX_WIDTH) / 2;
            const boxY = (CANVAS_HEIGHT - boxHeight) / 2;

            // ========== 4. RENDER FROSTED GLASS BOX (BACKGROUND BLUR) ==========
            // 4a. Extract the portion of the background under the box
            const tempCanvas = createCanvas(MAX_BOX_WIDTH, boxHeight);
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(
              canvas,
              boxX, boxY, MAX_BOX_WIDTH, boxHeight,   // source rectangle
              0, 0, MAX_BOX_WIDTH, boxHeight           // destination rectangle
            );

            // 4b. Save state and clip to rounded rectangle
            ctx.save();
            buildRoundedPath(ctx, boxX, boxY, MAX_BOX_WIDTH, boxHeight, 40);
            ctx.clip();

            // 4c. Apply blur filter and draw the blurred background portion
            ctx.filter = `blur(${BLUR_AMOUNT}px)`;
            ctx.drawImage(tempCanvas, boxX, boxY, MAX_BOX_WIDTH, boxHeight);
            ctx.filter = 'none';   // Reset filter for subsequent drawings

            // 4d. Dark tint overlay for better text contrast
            ctx.fillStyle = `rgba(0, 0, 0, ${BOX_DARK_OVERLAY})`;
            ctx.fill();

            // 4e. Subtle white stroke (glass edge reflection)
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = `rgba(255, 255, 255, ${BOX_BORDER_OPACITY})`;
            ctx.stroke();

            ctx.restore();
            // =================================================================

            // 5. Render Quote Icon (Top Left of Box)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.font = `bold 160px serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('“', boxX + 40, boxY - 20);

            // 6. Render Main Quote Text
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `500 ${FONT_SIZE}px ${FONT_FAMILY}`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Text shadow for legibility
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;

            const startY = boxY + BOX_PADDING + (textHeight / 2) - ((lines.length - 1) * (FONT_SIZE * LINE_HEIGHT)) / 2;
            
            lines.forEach((line, index) => {
              const yOffset = startY + (index * FONT_SIZE * LINE_HEIGHT);
              ctx.fillText(line, CANVAS_WIDTH / 2, yOffset);
            });
            ctx.shadowColor = 'transparent';

            // 7. Render Footer (Website URL)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = `bold 28px ${FONT_FAMILY}`;
            ctx.textAlign = 'center';
            ctx.fillText('www.reallygreatsite.com', CANVAS_WIDTH / 2, CANVAS_HEIGHT - 60);

            // 8. Output to File
            const outputFilename = `quote_${runId}_${Date.now()}.jpg`;
            const outputPath = path.join(OUTPUT_DIR, outputFilename);
            
            const buffer = canvas.toBuffer('image/jpeg', { quality: 0.95 });
            fs.writeFileSync(outputPath, buffer);
            console.log(`✅ Successfully generated visual: ${outputFilename}`);
            
            return outputFilename;
          }

          generateComposition().then(filename => {
            fs.writeFileSync('output_filename.txt', filename);
          }).catch(err => {
            console.error('❌ Critical failure during image generation:', err);
            process.exit(1);
          });
          SCRIPT_EOF

          node render_engine.js
          rm -f render_engine.js

      - name: Commit and push generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: generated glassmorphism quote image [skip ci]"
          fi
          
          # Pull latest remote changes and rebase our commit to avoid push rejection
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Output raw image URL
        run: |
          FILENAME=$(cat output_filename.txt)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/englishquotes/output/${FILENAME}"
          echo "RAW_URL=${RAW_URL}" >> $GITHUB_OUTPUT
          echo "✅ Asset securely pushed. Raw URL: ${RAW_URL}"
        id: output_url

    outputs:
      raw_url: ${{ steps.output_url.outputs.RAW_URL }}
