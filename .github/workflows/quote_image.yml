name: Quote Image Generator

on:
  workflow_dispatch:
    inputs:
      quote:
        description: 'Quote text to render on image (use **word** for bold)'
        required: true
        type: string
      run_id_ext:
        description: 'External run ID for unique filename tracking'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install axios sharp
          sudo apt-get install -y ffmpeg

      - name: Ensure directories exist
        run: |
          mkdir -p englishquotes/output
          mkdir -p englishquotes/temporary

      - name: Write and run quote image script
        env:
          QUOTE_TEXT: ${{ github.event.inputs.quote }}
          RUN_ID_EXT: ${{ github.event.inputs.run_id_ext }}
        run: |
          cat << 'SCRIPT_EOF' > run_quote.js
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');

          // =============== CONFIGURATION ===============
          const BASE_DIR = path.join(process.cwd(), 'englishquotes');
          const OUTPUT_DIR = path.join(BASE_DIR, 'output');
          const TEMP_DIR = path.join(BASE_DIR, 'temporary');

          const IMAGE_WIDTH = 1080;
          const IMAGE_HEIGHT = 1350;
          const FONT_SIZE = 42;
          const LINE_SPACING = 60;

          // =============== GLASS BOX CONFIG (matches your image exactly) ===============
          const BOX_WIDTH_PERCENT = 0.80;
          const BOX_WIDTH = Math.floor(IMAGE_WIDTH * BOX_WIDTH_PERCENT);
          const BOX_HEIGHT = 460;
          const BOX_RADIUS = 40;
          const BOX_Y = Math.floor((IMAGE_HEIGHT - BOX_HEIGHT) / 2) + 20;
          const BOX_X = Math.floor((IMAGE_WIDTH - BOX_WIDTH) / 2);

          // THIS IS THE GLASS COLOR - white with low opacity
          const GLASS_TINT_COLOR = '#ffffff';
          const GLASS_OPACITY = 0.22; // 22% - matches your sample
          const GLASS_BLUR = 32; // blur strength

          const QUOTE_MARK_SIZE = 120;
          const WEBSITE_TEXT = 'www.reallygreatsite.com';
          // ============= END CONFIG =============

          const quote = process.env.QUOTE_TEXT || "Mountains Stand Tall, not to Impress But to Remind us That Strength is Built Through Patience, Endurance, and Time.";
          const runId = process.env.RUN_ID_EXT || Date.now().toString();

          async function fetchImage() {
            const url = `https://picsum.photos/${IMAGE_WIDTH}/${IMAGE_HEIGHT}?random=${Date.now()}`;
            const response = await axios.get(url, { responseType: 'arraybuffer' });
            console.log('📸 Random image downloaded from Picsum (background NOT modified)');
            return Buffer.from(response.data);
          }

          function wrapText(text, maxChars = 36) {
            const clean = text.replace(/\*\*/g, '');
            const words = clean.split(' ');
            let lines = []; let current = '';
            words.forEach(w => {
              const test = current? current + ' ' + w : w;
              if (test.length > maxChars) { lines.push(current); current = w; }
              else { current = test; }
            });
            if (current) lines.push(current);
            return lines;
          }

          function escapeXml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }

          function parseBold(line) {
            const parts = line.split(/(\*\*.*?\*\*)/g);
            return parts.map(p => {
              if (p.startsWith('**') && p.endsWith('**')) {
                return `<tspan font-weight="700">${escapeXml(p.slice(2,-2))}</tspan>`;
              }
              return `<tspan font-weight="400">${escapeXml(p)}</tspan>`;
            }).join('');
          }

          async function createGlassCard(baseBuffer) {
            // 1. Extract the exact area where glass will sit - BACKGROUND STAYS ORIGINAL
            const crop = await sharp(baseBuffer)
             .extract({ left: BOX_X, top: BOX_Y, width: BOX_WIDTH, height: BOX_HEIGHT })
             .blur(GLASS_BLUR)
             .toBuffer();

            // 2. Apply the glass tint color (this is what gives it that milky look)
            const tintSvg = `<svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}"><rect x="0" y="0" width="${BOX_WIDTH}" height="${BOX_HEIGHT}" rx="${BOX_RADIUS}" ry="${BOX_RADIUS}" fill="${GLASS_TINT_COLOR}" fill-opacity="${GLASS_OPACITY}"/></svg>`;

            const tinted = await sharp(crop)
             .composite([{ input: Buffer.from(tintSvg), blend: 'over' }])
             .png()
             .toBuffer();

            // 3. Apply rounded corners mask
            const maskSvg = `<svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}"><rect x="0" y="0" width="${BOX_WIDTH}" height="${BOX_HEIGHT}" rx="${BOX_RADIUS}" ry="${BOX_RADIUS}" fill="white"/></svg>`;

            const glass = await sharp(tinted)
             .composite([{ input: Buffer.from(maskSvg), blend: 'dest-in' }])
             .png()
             .toBuffer();

            console.log(`✨ Glass created: ${GLASS_TINT_COLOR} @ ${GLASS_OPACITY*100}% opacity + ${GLASS_BLUR}px blur`);
            return glass;
          }

          async function processImage(imageBuffer, quoteText) {
            const timestamp = Date.now();
            const outputFilename = `quote_${runId}_${timestamp}.jpg`;
            const outputFile = path.join(OUTPUT_DIR, outputFilename);

            // BACKGROUND IMAGE - DO NOT MODIFY
            const base = await sharp(imageBuffer)
             .resize(IMAGE_WIDTH, IMAGE_HEIGHT, { fit: 'cover' })
             .toBuffer();

            const glass = await createGlassCard(base);

            // Build text SVG with bold support
            const lines = wrapText(quoteText);
            const startY = BOX_HEIGHT/2 - ((lines.length-1)*LINE_SPACING)/2 + 15;

            const textElements = lines.map((line, i) => {
              const y = startY + i * LINE_SPACING;
              return `<text x="${BOX_WIDTH/2}" y="${y}" font-family="Inter,Helvetica,Arial" font-size="${FONT_SIZE}" fill="white" text-anchor="middle">${parseBold(line)}</text>`;
            }).join('\n');

            const textSvg = Buffer.from(`
              <svg width="${BOX_WIDTH}" height="${BOX_HEIGHT}" xmlns="http://www.w3.org/2000/svg">
                ${textElements}
              </svg>
            `);

            // Quote mark
            const quoteIcon = Buffer.from(`
              <svg width="100" height="90" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="80" font-family="Georgia,serif" font-size="${QUOTE_MARK_SIZE}" fill="white" fill-opacity="0.95">“</text>
              </svg>
            `);

            // Website footer
            const footerSvg = Buffer.from(`
              <svg width="${IMAGE_WIDTH}" height="60" xmlns="http://www.w3.org/2000/svg">
                <text x="${IMAGE_WIDTH/2}" y="40" font-family="Inter,Arial" font-size="32" fill="white" text-anchor="middle" opacity="0.9">${WEBSITE_TEXT}</text>
              </svg>
            `);

            // Composite everything - background untouched
            await sharp(base)
             .composite([
                { input: glass, left: BOX_X, top: BOX_Y },
                { input: quoteIcon, left: BOX_X - 5, top: BOX_Y - 50 },
                { input: textSvg, left: BOX_X, top: BOX_Y },
                { input: footerSvg, left: 0, top: IMAGE_HEIGHT - 100 }
              ])
             .jpeg({ quality: 93 })
             .toFile(outputFile);

            console.log(`✅ Saved: ${outputFilename}`);
            return outputFilename;
          }

          async function main() {
            console.log('🚀 Quote Image Generator Started');
            console.log(`📝 Quote: "${quote.substring(0, 60)}${quote.length > 60? '...' : ''}"`);

            const image = await fetchImage();
            const filename = await processImage(image, quote);

            fs.writeFileSync('output_filename.txt', filename);
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          SCRIPT_EOF

          node run_quote.js
          rm -f run_quote.js

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add englishquotes/output/
          git diff --staged --quiet || git commit -m "feat: add quote image [skip ci]"
          git push

      - name: Output raw image URL
        run: |
          FILENAME=$(cat output_filename.txt)
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RAW_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/englishquotes/output/${FILENAME}"
          echo "RAW_URL=${RAW_URL}" >> $GITHUB_OUTPUT
          echo "✅ Raw URL: ${RAW_URL}"
        id: output_url

    outputs:
      raw_url: ${{ steps.output_url.outputs.RAW_URL }}
