name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Attribution / handle'
        required: true
        type: string
        default: '@reallygreatsite'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),sharp=require('sharp');
          const OUT='tsapgod/output'; fs.mkdirSync(OUT,{recursive:true});

          const text=process.env.INPUT_TEXT||'Great Things Never Come From Comfort Zones.';
          const verse=process.env.INPUT_VERSE||'@reallygreatsite';
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- CANVAS ---
          const W=1080, H=1080;
          const OUTPUT_FILENAME_PREFIX="quote_";

          // --- TEXT ENGINE ---
          const estimate=(t,fs)=>t.length*fs*0.56;
          function wrapWidth(txt, fs, maxW){
            const words=String(txt).trim().split(/\s+/); const lines=[]; let cur='';
            for(const w of words){
              const test=cur?cur+' '+w:w;
              if(estimate(test,fs)<=maxW){cur=test;continue}
              if(cur) lines.push(cur);
              if(estimate(w,fs)>maxW){let p=''; for(const ch of w){if(estimate(p+ch,fs)<=maxW)p+=ch;else{lines.push(p);p=ch}} cur=p}else cur=w;
            }
            if(cur) lines.push(cur); return lines;
          }

          const cardW=880, cardH=620, cardX=100, cardY=380;
          const maxW=cardW-160;
          let quoteF=78;
          let lines=[];
          for(let i=0;i<20;i++){
            lines=wrapWidth(text, quoteF, maxW);
            const h=lines.length*quoteF*1.22;
            if(h<=380 && lines.length<=4) break;
            quoteF-=3;
          }

          (async()=>{
            // 1. BACKGROUND - dark textured
            const randomId = Math.floor(Math.random() * 200);
            const url = `https://picsum.photos/id/${randomId}/${W}/${H}?cb=${Date.now()}`;
            const res = await fetch(url);
            const bgBuf = await sharp(Buffer.from(await res.arrayBuffer()))
              .resize(W,H,{fit:'cover'})
              .modulate({brightness:0.45, saturation:0.7})
              .linear(0.75, -30)
              .blur(0.3)
              .toBuffer();

            // 2. AVATAR - use repo avatar.jpg if present
            let avatarSource;
            if(fs.existsSync('avatar.jpg')) avatarSource = fs.readFileSync('avatar.jpg');
            else if(fs.existsSync('assets/avatar.jpg')) avatarSource = fs.readFileSync('assets/avatar.jpg');
            else {
              const av = await fetch('https://picsum.photos/seed/profile/800');
              avatarSource = Buffer.from(await av.arrayBuffer());
            }
            const avatarSize=340;
            const avatarCircle = await sharp(avatarSource)
              .resize(avatarSize,avatarSize,{fit:'cover'})
              .composite([{input: Buffer.from(`<svg><circle cx="${avatarSize/2}" cy="${avatarSize/2}" r="${avatarSize/2}"/></svg>`), blend:'dest-in'}])
              .png().toBuffer();
            const avatarB64 = avatarCircle.toString('base64');

            // 3. SVG OVERLAY
            const cx=W/2, avatarY=285, ringR=188;
            let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="24" stdDeviation="28" flood-opacity="0.35"/>
                </filter>
              </defs>

              <!-- sparkle stars -->
              <g fill="white">
                <path d="M90 70 l14 32 l32 14 l-32 14 l-14 32 l-14 -32 l-32 -14 l32 -14 z" opacity="0.95"/>
                <path d="M${W-90} 70 l14 32 l32 14 l-32 14 l-14 32 l-14 -32 l-32 -14 l32 -14 z" opacity="0.95"/>
              </g>

              <!-- card -->
              <g filter="url(#softShadow)">
                <rect x="${cardX}" y="${cardY}" width="${cardW}" height="${cardH}" rx="48" fill="rgba(225,226,230,0.82)"/>
              </g>

              <!-- avatar ring -->
              <circle cx="${cx}" cy="${avatarY}" r="${ringR}" fill="white"/>
              <image href="data:image/png;base64,${avatarB64}" x="${cx-avatarSize/2}" y="${avatarY-avatarSize/2}" width="${avatarSize}" height="${avatarSize}"/>
            `;

            // quote marks and text
            const textStartY = cardY + 190;
            svg+=`<text x="${cardX+70}" y="${textStartY-20}" font-family="Georgia,serif" font-size="110" fill="black">“</text>`;
            
            let y=textStartY;
            lines.forEach(l=>{
              svg+=`<text x="${cx}" y="${y}" font-family="Inter,Helvetica,Arial" font-size="${quoteF}" font-weight="500" fill="black" text-anchor="middle">${esc(l)}</text>`;
              y+=quoteF*1.22;
            });
            
            svg+=`<text x="${cardX+cardW-70}" y="${y-20}" font-family="Georgia,serif" font-size="110" fill="black" text-anchor="end">”</text>`;
            
            // attribution
            svg+=`<text x="${cx}" y="${cardY+cardH-70}" font-family="Inter,Helvetica,Arial" font-size="36" fill="#222" text-anchor="middle" opacity="0.9">${esc(verse)}</text>`;

            svg+=`</svg>`;

            const overlay = Buffer.from(svg);
            const fname=`${OUTPUT_FILENAME_PREFIX}${Date.now()}.png`;
            const outPath=path.join(OUT,fname);
            
            await sharp(bgBuf).composite([{input:overlay}]).png({quality:98}).toFile(outPath);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${fname}\n`);
            console.log('Generated', fname);
          })();
          NODE

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Generate quote overlay (1080x1080)" && git push || echo "No changes to commit"
