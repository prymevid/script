name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE_SCRIPT'
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');

          // ----------------------------------------------------------------------
          // Configuration
          // ----------------------------------------------------------------------
          const OUTPUT_DIR = 'tsapgod/output';
          const OUTPUT_PREFIX = 'out_';
          const W = 720;
          const H = 900;
          const CARD_W = 640;
          const CARD_PAD_X = 44;
          const CARD_PAD_Y = 72;
          const VERTICAL_OFFSET = 0;

          const VERSE_FONT_SIZE_MAX = 32;
          const VERSE_FONT_SIZE_MIN = 22;
          const TEXT_FONT_SIZE_MAX = 44;
          const TEXT_FONT_SIZE_MIN = 24;
          const LINE_HEIGHT_FACTOR = 1.48;
          const MAX_CARD_CONTENT_HEIGHT = 580;
          const MAX_TEXT_LINES = 7;
          const CHAR_WIDTH_ESTIMATE = 0.55;

          // ----------------------------------------------------------------------
          // Helpers
          // ----------------------------------------------------------------------
          function estimateWidth(str, fontSize) {
            return String(str).length * fontSize * CHAR_WIDTH_ESTIMATE;
          }

          function wrapText(text, fontSize, maxWidth) {
            const words = String(text).trim().split(/\s+/);
            const lines = [];
            let currentLine = '';

            for (const word of words) {
              const testLine = currentLine ? currentLine + ' ' + word : word;
              if (estimateWidth(testLine, fontSize) <= maxWidth) {
                currentLine = testLine;
                continue;
              }
              if (currentLine) lines.push(currentLine);
              if (estimateWidth(word, fontSize) > maxWidth) {
                let partial = '';
                for (const ch of word) {
                  if (estimateWidth(partial + ch, fontSize) <= maxWidth) {
                    partial += ch;
                  } else {
                    lines.push(partial);
                    partial = ch;
                  }
                }
                currentLine = partial;
              } else {
                currentLine = word;
              }
            }
            if (currentLine) lines.push(currentLine);
            return lines;
          }

          function computeAdaptiveSizes(verse, quote) {
            const maxContentWidth = CARD_W - CARD_PAD_X * 2;
            let verseFontSize = VERSE_FONT_SIZE_MAX;
            let textFontSize = TEXT_FONT_SIZE_MAX;
            let verseLines, textLines;
            let totalHeight, anyLineTooWide;

            for (let attempt = 0; attempt < 30; attempt++) {
              verseLines = wrapText(verse, verseFontSize, maxContentWidth);
              textLines = wrapText(quote, textFontSize, maxContentWidth);
              const verseHeight = verseLines.length * verseFontSize * LINE_HEIGHT_FACTOR;
              const textHeight = textLines.length * textFontSize * LINE_HEIGHT_FACTOR;
              totalHeight = verseHeight + 46 + textHeight;
              anyLineTooWide = [...verseLines, ...textLines].some(
                line => estimateWidth(line, line.length < 20 ? verseFontSize : textFontSize) > maxContentWidth + 4
              );
              const heightOk = totalHeight <= MAX_CARD_CONTENT_HEIGHT;
              const lineCountOk = textLines.length <= MAX_TEXT_LINES;
              if (heightOk && !anyLineTooWide && lineCountOk) break;
              if (anyLineTooWide || textLines.length > 5 || !heightOk) {
                textFontSize = Math.max(TEXT_FONT_SIZE_MIN, textFontSize - 2);
              } else {
                verseFontSize = Math.max(VERSE_FONT_SIZE_MIN, verseFontSize - 1);
              }
              if (verseFontSize === VERSE_FONT_SIZE_MIN && textFontSize === TEXT_FONT_SIZE_MIN) break;
            }
            return { verseFontSize, textFontSize, verseLines, textLines, totalHeight };
          }

          function escapeXml(unsafe) {
            return String(unsafe)
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&apos;');
          }

          // ----------------------------------------------------------------------
          // Robust background fetcher with fallback chain
          // ----------------------------------------------------------------------
          async function fetchImageBuffer(url, timeoutMs = 8000) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), timeoutMs);
            try {
              const response = await fetch(url, {
                signal: controller.signal,
                headers: { 'User-Agent': 'Mozilla/5.0 (compatible; GitHubActions)' }
              });
              clearTimeout(timeout);
              if (!response.ok) throw new Error(`HTTP ${response.status}`);
              const buffer = Buffer.from(await response.arrayBuffer());
              // Validate it's an actual image
              const metadata = await sharp(buffer).metadata();
              if (!metadata.width || !metadata.height) throw new Error('Invalid image data');
              return buffer;
            } catch (err) {
              clearTimeout(timeout);
              throw err;
            }
          }

          async function fetchRandomBackground() {
            const sources = [
              // Primary: Picsum random photo
              async () => {
                const url = `https://picsum.photos/${W}/${H}?random=${Date.now()}`;
                const buffer = await fetchImageBuffer(url);
                return { buffer, source: 'picsum' };
              },
              // Fallback 1: Picsum with explicit ID
              async () => {
                const url = `https://picsum.photos/id/1000/${W}/${H}`;
                const buffer = await fetchImageBuffer(url);
                return { buffer, source: 'picsum-fallback' };
              },
              // Fallback 2: LoremFlickr
              async () => {
                const url = `https://loremflickr.com/${W}/${H}/nature?random=${Date.now()}`;
                const buffer = await fetchImageBuffer(url);
                return { buffer, source: 'loremflickr' };
              },
              // Fallback 3: Solid color gradient (always works)
              async () => {
                const svgGradient = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0%" stop-color="#1e1b4b"/>
                      <stop offset="100%" stop-color="#312e81"/>
                    </linearGradient>
                  </defs>
                  <rect width="${W}" height="${H}" fill="url(#bg)"/>
                </svg>`;
                const buffer = await sharp(Buffer.from(svgGradient)).png().toBuffer();
                return { buffer, source: 'gradient-fallback' };
              }
            ];

            for (const [idx, sourceFn] of sources.entries()) {
              try {
                const result = await sourceFn();
                console.log(`✅ Background fetched from ${result.source}`);
                return result;
              } catch (err) {
                console.warn(`⚠️ Source ${idx + 1} failed: ${err.message}`);
                if (idx === sources.length - 1) throw err;
              }
            }
            throw new Error('All background sources exhausted');
          }

          // ----------------------------------------------------------------------
          // Main
          // ----------------------------------------------------------------------
          (async () => {
            fs.mkdirSync(OUTPUT_DIR, { recursive: true });
            const text = process.env.INPUT_TEXT || '';
            const verse = process.env.INPUT_VERSE || '';

            const { verseFontSize, textFontSize, verseLines, textLines, totalHeight } = computeAdaptiveSizes(verse, text);
            const cardHeight = Math.min(CARD_PAD_Y * 2 + totalHeight + 24, 760);
            const cardTop = (H - cardHeight) / 2 - VERTICAL_OFFSET;
            const cardLeft = (W - CARD_W) / 2;

            // Fetch background photo (or fallback)
            const { buffer: bgBuffer, source } = await fetchRandomBackground();

            // Process background: moderate blur, slight darken, boost saturation
            const background = await sharp(bgBuffer)
              .resize(W, H, { fit: 'cover' })
              .blur(source !== 'gradient-fallback' ? 20 : 0)   // gentler blur so photo is visible
              .modulate({ brightness: 0.75, saturation: 1.1 })
              .toBuffer();

            // Premium light‑theme color palettes
            const STYLES = [
              { g1: '#7C3AED', g2: '#EC4899', g3: '#F59E0B' },
              { g1: '#0EA5E9', g2: '#06B6D4', g3: '#6366F1' },
              { g1: '#F97316', g2: '#DC2626', g3: '#EAB308' },
              { g1: '#059669', g2: '#10B981', g3: '#22D3EE' },
              { g1: '#F43F5E', g2: '#F97316', g3: '#FBBF24' },
              { g1: '#1E3A8A', g2: '#06B6D4', g3: '#22D3EE' },
              { g1: '#EAB308', g2: '#F472B6', g3: '#F59E0B' },
              { g1: '#047857', g2: '#34D399', g3: '#A7F3D0' },
              { g1: '#8B5CF6', g2: '#D946EF', g3: '#F59E0B' },
              { g1: '#0284C7', g2: '#2DD4BF', g3: '#A5F3FC' }
            ];

            const style = STYLES[Math.floor(Math.random() * STYLES.length)];
            const cardFill = 'rgba(255,255,255,0.96)';
            const textColor = '#0F172A';

            // ------------------------------------------------------------------
            // SVG construction – TRANSPARENT BACKGROUND (photo shows through)
            // ------------------------------------------------------------------
            let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${style.g1}"/>
                  <stop offset="100%" stop-color="${style.g2}"/>
                </linearGradient>
                <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="${style.g2}"/>
                  <stop offset="100%" stop-color="${style.g3}"/>
                </linearGradient>
                <linearGradient id="g3" x1="0" y1="1" x2="1" y2="0">
                  <stop offset="0%" stop-color="${style.g3}"/>
                  <stop offset="100%" stop-color="${style.g1}"/>
                </linearGradient>
                <radialGradient id="halo" cx="50%" cy="28%" r="70%">
                  <stop offset="0%" stop-color="${style.g1}" stop-opacity="0.2"/>
                  <stop offset="100%" stop-color="${style.g1}" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="vig" cx="50%" cy="50%" r="75%">
                  <stop offset="65%" stop-color="black" stop-opacity="0"/>
                  <stop offset="100%" stop-color="black" stop-opacity="0.18"/>
                </radialGradient>
                <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="white" stop-opacity="0.92"/>
                  <stop offset="40%" stop-color="white" stop-opacity="0"/>
                </linearGradient>
                <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="26" stdDeviation="30" flood-opacity="0.28"/>
                </filter>
                <filter id="glow">
                  <feGaussianBlur stdDeviation="16"/>
                  <feMerge>
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
                <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
                  <circle cx="1.6" cy="1.6" r="1" fill="white" opacity="0.08"/>
                </pattern>
                <pattern id="dotPattern" width="20" height="20" patternUnits="userSpaceOnUse">
                  <circle cx="10" cy="10" r="1.5" fill="url(#g)" opacity="0.2"/>
                </pattern>
              </defs>

              <!-- Semi‑transparent overlay to improve text readability without killing the photo -->
              <rect width="${W}" height="${H}" fill="black" fill-opacity="0.18"/>
              <rect width="${W}" height="${H}" fill="url(#halo)"/>
              <rect width="${W}" height="${H}" fill="url(#grid)"/>
              <rect width="${W}" height="${H}" fill="url(#vig)"/>

              <!-- Decorative glowing circles (subtle) -->
              <circle cx="140" cy="160" r="160" fill="url(#g)" opacity="0.12" filter="url(#glow)"/>
              <circle cx="600" cy="780" r="190" fill="url(#g2)" opacity="0.1" filter="url(#glow)"/>
              <circle cx="120" cy="740" r="120" fill="url(#g3)" opacity="0.08" filter="url(#glow)"/>
              <circle cx="580" cy="200" r="80" fill="url(#g3)" opacity="0.06" filter="url(#glow)"/>

              <!-- Main card (opaque white, will overlay the photo) -->
              <g transform="translate(${cardLeft},${cardTop})">
                <rect width="${CARD_W}" height="${cardHeight}" rx="34" fill="${cardFill}" filter="url(#shadow)"/>
                <rect x="3" y="3" width="${CARD_W-6}" height="${cardHeight-6}" rx="31" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
                <rect x="1" y="1" width="${CARD_W-2}" height="${cardHeight-2}" rx="33" fill="none" stroke="url(#g)" stroke-opacity="0.28" stroke-width="1.4"/>
                <rect x="12" y="12" width="${CARD_W-24}" height="${cardHeight-24}" rx="22" fill="none" stroke="url(#dotPattern)" stroke-width="4"/>
                <rect x="0" y="0" width="${CARD_W}" height="${Math.min(210, cardHeight*0.38)}" rx="34" fill="url(#sheen)"/>
                <rect width="${CARD_W}" height="${cardHeight}" rx="34" fill="url(#grid)" opacity="0.25"/>

                <!-- Corner decorations -->
                <g stroke="url(#g)" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round">
                  <path d="M22,22 h36 M22,22 v36"/>
                  <path d="M${CARD_W-22},22 h-36 M${CARD_W-22},22 v36"/>
                  <path d="M22,${cardHeight-22} h36 M22,${cardHeight-22} v-36"/>
                  <path d="M${CARD_W-22},${cardHeight-22} h-36 M${CARD_W-22},${cardHeight-22} v-36"/>
                </g>

                <g transform="translate(${CARD_W-48}, 36)">
                  <polygon points="10,0 20,10 10,20 0,10" fill="url(#g2)" opacity="0.7"/>
                  <polygon points="10,3 17,10 10,17 3,10" fill="white" opacity="0.3"/>
                </g>

                <g transform="translate(26,20)">
                  <rect width="104" height="7" rx="3.5" fill="url(#g)"/>
                  <rect x="114" width="68" height="7" rx="3.5" fill="url(#g2)"/>
                  <rect x="192" width="32" height="7" rx="3.5" fill="white" opacity="0.32"/>
                </g>

                <g opacity="0.08">
                  <text x="56" y="${CARD_PAD_Y+18}" font-family="Georgia, serif" font-size="180" fill="url(#g)">“</text>
                  <text x="${CARD_W-56}" y="${cardHeight-36}" font-family="Georgia, serif" font-size="180" fill="url(#g2)" text-anchor="end">”</text>
                </g>`;

            // Verse pill background and text
            let yPos = CARD_PAD_Y + 8;
            const maxVerseLineWidth = Math.max(...verseLines.map(l => estimateWidth(l, verseFontSize)));
            const pillWidth = Math.min(CARD_W - 100, maxVerseLineWidth + 56);
            svg += `<g transform="translate(${(CARD_W - pillWidth) / 2},${yPos})">
              <rect width="${pillWidth}" height="44" rx="22" fill="url(#g)" opacity="0.15"/>
              <rect x="0.7" y="0.7" width="${pillWidth-1.4}" height="42.6" rx="21.3" fill="none" stroke="url(#g)" stroke-opacity="0.45"/>
            </g>`;
            yPos += 30;

            verseLines.forEach(line => {
              svg += `<text x="${CARD_W/2}" y="${yPos}" font-family="'Inter', Arial, sans-serif" font-size="${verseFontSize}" font-weight="800" fill="url(#g)" text-anchor="middle" letter-spacing="0.5">${escapeXml(line.toUpperCase())}</text>`;
              yPos += verseFontSize * LINE_HEIGHT_FACTOR;
            });

            yPos += 10;
            svg += `<line x1="${CARD_W/2 - 100}" y1="${yPos}" x2="${CARD_W/2 + 100}" y2="${yPos}" stroke="url(#g2)" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>`;
            yPos += 36;

            textLines.forEach(line => {
              svg += `<text x="${CARD_W/2}" y="${yPos}" font-family="'Cormorant Garamond', Georgia, serif" font-size="${textFontSize}" font-weight="600" fill="${textColor}" text-anchor="middle">${escapeXml(line)}</text>`;
              yPos += textFontSize * LINE_HEIGHT_FACTOR;
            });

            // Footer dots
            svg += `<g transform="translate(0,${cardHeight - 48})">
              <rect x="48" y="22" width="${CARD_W - 96}" height="1.6" fill="url(#g)" opacity="0.35"/>
              <circle cx="${CARD_W/2 - 14}" cy="22.8" r="3.2" fill="url(#g)"/>
              <circle cx="${CARD_W/2}" cy="22.8" r="3.2" fill="url(#g2)"/>
              <circle cx="${CARD_W/2 + 14}" cy="22.8" r="3.2" fill="url(#g3)"/>
              <circle cx="${CARD_W/2 - 28}" cy="22.8" r="1.2" fill="white" opacity="0.5"/>
              <circle cx="${CARD_W/2 + 28}" cy="22.8" r="1.2" fill="white" opacity="0.5"/>
            </g>`;

            svg += `</g></svg>`;

            const overlay = await sharp(Buffer.from(svg)).png().toBuffer();
            const filename = `${OUTPUT_PREFIX}${Date.now()}.png`;
            const outputPath = path.join(OUTPUT_DIR, filename);

            await sharp(background)
              .composite([{ input: overlay }])
              .png({ quality: 98 })
              .toFile(outputPath);

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${filename}\n`);
            console.log(`✅ Generated 720x900 image (background: ${source}) -> ${outputPath}`);
          })().catch(err => {
            console.error('❌ Generation failed:', err);
            process.exit(1);
          });
          NODE_SCRIPT

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          if git commit -m "Add generated overlay image (720x900)"; then
            git push
          else
            echo "No changes to commit"
          fi
