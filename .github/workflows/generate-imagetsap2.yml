name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
        run: |
          # 1. Selection Logic (70% probability for 2.png)
          RAND_VAL=$(( $RANDOM % 10 ))
          [ $RAND_VAL -lt 7 ] && IMG="tsapgod/image/2.png" || IMG="tsapgod/image/1.png"
          
          # 2. Get Resolution & Calculate Math
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 "$IMG")
          FONT_SIZE=$(( WIDTH / 16 ))
          WRAP_LIMIT=25 # Characters per line for portrait

          # 3. Text Wrapping (Node.js)
          CLEAN_TEXT=$(echo "$INPUT_TEXT" | sed "s/'/\\\\'/g")
          WRAPPED_TEXT=$(node -e "
            const text = process.env.INPUT_TEXT;
            const words = text.split(' ');
            let lines = []; let cur = '';
            words.forEach(w => {
              if ((cur + ' ' + w).length > $WRAP_LIMIT) { lines.push(cur.trim()); cur = w; }
              else { cur += ' ' + w; }
            });
            lines.push(cur.trim());
            console.log(lines.join('\n'));
          ")

          # 4. FFmpeg Execution (Centered with shadow for depth)
          mkdir -p tsapgod/output
          FNAME="out_$(date +%s).png"
          
          ffmpeg -i "$IMG" -vf "drawtext=fontfile=tsapgod/font/mineig.ttf:text='${WRAPPED_TEXT}':fontcolor=0x222222:fontsize=${FONT_SIZE}:x=(w-text_w)/2:y=(h-text_h)/2:line_spacing=15:align=center" -update 1 "tsapgod/output/$FNAME"

          echo "filename=$FNAME" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Generate image" && git push
