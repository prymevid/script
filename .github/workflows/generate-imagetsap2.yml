name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
        run: |
          # ============================================================
          # 🔧 USER CONFIGURABLE PARAMETERS (edit these as you like)
          # ============================================================
          
          # Font settings
          FONT_FILE="tsapgod/font/crimbold.ttf"          # Path to your .ttf file
          TEXT_COLOR="0x333333"                           # Color (hex format 0xRRGGBB)
          LINE_SPACING="20"                               # Pixels between lines
          
          # Text wrapping
          WRAP_LIMIT="28"                                 # Max characters per line
          
          # Font sizing
          # If set to "auto", font size = image_width / FONT_SIZE_FACTOR
          # Set to a fixed number (e.g. 48) to use absolute pixel size
          FONT_SIZE_MODE="auto"                           # "auto" or a number like 72
          FONT_SIZE_FACTOR="18"                           # Used only when MODE="auto" (width/factor)
          
          # Image selection (two images in the repo)
          IMAGE_DIR="tsapgod/image"                       # Folder containing 1.png and 2.png
          PROBABILITY_FOR_2="70"                          # % chance to use 2.png (0-100)
          
          # Output settings
          OUTPUT_DIR="tsapgod/output"
          OUTPUT_FILENAME_PREFIX="out_"
          
          # Text alignment inside the image (ffmpeg drawtext text_align)
          # Values: left, right, center (or combinations like 'left+top')
          TEXT_ALIGN="center"
          
          # ============================================================
          # 🧠 END OF CONFIGURATION – DO NOT EDIT BELOW UNLESS YOU KNOW WHAT YOU'RE DOING
          # ============================================================
          
          # 1. Image selection logic (based on PROBABILITY_FOR_2)
          RAND_VAL=$(( $RANDOM % 100 ))
          if [ $RAND_VAL -lt $PROBABILITY_FOR_2 ]; then
            IMG="$IMAGE_DIR/2.png"
          else
            IMG="$IMAGE_DIR/1.png"
          fi
          
          # 2. Get image width
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 "$IMG")
          
          # 3. Determine font size
          if [ "$FONT_SIZE_MODE" = "auto" ]; then
            FONT_SIZE=$(( WIDTH / FONT_SIZE_FACTOR ))
          else
            FONT_SIZE="$FONT_SIZE_MODE"
          fi
          
          # 4. Text wrapping (Node.js) – produces multiline string with newlines
          WRAPPED_TEXT=$(node -e "
            const text = process.env.INPUT_TEXT;
            const words = text.split(' ');
            let lines = [];
            let cur = '';
            words.forEach(w => {
              if ((cur + ' ' + w).length > $WRAP_LIMIT) {
                lines.push(cur.trim());
                cur = w;
              } else {
                cur += ' ' + w;
              }
            });
            lines.push(cur.trim());
            console.log(lines.join('\n'));
          ")
          
          # 5. Create a temporary text file (UTF-8) containing the wrapped text
          TEMP_TXT=$(mktemp)
          printf "%s" "$WRAPPED_TEXT" > "$TEMP_TXT"
          
          # 6. Create output directory
          mkdir -p "$OUTPUT_DIR"
          FNAME="${OUTPUT_FILENAME_PREFIX}$(date +%s).png"
          
          # 7. Run FFmpeg with drawtext using textfile (no escaping needed)
          ffmpeg -i "$IMG" -vf "drawtext=fontfile=$FONT_FILE:textfile='$TEMP_TXT':fontcolor=$TEXT_COLOR:fontsize=$FONT_SIZE:x=(w-text_w)/2:y=(h-text_h)/2:line_spacing=$LINE_SPACING:text_align=$TEXT_ALIGN" \
            -update 1 "$OUTPUT_DIR/$FNAME"
          
          # 8. Clean up temporary file
          rm -f "$TEMP_TXT"
          
          echo "filename=$FNAME" >> $GITHUB_OUTPUT
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Overlay text on image" && git push || echo "No changes to commit"
