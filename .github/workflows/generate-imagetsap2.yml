name: Generate Overlay Image Pro

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install sharp canvas

      - name: Build Regal Card
        id: build
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'fs';
          import path from 'path';
          import sharp from 'sharp';
          import { createCanvas, registerFont } from 'canvas';

          const OUT = 'tsapgod/output';
          fs.mkdirSync(OUT, { recursive: true });

          const W = 1080, H = 1350;
          const cardW = 920, padX = 64;
          const text = (process.env.INPUT_TEXT || '').trim();
          const verse = (process.env.INPUT_VERSE || '').trim();
          const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          // ---------- Font loading ----------
          const fetchFont = async (url, family) => {
            const res = await fetch(url);
            const buf = Buffer.from(await res.arrayBuffer());
            const fontPath = `/tmp/${family}.ttf`;
            fs.writeFileSync(fontPath, buf);
            registerFont(fontPath, { family });
          };

          await Promise.all([
            fetchFont('https://github.com/google/fonts/raw/main/ofl/fraunces/Fraunces%5Bopsz%2CWONK%2Cwght%5D.ttf', 'Fraunces'),
            fetchFont('https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf', 'Inter')
          ]);

          // ---------- Measurement ----------
          const measureCanvas = createCanvas(10, 10);
          const measureCtx = measureCanvas.getContext('2d');
          const measure = (txt, fontSize, fontFamily = 'Fraunces') => {
            measureCtx.font = `600 ${fontSize}px "${fontFamily}"`;
            return measureCtx.measureText(txt).width;
          };

          const wrap = (txt, fontSize, maxWidth, fontFamily) => {
            const words = txt.split(/\s+/);
            const lines = [];
            let cur = '';
            for (const w of words) {
              const test = cur ? cur + ' ' + w : w;
              if (measure(test, fontSize, fontFamily) <= maxWidth) {
                cur = test;
              } else {
                if (cur) lines.push(cur);
                cur = w;
              }
            }
            if (cur) lines.push(cur);
            return lines;
          };

          // ---------- Adaptive sizing ----------
          let textFontSize = 84, verseFontSize = 28;
          const lineHeight = 1.32;
          const maxWidth = cardW - padX * 2;
          let textLines = wrap(text, textFontSize, maxWidth, 'Fraunces');
          while (textLines.length > 6 || textLines.some(l => measure(l, textFontSize, 'Fraunces') > maxWidth)) {
            textFontSize -= 2;
            textLines = wrap(text, textFontSize, maxWidth, 'Fraunces');
            if (textFontSize < 56) break;
          }

          const contentHeight = textLines.length * textFontSize * lineHeight + 80;
          const cardHeight = Math.min(980, contentHeight + 220);
          const top = (H - cardHeight) / 2;
          const left = (W - cardW) / 2;

          // ---------- Background image with retry ----------
          let bgBuffer;
          for (let i = 0; i < 3; i++) {
            try {
              const id = Math.floor(Math.random() * 1084);
              const res = await fetch(`https://picsum.photos/id/${id}/${W}/${H}`, { signal: AbortSignal.timeout(7000) });
              if (res.ok) {
                bgBuffer = Buffer.from(await res.arrayBuffer());
                break;
              }
            } catch {}
          }
          if (!bgBuffer) throw new Error('Background image download failed');

          const bg = await sharp(bgBuffer)
            .resize(W, H, { fit: 'cover' })
            .blur(36)
            .modulate({ brightness: 0.58, saturation: 1.25 })
            .toBuffer();

          const stats = await sharp(bg).stats();
          const lum = stats.channels[0].mean;
          const isDark = lum < 100;

          // ---------- Premium colour palettes ----------
          const PALETTES = [
            ['#7C3AED', '#EC4899', '#F59E0B'],
            ['#0EA5E9', '#22D3EE', '#6366F1'],
            ['#D946EF', '#F97316', '#EAB308'],
            ['#14B8A6', '#0EA5E9', '#8B5CF6'],
            ['#BE185D', '#F43F5E', '#FB7185'],
            ['#4338CA', '#7C3AED', '#DB2777'],
            ['#0F172A', '#334155', '#64748B'],
            ['#064E3B', '#047857', '#10B981'],
            ['#7F1D1D', '#B91C1C', '#F59E0B'],
            ['#1E3A8A', '#3B82F6', '#60A5FA'],
            ['#581C87', '#9333EA', '#C084FC'],
            ['#042F2E', '#0D9488', '#2DD4BF']
          ];
          const [c1, c2, c3] = PALETTES[Math.floor(Math.random() * PALETTES.length)];
          const cardFill = isDark ? 'rgba(8,12,22,0.82)' : 'rgba(255,255,255,0.90)';
          const ink = isDark ? '#F8FAFC' : '#0B1220';
          const mute = isDark ? '#CBD5E1' : '#334155';

          // ---------- Build magnificent SVG ----------
          const svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="${c1}"/>
                <stop offset="100%" stop-color="${c2}"/>
              </linearGradient>
              <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${c2}"/>
                <stop offset="100%" stop-color="${c3}"/>
              </linearGradient>
              <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="${c1}" stop-opacity="0.9"/>
                <stop offset="50%" stop-color="${c2}" stop-opacity="1"/>
                <stop offset="100%" stop-color="${c3}" stop-opacity="0.9"/>
              </linearGradient>
              <radialGradient id="halo" cx="50%" cy="22%" r="65%">
                <stop offset="0%" stop-color="${c1}" stop-opacity="0.35"/>
                <stop offset="100%" stop-color="${c1}" stop-opacity="0"/>
              </radialGradient>
              <filter id="softGlow">
                <feGaussianBlur stdDeviation="22"/>
              </filter>
              <filter id="cardShadow">
                <feDropShadow dx="0" dy="34" stdDeviation="40" flood-color="#000" flood-opacity="0.45"/>
              </filter>
              <pattern id="damask" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M20,0 L40,20 L20,40 L0,20 Z" fill="none" stroke="url(#g1)" stroke-width="0.8" opacity="0.1"/>
                <circle cx="20" cy="20" r="5" fill="url(#g2)" opacity="0.08"/>
              </pattern>
              <g id="cornerOrnament">
                <path d="M0,48 C0,22 22,0 48,0 L80,0" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="18" cy="18" r="7" fill="none" stroke="url(#g2)" stroke-width="1.8"/>
                <circle cx="30" cy="8" r="4" fill="url(#g1)"/>
                <path d="M45,16 Q60,6 76,22" fill="none" stroke="url(#g2)" stroke-width="1.6"/>
              </g>
            </defs>

            <!-- Background -->
            <rect width="${W}" height="${H}" fill="${isDark ? '#020617' : '#F1F5F9'}"/>
            <rect width="${W}" height="${H}" fill="url(#halo)"/>

            <!-- Floating orbs -->
            <circle cx="${W * 0.18}" cy="${H * 0.18}" r="260" fill="url(#g1)" opacity="0.22" filter="url(#softGlow)"/>
            <circle cx="${W * 0.84}" cy="${H * 0.78}" r="300" fill="url(#g2)" opacity="0.20" filter="url(#softGlow)"/>
            <circle cx="${W * 0.5}" cy="${H * 0.92}" r="220" fill="${c3}" opacity="0.16" filter="url(#softGlow)"/>

            <!-- Card with glow aura -->
            <g transform="translate(${left},${top})">
              <rect x="-18" y="-18" width="${cardW + 36}" height="${cardHeight + 36}" rx="48" fill="none" stroke="url(#g1)" stroke-opacity="0.18" stroke-width="36" filter="url(#softGlow)"/>
              <rect width="${cardW}" height="${cardHeight}" rx="38" fill="${cardFill}" filter="url(#cardShadow)"/>

              <!-- Multi‑layer borders -->
              <rect x="0.5" y="0.5" width="${cardW - 1}" height="${cardHeight - 1}" rx="37.5" fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>
              <rect x="4" y="4" width="${cardW - 8}" height="${cardHeight - 8}" rx="34" fill="none" stroke="white" stroke-opacity="${isDark ? 0.08 : 0.55}" stroke-width="1"/>
              <rect x="8" y="8" width="${cardW - 16}" height="${cardHeight - 16}" rx="30" fill="none" stroke="url(#g2)" stroke-width="1" stroke-dasharray="6 6" opacity="0.5"/>

              <!-- Damask pattern overlay -->
              <rect width="${cardW}" height="${cardHeight}" rx="38" fill="url(#damask)"/>

              <!-- Ornate corners -->
              <use href="#cornerOrnament" x="12" y="12"/>
              <use href="#cornerOrnament" transform="translate(${cardW - 12},12) scale(-1,1)"/>
              <use href="#cornerOrnament" transform="translate(12,${cardHeight - 12}) scale(1,-1)"/>
              <use href="#cornerOrnament" transform="translate(${cardW - 12},${cardHeight - 12}) scale(-1,-1)"/>

              <!-- Top decorative bar -->
              <rect x="0" y="0" width="${cardW}" height="110" rx="38" fill="url(#g1)" opacity="0.1"/>
              <path d="M60,28 L${cardW - 60},28" stroke="url(#g2)" stroke-width="2" opacity="0.5"/>
              <circle cx="${cardW / 2}" cy="28" r="5" fill="url(#g1)"/>

              <!-- Large background quote mark -->
              <text x="70" y="180" font-family="Fraunces" font-size="320" fill="url(#g1)" opacity="0.08">“</text>

              <!-- Quote text -->
          `;

          let y = 200;
          textLines.forEach(line => {
            const escapedLine = esc(line);
            svg += `<text x="${cardW / 2}" y="${y}" font-family="Fraunces" font-size="${textFontSize}" font-weight="700" fill="${ink}" text-anchor="middle" letter-spacing="-0.5">${escapedLine}</text>`;
            y += textFontSize * lineHeight;
          });

          // Divider with jewels
          y += 30;
          svg += `<line x1="${cardW / 2 - 140}" y1="${y}" x2="${cardW / 2 + 140}" y2="${y}" stroke="url(#g2)" stroke-width="2.5" opacity="0.7" stroke-linecap="round"/>
                  <circle cx="${cardW / 2}" cy="${y}" r="5" fill="${c2}"/>
                  <circle cx="${cardW / 2 - 22}" cy="${y}" r="3" fill="${c1}"/>
                  <circle cx="${cardW / 2 + 22}" cy="${y}" r="3" fill="${c3}"/>`;

          // Verse pill
          y += 70;
          const pillWidth = Math.min(520, measure(verse, verseFontSize, 'Inter') + 80);
          svg += `<g transform="translate(${(cardW - pillWidth) / 2},${y})">
                    <rect width="${pillWidth}" height="52" rx="26" fill="url(#g1)" opacity="0.15"/>
                    <rect x="0.5" y="0.5" width="${pillWidth - 1}" height="51" rx="25.5" fill="none" stroke="url(#borderGrad)" stroke-width="1.2" opacity="0.8"/>
                    <text x="${pillWidth / 2}" y="33" font-family="Inter" font-size="${verseFontSize}" font-weight="600" fill="${mute}" text-anchor="middle" letter-spacing="2.5">${esc(verse.toUpperCase())}</text>
                  </g>`;

          // Bottom signature line
          svg += `<g transform="translate(${cardW / 2}, ${cardHeight - 50})">
                    <line x1="-90" y1="0" x2="90" y2="0" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
                    <text x="0" y="14" font-family="Inter" font-size="14" fill="${mute}" text-anchor="middle" letter-spacing="3">✦  SIC ITUR AD ASTRA  ✦</text>
                  </g>`;

          svg += `</g></svg>`;

          // ---------- Composite and save ----------
          const overlay = await sharp(Buffer.from(svg)).png().toBuffer();
          const finalImage = await sharp(bg)
            .composite([{ input: overlay, blend: 'over' }])
            .png({ quality: 100 })
            .toBuffer();

          const filename = `regal_${Date.now()}.png`;
          const outPath = path.join(OUT, filename);
          await sharp(finalImage).toFile(outPath);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${filename}\n`);
          console.log('✅ Regal card generated:', filename);
          NODE

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Generate regal overlay card [skip ci]" && git push || echo "No changes to commit"
