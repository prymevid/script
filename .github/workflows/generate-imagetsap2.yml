name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),sharp=require('sharp');
          const OUT='tsapgod/output'; fs.mkdirSync(OUT,{recursive:true});

          const text=process.env.INPUT_TEXT||'';
          const verse=process.env.INPUT_VERSE||'';
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- USER CONFIG (kept) ---
          const WRAP_LIMIT=28;
          const VERTICAL_OFFSET=100;
          const OUTPUT_FILENAME_PREFIX="out_";

          function wrap(t,limit){const w=String(t).trim().split(/\s+/),l=[];let c='';for(const wd of w){const test=(c?c+' ':'')+wd;if(test.length>limit){if(c)l.push(c);c=wd}else{c=test}}if(c)l.push(c);return l}
          const verseLines=wrap(verse, WRAP_LIMIT);
          const textLines=wrap(text, WRAP_LIMIT);

          (async()=>{
            // 1. Random Picsum + heavy blur
            const seed=Math.floor(Math.random()*999999);
            const imgBuf=await fetch(`https://picsum.photos/seed/${seed}/1080/1920`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(imgBuf))
              .resize(1080,1920,{fit:'cover'})
              .blur(28)
              .modulate({brightness:0.68,saturation:1.22})
              .toBuffer();

            // 2. Dynamic sizing
            let textF=56; if(textLines.length>6) textF=52; if(textLines.length>8) textF=48; if(textLines.length>10) textF=44;
            const verseF=36, lh=1.52, pad=110, innerW=920;
            const contentH = verseLines.length*verseF*lh + 42 + textLines.length*textF*lh;
            const cardH = Math.min(pad*2 + contentH + 90, 1580);
            const top = (1920 - cardH)/2 - VERTICAL_OFFSET;

            // 3. Premium styles
            const STYLES=[
              {g1:'#7C3AED',g2:'#EC4899',g3:'#F59E0B',dark:false},
              {g1:'#0EA5E9',g2:'#06B6D4',g3:'#6366F1',dark:false},
              {g1:'#F97316',g2:'#DC2626',g3:'#EAB308',dark:false},
              {g1:'#059669',g2:'#10B981',g3:'#22D3EE',dark:false},
              {g1:'#6366F1',g2:'#8B5CF6',g3:'#EC4899',dark:true},
              {g1:'#0F172A',g2:'#1E293B',g3:'#334155',dark:true},
            ];
            const s=STYLES[Math.floor(Math.random()*STYLES.length)];
            const cardFill=s.dark?'rgba(11,18,32,0.88)':'rgba(255,255,255,0.94)';
            const textColor=s.dark?'#F1F5F9':'#0F172A';
            const subColor=s.dark?'#CBD5E1':'#475569';

            // 4. Build comprehensive SVG
            let svg=`<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${s.g1}"/><stop offset="100%" stop-color="${s.g2}"/></linearGradient>
                <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.g2}"/><stop offset="100%" stop-color="${s.g3}"/></linearGradient>
                <radialGradient id="halo" cx="50%" cy="20%" r="65%"><stop offset="0%" stop-color="${s.g1}" stop-opacity="0.32"/><stop offset="100%" stop-color="${s.g1}" stop-opacity="0"/></radialGradient>
                <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="${s.dark?0.18:0.92}"/><stop offset="45%" stop-color="white" stop-opacity="0"/></linearGradient>
                <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="42" stdDeviation="48" flood-color="#000" flood-opacity="${s.dark?0.7:0.32}"/></filter>
                <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
                <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.3" fill="white" opacity="${s.dark?0.07:0.14}"/></pattern>
              </defs>

              <!-- atmosphere -->
              <rect width="1080" height="1920" fill="url(#halo)" opacity="0.7"/>
              <rect width="1080" height="1920" fill="url(#grid)" opacity="0.5"/>
              <circle cx="210" cy="300" r="240" fill="url(#g)" opacity="0.22" filter="url(#blur18)"/>
              <circle cx="900" cy="1680" r="300" fill="url(#g2)" opacity="0.2" filter="url(#blur18)"/>

              <g transform="translate(80,${top})">
                <!-- main card -->
                <rect width="${innerW}" height="${cardH}" rx="58" fill="${cardFill}" filter="url(#shadow)" stroke="rgba(255,255,255,${s.dark?0.09:0.22})" stroke-width="1.8"/>
                <rect x="2" y="2" width="${innerW-4}" height="${cardH-4}" rx="56" fill="none" stroke="url(#g)" stroke-opacity="0.28" stroke-width="1.2"/>
                <rect x="0" y="0" width="${innerW}" height="${Math.min(380,cardH*0.48)}" rx="58" fill="url(#sheen)"/>

                <!-- top accent -->
                <g transform="translate(44,38)">
                  <rect width="150" height="9" rx="4.5" fill="url(#g)"/>
                  <rect x="166" width="90" height="9" rx="4.5" fill="url(#g2)" opacity="0.9"/>
                  <rect x="272" width="44" height="9" rx="4.5" fill="white" opacity="${s.dark?0.18:0.35}"/>
                </g>

                <!-- ghost quotes -->
                <text x="140" y="${pad+110}" font-family="Georgia, serif" font-size="300" fill="url(#g)" opacity="${s.dark?0.14:0.1}">“</text>
                <text x="${innerW-140}" y="${cardH-70}" font-family="Georgia, serif" font-size="300" fill="url(#g2)" opacity="${s.dark?0.14:0.1}" text-anchor="end">”</text>
            `;

            // verse pill
            let y = pad + 70;
            const pillW = Math.min(640, Math.max(...verseLines.map(l=>l.length))*18 + 80);
            svg+=`<g transform="translate(${(innerW-pillW)/2},${y-56})"><rect width="${pillW}" height="52" rx="26" fill="url(#g)" opacity="0.14"/><rect x="1" y="1" width="${pillW-2}" height="50" rx="25" fill="none" stroke="url(#g)" stroke-opacity="0.35"/></g>`;
            verseLines.forEach(l=>{ svg+=`<text x="${innerW/2}" y="${y}" font-family="Inter, 'SF Pro Display', Arial" font-size="${verseF}" font-weight="800" fill="url(#g)" text-anchor="middle" letter-spacing="0.6">${esc(l.toUpperCase())}</text>`; y+=verseF*lh; });
            y+=12;
            svg+=`<line x1="${innerW/2-120}" y1="${y}" x2="${innerW/2+120}" y2="${y}" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>`;
            y+=38;

            // main quote
            textLines.forEach((l,i)=>{ svg+=`<text x="${innerW/2}" y="${y}" font-family="'Cormorant Garamond', Georgia, serif" font-size="${textF}" font-weight="600" fill="${textColor}" text-anchor="middle" letter-spacing="0.2">${esc(l)}</text>`; y+=textF*lh; });

            // footer ornament
            svg+=`<g transform="translate(0,${cardH-64})">
              <rect x="60" y="28" width="${innerW-120}" height="2" fill="url(#g)" opacity="0.35"/>
              <circle cx="${innerW/2-18}" cy="29" r="4" fill="url(#g)"/>
              <circle cx="${innerW/2}" cy="29" r="4" fill="url(#g2)"/>
              <circle cx="${innerW/2+18}" cy="29" r="4" fill="${s.g3}"/>
            </g>`;

            svg+=`</g></svg>`;

            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const fname=`${OUTPUT_FILENAME_PREFIX}${Date.now()}.png`;
            const outPath=path.join(OUT,fname);
            await sharp(bg).composite([{input:overlay}]).png({quality:98}).toFile(outPath);

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${fname}\n`);
            console.log('Generated:', outPath, s.g1);
          })();
          NODE
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Overlay verse and text on image" && git push || echo "No changes to commit"
