name: Generate Overlay Image 2.0

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text content'
        required: true
        type: string
      verse:
        description: 'Verse reference or Title'
        required: true
        type: string
      author:
        description: 'Optional Author/Handle'
        required: false
        default: '@milo_engine'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install sharp

      - name: Process High-Fidelity Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
          INPUT_AUTHOR: ${{ github.event.inputs.author }}
        run: |
          node - <<'NODE_SCRIPT'
          const fs = require('fs').promises;
          const path = require('path');
          const crypto = require('crypto');
          const sharp = require('sharp');

          /**
           * CONFIGURATION & DESIGN TOKENS
           */
          const CONFIG = {
            width: 720,
            height: 900,
            outputDir: 'tsapgod/output',
            card: {
              width: 640,
              paddingX: 50,
              paddingY: 80,
              radius: 40,
              glassOpacity: 0.94
            },
            typography: {
              lineHeight: 1.45,
              verseMax: 34,
              textMax: 46,
              textMin: 24
            }
          };

          /**
           * UTILITIES
           */
          const escapeXml = (str) => str.replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":"&apos;"}[c]));
          
          function wrapText(text, fontSize, maxWidth) {
            const words = text.split(/\s+/);
            const lines = [];
            let currentLine = '';
            words.forEach(word => {
              const test = currentLine ? `${currentLine} ${word}` : word;
              if (test.length * fontSize * 0.52 < maxWidth) currentLine = test;
              else { lines.push(currentLine); currentLine = word; }
            });
            if (currentLine) lines.push(currentLine);
            return lines;
          }

          async function fetchBackground() {
            const id = Math.floor(Math.random() * 1000);
            const url = `https://picsum.photos/id/${id}/${CONFIG.width}/${CONFIG.height}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error("Image fetch failed");
            return { buffer: Buffer.from(await res.arrayBuffer()), id };
          }

          /**
           * MAIN GENERATOR
           */
          (async () => {
            await fs.mkdir(CONFIG.outputDir, { recursive: true });

            const { buffer: bgRaw, id: bgId } = await fetchBackground();
            const timestamp = new Date().toISOString().split('T')[0];
            const serial = crypto.randomBytes(3).toString('hex').toUpperCase();

            // 1. Process Background (Atmospheric Depth)
            const background = await sharp(bgRaw)
              .resize(CONFIG.width, CONFIG.height)
              .blur(30)
              .modulate({ brightness: 0.65, saturation: 1.1 })
              .toBuffer();

            // 2. Select Aesthetics
            const themes = [
              { g1: '#6366f1', g2: '#a855f7', dark: true, accent: '#f472b6' },
              { g1: '#1e293b', g2: '#0f172a', dark: true, accent: '#38bdf8' },
              { g1: '#f8fafc', g2: '#f1f5f9', dark: false, accent: '#4f46e5' }
            ];
            const theme = themes[Math.floor(Math.random() * themes.length)];
            const textColor = theme.dark ? '#ffffff' : '#0f172a';

            // 3. Adaptive Layout Logic
            const vLines = wrapText(process.env.INPUT_VERSE, CONFIG.typography.verseMax, CONFIG.card.width - 100);
            const qLines = wrapText(process.env.INPUT_TEXT, CONFIG.typography.textMax, CONFIG.card.width - 100);
            const cardHeight = Math.max(500, (vLines.length + qLines.length) * 60 + 200);
            const cardTop = (CONFIG.height - cardHeight) / 2;

            // 4. Construct SVG (The Layered Composition)
            const svg = `
            <svg width="${CONFIG.width}" height="${CONFIG.height}" viewBox="0 0 ${CONFIG.width} ${CONFIG.height}" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="noise" x="0" y="0">
                  <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
                  <feColorMatrix type="saturate" values="0" />
                  <feComponentTransfer><feFuncA type="linear" slope="0.05" /></feComponentTransfer>
                  <feComposite operator="in" in2="SourceGraphic" />
                </filter>
                <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${theme.dark ? '#ffffff' : '#000000'}" stop-opacity="0.08" />
                  <stop offset="100%" stop-color="${theme.dark ? '#ffffff' : '#000000'}" stop-opacity="0.02" />
                </linearGradient>
              </defs>

              <rect width="100%" height="100%" filter="url(#noise)" opacity="0.4" />

              <g transform="translate(${(CONFIG.width - CONFIG.card.width) / 2}, ${cardTop})">
                <rect width="${CONFIG.card.width}" height="${cardHeight}" rx="${CONFIG.card.radius}" 
                      fill="${theme.dark ? 'rgba(15,23,42,0.85)' : 'rgba(255,255,255,0.92)'}" />
                <rect width="${CONFIG.card.width}" height="${cardHeight}" rx="${CONFIG.card.radius}" 
                      fill="url(#cardGrad)" stroke="${textColor}" stroke-opacity="0.1" stroke-width="1.5" />

                <text x="40" y="45" font-family="monospace" font-size="12" fill="${textColor}" opacity="0.4">
                  REF: ${serial} // CID: ${bgId} // TS: ${timestamp}
                </text>
                
                <circle cx="${CONFIG.card.width - 45}" cy="42" r="6" fill="${theme.accent}" />
                <circle cx="${CONFIG.card.width - 65}" cy="42" r="6" fill="${theme.accent}" opacity="0.3" />

                <g transform="translate(${CONFIG.card.width / 2}, 110)">
                  ${vLines.map((l, i) => `
                    <text y="${i * 40}" font-family="sans-serif" font-weight="900" font-size="28" 
                          fill="${theme.accent}" text-anchor="middle" letter-spacing="2">
                      ${escapeXml(l.toUpperCase())}
                    </text>
                  `).join('')}
                </g>

                <rect x="${CONFIG.card.width / 2 - 40}" y="${140 + (vLines.length * 30)}" width="80" height="4" rx="2" fill="${theme.accent}" opacity="0.5" />

                <g transform="translate(${CONFIG.card.width / 2}, ${220 + (vLines.length * 30)})">
                  ${qLines.map((l, i) => `
                    <text y="${i * 55}" font-family="serif" font-style="italic" font-size="38" 
                          fill="${textColor}" text-anchor="middle">
                      "${escapeXml(l)}"
                    </text>
                  `).join('')}
                </g>

                <g transform="translate(40, ${cardHeight - 40})">
                  <text font-family="sans-serif" font-weight="bold" font-size="14" fill="${textColor}" opacity="0.6">
                    ${escapeXml(process.env.INPUT_AUTHOR)}
                  </text>
                  <rect x="0" y="10" width="120" height="1" fill="${textColor}" opacity="0.2" />
                </g>
              </g>
            </svg>`;

            const filename = `asset_${serial}_${Date.now()}.png`;
            const finalPath = path.join(CONFIG.outputDir, filename);

            await sharp(background)
              .composite([{ input: Buffer.from(svg), blend: 'over' }])
              .png({ compressionLevel: 9, quality: 100 })
              .toFile(finalPath);

            console.log(`::set-output name=filename::${filename}`);
            console.log(`Successfully generated premium card: ${finalPath}`);
          })().catch(e => { console.error(e); process.exit(1); });
          NODE_SCRIPT

      - name: Deploy Assets
        run: |
          git config user.name "Milo-CI"
          git config user.email "milo@engine.ai"
          git add tsapgod/output/
          git commit -m "chore: vault new premium asset [skip ci]" || echo "No changes"
          git push
