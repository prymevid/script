name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Attribution / handle'
        required: true
        type: string
      gtoken:
        description: 'GitHub Token (for auth if needed)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Dependencies
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs = require('fs/promises');
          const path = require('path');
          const sharp = require('sharp');

          const CONFIG = {
            width: 1080,
            height: 1350, // Standard 4:5 portrait for social media
            padding: 80,
            colors: {
              blue: '#0052cc',
              darkBlue: '#003d99',
              yellow: '#f2cc0c',
              white: '#ffffff',
              lightGray: '#f1f1f1',
              text: '#000000',
              subtext: '#555555'
            },
            outDir: 'tsapgod/output'
          };

          const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          /**
           * Logic to wrap text for SVG rendering
           */
          function wrapText(text, fontSize, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';

            words.forEach(word => {
              const testLine = currentLine ? `${currentLine} ${word}` : word;
              // Rough estimate: character width is ~0.5 of font size
              if (testLine.length * (fontSize * 0.5) < maxWidth) {
                currentLine = testLine;
              } else {
                lines.push(currentLine);
                currentLine = word;
              }
            });
            lines.push(currentLine);
            return lines;
          }

          async function generate() {
            await fs.mkdir(CONFIG.outDir, { recursive: true });

            const text = process.env.INPUT_TEXT || "Success doesn't come from what you do occasionally...";
            const verse = process.env.INPUT_VERSE || "Samira Hadid";

            // 1. Create Background with Gradient and Stripes
            const background = Buffer.from(`
              <svg width="${CONFIG.width}" height="${CONFIG.height}">
                <defs>
                  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:${CONFIG.colors.blue};stop-opacity:1" />
                    <stop offset="100%" style="stop-color:${CONFIG.colors.darkBlue};stop-opacity:1" />
                  </linearGradient>
                </defs>
                <rect width="100%" height="100%" fill="url(#grad)" />
                <path d="M0 400 L400 0 M0 800 L800 0 M0 1200 L1200 0" stroke="rgba(255,255,255,0.05)" stroke-width="100" fill="none" />
              </svg>
            `);

            // 2. Prepare Avatar (using a placeholder or local file)
            let avatarBuffer;
            try {
              avatarBuffer = await fs.readFile('avatar.jpg');
            } catch {
              // Fallback to generating a colored box if no avatar exists
              avatarBuffer = await sharp({
                create: { width: 400, height: 500, channels: 4, background: CONFIG.colors.yellow }
              }).png().toBuffer();
            }

            const roundedAvatar = await sharp(avatarBuffer)
              .resize(240, 300, { fit: 'cover' })
              .composite([{
                input: Buffer.from(`<svg><rect x="0" y="0" width="240" height="300" rx="40" fill="white"/></svg>`),
                blend: 'dest-in'
              }])
              .png()
              .toBuffer();

            // 3. Construct the UI Layer (SVG)
            const fontSize = 58;
            const wrappedLines = wrapText(text, fontSize, 750);
            
            const uiOverlay = Buffer.from(`
              <svg width="${CONFIG.width}" height="${CONFIG.height}" xmlns="http://www.w3.org/2000/svg">
                <path d="M110 150 Q110 130 130 130 L250 130 L250 250 L180 250 Q180 200 110 200 Z" fill="${CONFIG.colors.yellow}" />
                <path d="M110 150 L110 250 L180 250 L180 150 Z" fill="${CONFIG.colors.yellow}" transform="translate(85,0)" />
                
                <text x="320" y="210" font-family="Arial" font-size="32" font-weight="bold" fill="white">Motivational Quotes</text>
                <line x1="320" y1="230" x2="600" y2="230" stroke="white" stroke-width="2" />

                <rect x="110" y="350" width="860" height="650" rx="60" fill="white" />
                
                <g font-family="Georgia, serif" font-size="${fontSize}" fill="${CONFIG.colors.text}">
                  ${wrappedLines.map((line, i) => `
                    <text x="160" y="${480 + (i * (fontSize * 1.3))}">${esc(line)}</text>
                  `).join('')}
                </g>

                <rect x="380" y="860" width="450" height="110" rx="20" fill="${CONFIG.colors.lightGray}" />
                <text x="420" y="910" font-family="Arial" font-size="34" font-weight="bold" fill="black">${esc(verse)}</text>
                <text x="420" y="945" font-family="Arial" font-size="22" fill="${CONFIG.colors.subtext}">@reallygreatsite</text>
                
                <circle cx="790" cy="915" r="12" fill="#3897f0" />
                <path d="M784 915 l4 4 l8 -8" fill="none" stroke="white" stroke-width="2" />
              </svg>
            `);

            // 4. Final Composition
            const filename = `quote_${Date.now()}.png`;
            await sharp(background)
              .composite([
                { input: uiOverlay, top: 0, left: 0 },
                { input: roundedAvatar, top: 780, left: 140 }
              ])
              .png()
              .toFile(path.join(CONFIG.outDir, filename));

            await fs.appendFile(process.env.GITHUB_OUTPUT, `filename=${filename}\n`);
            console.log(`Successfully generated: ${filename}`);
          }

          generate().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "chore: generated quote overlay" || echo "No changes"
          git push || echo "Push failed"
