name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Name / attribution'
        required: true
        type: string
        default: 'Samira Hadid'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const sharp = require('sharp');
          
          const OUT = 'tsapgod/output';
          fs.mkdirSync(OUT, { recursive: true });

          const text = process.env.INPUT_TEXT || "Success doesn't come from what you do occasionally, it comes from what you do consistently.";
          const verse = process.env.INPUT_VERSE || 'Samira Hadid';
          const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          const W = 1080, H = 1350;
          const cardX = 90, cardY = 320, cardW = 900, cardH = 740;

          // text wrapping engine
          const estimate = (t, f) => t.length * f * 0.54;
          function wrap(txt, fSize, maxW) {
            const words = String(txt).trim().split(/\s+/);
            const lines = [];
            let cur = '';
            for (const w of words) {
              const test = cur ? cur + ' ' + w : w;
              if (estimate(test, fSize) <= maxW) { cur = test; continue; }
              if (cur) lines.push(cur);
              cur = w;
            }
            if (cur) lines.push(cur);
            return lines;
          }
          
          let fontSize = 64;
          let lines = wrap(text, fontSize, cardW - 120);
          while (lines.length > 4 && fontSize > 44) {
            fontSize -= 2;
            lines = wrap(text, fontSize, cardW - 120);
          }

          (async () => {
            // load avatar
            let avatarSrc;
            if (fs.existsSync('avatar.jpg')) avatarSrc = fs.readFileSync('avatar.jpg');
            else if (fs.existsSync('assets/avatar.jpg')) avatarSrc = fs.readFileSync('assets/avatar.jpg');
            else {
              const r = await fetch('https://picsum.photos/seed/person/800');
              avatarSrc = Buffer.from(await r.arrayBuffer());
            }
            
            const pw = 280, ph = 360;
            const avatarRounded = await sharp(avatarSrc)
              .resize(pw, ph, { fit: 'cover' })
              .composite([{ input: Buffer.from(`<svg><rect width="${pw}" height="${ph}" rx="32" ry="32" fill="white"/></svg>`), blend: 'dest-in' }])
              .png()
              .toBuffer();
            const avatarB64 = avatarRounded.toString('base64');

            const photoX = cardX + 28;
            const photoY = cardY + cardH - 130;
            const badgeX = photoX + pw + 28;
            const badgeY = photoY + 132;
            const badgeW = 520;
            const badgeH = 96;

            let svg = `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#1670E4"/>
                  <stop offset="100%" stop-color="#0A3B8B"/>
                </linearGradient>
              </defs>
              <rect width="${W}" height="${H}" fill="url(#bg)"/>
              <g fill="white" opacity="0.07">
                <polygon points="560,0 1080,0 1080,560"/>
                <polygon points="0,810 0,1350 700,1350"/>
              </g>
              <g fill="#FFD400" transform="translate(82,132)">
                <path d="M0 132c0-68 34-112 90-112v46c-22 0-36 14-36 42v24H0z"/>
                <path d="M110 132c0-68 34-112 90-112v46c-22 0-36 14-36 42v24h-54z"/>
              </g>
              <text x="305" y="245" font-family="Inter,Arial" font-size="38" fill="white">Motivational Quotes</text>
              <path d="M305 268 H898 a62 62 0 0 1 62 62 v628 a62 62 0 0 1 -62 62 H368" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
              <rect x="${cardX}" y="${cardY}" width="${cardW}" height="${cardH}" rx="42" fill="white"/>
            `;

            let yPos = cardY + 150;
            for (const line of lines) {
              svg += `<text x="${cardX + 62}" y="${yPos}" font-family="Georgia,serif" font-size="${fontSize}" fill="#111111">${esc(line)}</text>`;
              yPos += fontSize * 1.5;
            }

            svg += `<image href="data:image/png;base64,${avatarB64}" x="${photoX}" y="${photoY}" width="${pw}" height="${ph}"/>`;
            svg += `<rect x="${badgeX}" y="${badgeY}" width="${badgeW}" height="${badgeH}" rx="20" fill="#F1F3F5"/>
              <text x="${badgeX + 26}" y="${badgeY + 60}" font-family="Inter,Arial" font-size="38" font-weight="700" fill="#0B0B0B">${esc(verse)}</text>
              <g transform="translate(${badgeX + badgeW - 54},${badgeY + 22})">
                <circle cx="16" cy="16" r="16" fill="#1D9BF0"/>
                <path d="M11 16 l4 4 7-7" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
            </svg>`;

            const outFile = `out_${Date.now()}.png`;
            const outPath = path.join(OUT, outFile);
            await sharp(Buffer.from(svg)).png({ quality: 98 }).toFile(outPath);
            
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${outFile}\n`);
            console.log('Generated:', outFile);
          })();
          NODE

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Generate blue quote card" && git push || echo "No changes"
