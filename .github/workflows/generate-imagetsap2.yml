name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),sharp=require('sharp');
          const OUT='tsapgod/output'; fs.mkdirSync(OUT,{recursive:true});

          const text=process.env.INPUT_TEXT||'';
          const verse=process.env.INPUT_VERSE||'';
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // --- USER CONFIG (kept from original) ---
          const WRAP_LIMIT=28;
          const VERTICAL_OFFSET=100;
          const OUTPUT_FILENAME_PREFIX="out_";

          function wrapChars(t,limit){const w=String(t).trim().split(/\s+/),l=[];let c='';for(const wd of w){const test=(c?c+' ':'')+wd;if(test.length>limit){if(c)l.push(c);c=wd}else{c=test}}if(c)l.push(c);return l}

          const verseLines=wrapChars(verse, WRAP_LIMIT);
          const textLines=wrapChars(text, WRAP_LIMIT);

          (async()=>{
            // 1. Fetch random image from Picsum and blur
            const seed=Math.floor(Math.random()*999999);
            const imgBuf=await fetch(`https://picsum.photos/seed/${seed}/1080/1920`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(imgBuf))
              .resize(1080,1920,{fit:'cover'})
              .blur(26)
              .modulate({brightness:0.70,saturation:1.18})
              .toBuffer();

            // 2. Build premium SVG
            const verseF=46, textF=54, lh=1.38;
            const pad=90, innerW=920;
            const contentH = verseLines.length*verseF*lh + 36 + textLines.length*textF*lh;
            const cardH = Math.min(pad*2 + contentH, 1500);
            const top = (1920 - cardH)/2 - VERTICAL_OFFSET;

            // premium style - randomize each run
            const STYLES=[
              {g1:'#7C3AED',g2:'#EC4899'},
              {g1:'#0EA5E9',g2:'#06B6D4'},
              {g1:'#F97316',g2:'#DC2626'},
              {g1:'#059669',g2:'#10B981'},
              {g1:'#1E293B',g2:'#0F172A',dark:true},
            ];
            const s=STYLES[Math.floor(Math.random()*STYLES.length)];
            const cardFill=s.dark?'rgba(17,24,39,0.88)':'rgba(255,255,255,0.92)';
            const textColor=s.dark?'#F8FAFC':'#1F2937';

            let svg=`<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${s.g1}"/><stop offset="100%" stop-color="${s.g2}"/></linearGradient>
                <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="${s.dark?0.12:0.85}"/><stop offset="60%" stop-color="white" stop-opacity="0"/></linearGradient>
                <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="32" flood-opacity="${s.dark?0.55:0.22}"/></filter>
              </defs>
              <g transform="translate(80,${top})">
                <rect width="${innerW}" height="${cardH}" rx="52" fill="${cardFill}" filter="url(#shadow)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
                <rect x="0" y="0" width="${innerW}" height="${Math.min(320,cardH*0.45)}" rx="52" fill="url(#sheen)"/>
                <rect x="36" y="36" width="84" height="6" rx="3" fill="url(#g)" opacity="0.9"/>`;

            let y=pad+verseF*0.8;
            verseLines.forEach(l=>{ svg+=`<text x="${innerW/2}" y="${y}" font-family="Georgia, 'Times New Roman', serif" font-size="${verseF}" font-weight="700" fill="url(#g)" text-anchor="middle" letter-spacing="0.3">${esc(l)}</text>`; y+=verseF*lh; });
            y+=18;
            textLines.forEach(l=>{ svg+=`<text x="${innerW/2}" y="${y}" font-family="Inter, 'SF Pro Display', Arial, sans-serif" font-size="${textF}" font-weight="600" fill="${textColor}" text-anchor="middle" opacity="0.96">${esc(l)}</text>`; y+=textF*lh; });

            svg+=`<rect x="40" y="${cardH-10}" width="${innerW-80}" height="5" rx="2.5" fill="url(#g)" opacity="0.8"/></g></svg>`;

            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const fname=`${OUTPUT_FILENAME_PREFIX}${Date.now()}.png`;
            const outPath=path.join(OUT,fname);
            await sharp(bg).composite([{input:overlay}]).png({quality:95}).toFile(outPath);

            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${fname}\n`);
            console.log('Generated:', outPath);
          })();
          NODE
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Overlay verse and text on image" && git push || echo "No changes to commit"
