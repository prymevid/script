name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to overlay'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Process Overlay
        env:
          RAW_TEXT: ${{ github.event.inputs.text }}
        run: |
          # 1. Selection Logic (70% probability for 2.png)
          RAND_VAL=$(( $RANDOM % 10 ))
          if [ $RAND_VAL -lt 7 ]; then
            SELECTED_IMG="tsapgod/image/2.png"
          else
            SELECTED_IMG="tsapgod/image/1.png"
          fi
          echo "Selected background: $SELECTED_IMG"

          # 2. Text Wrapping Helper (FFmpeg drawtext requires manual line breaks)
          WRAPPED_TEXT=$(node -e "
            const text = process.env.RAW_TEXT;
            const words = text.split(' ');
            let lines = [];
            let currentLine = '';
            words.forEach(word => {
              if ((currentLine + ' ' + word).length > 30) {
                lines.push(currentLine.trim());
                currentLine = word;
              } else {
                currentLine += ' ' + word;
              }
            });
            lines.push(currentLine.trim());
            console.log(lines.join('\n'));
          ")

          # 3. Directory Setup
          mkdir -p tsapgod/output
          TIMESTAMP=$(date +%s)
          OUTPUT_NAME="overlay_${TIMESTAMP}.png"
          OUTPUT_PATH="tsapgod/output/${OUTPUT_NAME}"

          # 4. FFmpeg Execution
          ffmpeg -i "$SELECTED_IMG" \
            -vf "drawtext=fontfile=tsapgod/font/mineig.ttf:text='${WRAPPED_TEXT}':fontcolor=white:fontsize=45:x=(w-text_w)/2:y=(h-text_h)/2:line_spacing=10:shadowcolor=black@0.6:shadowx=2:shadowy=2" \
            -update 1 "$OUTPUT_PATH"

          # Export filename for next steps
          echo "filename=${OUTPUT_NAME}" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git diff --staged --quiet || (git commit -m "Add overlay image: $(date)" && git push)
