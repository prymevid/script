name: Generate Overlay Image Pro

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install deps
        run: npm install sharp canvas

      - name: Build Regal Card
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),sharp=require('sharp');
          const {createCanvas,registerFont}=require('canvas');
          const OUT='tsapgod/output'; fs.mkdirSync(OUT,{recursive:true});
          const W=1080,H=1350, cardW=920, padX=64;
          const text=(process.env.INPUT_TEXT||'').trim();
          const verse=(process.env.INPUT_VERSE||'').trim();
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          // download fonts once
          const fetchFont=async(url,name)=>{const r=await fetch(url);const b=Buffer.from(await r.arrayBuffer());const p=`/tmp/${name}`;fs.writeFileSync(p,b);registerFont(p,{family:name.replace('.ttf','')})};
          await Promise.all([
            fetchFont('https://github.com/google/fonts/raw/main/ofl/fraunces/Fraunces%5Bopsz%2CWONK%2Cwght%5D.ttf','Fraunces.ttf'),
            fetchFont('https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf','Inter.ttf')
          ]);

          // measure
          const mC=createCanvas(10,10), mX=mC.getContext('2d');
          const measure=(t,fs,fm='Fraunces')=>{mX.font=`600 ${fs}px "${fm}"`;return mX.measureText(t).width};
          const wrap=(txt,fs,maxW,fm)=>{const w=txt.split(/\s+/);const L=[];let c='';for(const wd of w){const t=c?c+' '+wd:wd;if(measure(t,fs,fm)<=maxW){c=t}else{L.push(c);c=wd}}if(c)L.push(c);return L};

          // adaptive sizing
          let textF=84, verseF=28, lh=1.32, maxW=cardW-padX*2;
          let textLines=wrap(text,textF,maxW), verseLines=[verse];
          while(textLines.length>6 || textLines.some(l=>measure(l,textF)>maxW)){textF-=2; textLines=wrap(text,textF,maxW); if(textF<56)break}

          const contentH=textLines.length*textF*lh + 80;
          const cardH=Math.min(980, contentH+220);
          const top=(H-cardH)/2, left=(W-cardW)/2;

          // background with retry
          let bgBuf; for(let i=0;i<3;i++){try{const id=Math.floor(Math.random()*1084);const r=await fetch(`https://picsum.photos/id/${id}/${W}/${H}`,{signal:AbortSignal.timeout(7000)});if(r.ok){bgBuf=Buffer.from(await r.arrayBuffer());break}}catch{}}
          if(!bgBuf) throw new Error('bg fail');
          const bg=await sharp(bgBuf).resize(W,H,{fit:'cover'}).blur(36).modulate({brightness:0.58,saturation:1.25}).toBuffer();
          const lum=await sharp(bg).stats().then(s=>s.channels[0].mean); const isDark=lum<100;

          // palettes
          const PALS=[['#7C3AED','#EC4899','#F59E0B'],['#0EA5E9','#22D3EE','#6366F1'],['#D946EF','#F97316','#EAB308'],['#14B8A6','#0EA5E9','#8B5CF6'],['#BE185D','#F43F5E','#FB7185'],['#4338CA','#7C3AED','#DB2777'],['#0F172A','#334155','#64748B'],['#064E3B','#047857','#10B981'],['#7F1D1D','#B91C1C','#F59E0B'],['#1E3A8A','#3B82F6','#60A5FA'],['#581C87','#9333EA','#C084FC'],['#042F2E','#0D9488','#2DD4BF']];
          const [c1,c2,c3]=PALS[Math.floor(Math.random()*PALS.length)];
          const cardFill=isDark?'rgba(8,12,22,0.78)':'rgba(255,255,255,0.84)';
          const ink=isDark?'#F8FAFC':'#0B1220'; const mute=isDark?'#CBD5E1':'#334155';

          // SVG
          let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient>
            <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c2}"/><stop offset="100%" stop-color="${c3}"/></linearGradient>
            <radialGradient id="halo" cx="50%" cy="22%" r="65%"><stop offset="0%" stop-color="${c1}" stop-opacity="0.35"/><stop offset="100%" stop-color="${c1}" stop-opacity="0"/></radialGradient>
            <filter id="soft"><feGaussianBlur stdDeviation="22"/></filter>
            <filter id="shadow"><feDropShadow dx="0" dy="34" stdDeviation="40" flood-opacity="0.45"/></filter>
            <filter id="inner"><feGaussianBlur stdDeviation="6" result="b"/><feComposite in="SourceGraphic" in2="b" operator="atop"/></filter>
            <pattern id="grain" width="200" height="200" patternUnits="userSpaceOnUse"><image href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMgAAADICAYAAACt..." width="200" height="200" opacity="0.035"/></pattern>
          </defs>
          <rect width="${W}" height="${H}" fill="${isDark?'#020617':'#F1F5F9'}"/>
          <rect width="${W}" height="${H}" fill="url(#halo)"/>
          <circle cx="${W*0.18}" cy="${H*0.18}" r="260" fill="url(#g1)" opacity="0.22" filter="url(#soft)"/>
          <circle cx="${W*0.84}" cy="${H*0.78}" r="300" fill="url(#g2)" opacity="0.20" filter="url(#soft)"/>
          <circle cx="${W*0.5}" cy="${H*0.92}" r="220" fill="${c3}" opacity="0.16" filter="url(#soft)"/>
          <rect width="${W}" height="${H}" fill="url(#grain)"/>
          <g transform="translate(${left},${top})">
            <rect x="-18" y="-18" width="${cardW+36}" height="${cardH+36}" rx="48" fill="none" stroke="url(#g1)" stroke-opacity="0.18" stroke-width="36" filter="url(#soft)"/>
            <rect width="${cardW}" height="${cardH}" rx="38" fill="${cardFill}" filter="url(#shadow)"/>
            <rect x="0.5" y="0.5" width="${cardW-1}" height="${cardH-1}" rx="37.5" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.9"/>
            <rect x="3" y="3" width="${cardW-6}" height="${cardH-6}" rx="34" fill="none" stroke="white" stroke-opacity="${isDark?0.08:0.55}" stroke-width="1"/>
            <rect x="0" y="0" width="${cardW}" height="110" rx="38" fill="url(#g1)" opacity="0.12"/>
            <g opacity="0.08"><text x="70" y="180" font-family="Fraunces" font-size="320" fill="url(#g1)">“</text></g>
            <g stroke="url(#g2)" stroke-width="1.6" fill="none" opacity="0.5">
              <path d="M36,36 q0,28 28,28 M${cardW-36},36 q0,28 -28,28 M36,${cardH-36} q0,-28 28,-28 M${cardW-36},${cardH-36} q0,-28 -28,-28"/>
              <path d="M${cardW/2-120},${cardH-56} h240" stroke-dasharray="4 8"/>
            </g>`;

          // quote
          let y=200;
          textLines.forEach(l=>{svg+=`<text x="${cardW/2}" y="${y}" font-family="Fraunces" font-size="${textF}" font-weight="700" fill="${ink}" text-anchor="middle" letter-spacing="-0.5">${esc(l)}</text>`; y+=textF*lh});
          // divider jewels
          y+=30; svg+=`<line x1="${cardW/2-140}" y1="${y}" x2="${cardW/2+140}" y2="${y}" stroke="url(#g2)" stroke-width="2" opacity="0.6"/><circle cx="${cardW/2}" cy="${y}" r="4" fill="${c2}"/><circle cx="${cardW/2-18}" cy="${y}" r="2.5" fill="${c1}"/><circle cx="${cardW/2+18}" cy="${y}" r="2.5" fill="${c3}"/>`;
          // verse pill
          y+=70; const pillW=Math.min(520, measure(verse,verseF,'Inter')+80);
          svg+=`<g transform="translate(${(cardW-pillW)/2},${y})"><rect width="${pillW}" height="52" rx="26" fill="url(#g1)" opacity="0.14"/><rect x="0.7" y="0.7" width="${pillW-1.4}" height="50.6" rx="25.3" fill="none" stroke="url(#g1)" opacity="0.7"/><text x="${pillW/2}" y="33" font-family="Inter" font-size="${verseF}" fill="${mute}" text-anchor="middle" letter-spacing="2.5">${esc(verse.toUpperCase())}</text></g>`;
          svg+=`</g></svg>`;

          const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
          const out=await sharp(bg).composite([{input:overlay, blend:'over'}]).png({quality:100}).toFile(path.join(OUT,`out_${Date.now()}.png`));
          NODE

      - name: Commit
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "regal card" || true
          git push
