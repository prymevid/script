- name: Process Image
  id: proc
  env:
    INPUT_TEXT: ${{ github.event.inputs.text }}
  run: |
    RAND_VAL=$(( $RANDOM % 10 ))
    [ $RAND_VAL -lt 7 ] && IMG="tsapgod/image/2.png" || IMG="tsapgod/image/1.png"

    WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 "$IMG")
    FONT_SIZE=$(( WIDTH / 18 ))
    WRAP_LIMIT=28

    # Wrap text
    WRAPPED_TEXT=$(node -e "
      const text = process.env.INPUT_TEXT;
      const words = text.split(' ');
      let lines = []; let cur = '';
      words.forEach(w => {
        if ((cur + ' ' + w).length > $WRAP_LIMIT) { lines.push(cur.trim()); cur = w; }
        else { cur += ' ' + w; }
      });
      lines.push(cur.trim());
      console.log(lines.join('\n'));
    ")

    # Write text to temp file (avoids escaping hell)
    echo "$WRAPPED_TEXT" > /tmp/text.txt

    mkdir -p tsapgod/output
    FNAME="out_$(date +%s).png"

    # Use textfile= instead of inline text=
    ffmpeg -i "$IMG" -vf "drawtext=fontfile=tsapgod/font/mineig.ttf:textfile=/tmp/text.txt:fontcolor=0x333333:fontsize=${FONT_SIZE}:x=(w-text_w)/2:y=(h-text_h)/2:line_spacing=20:text_align=center" -update 1 "tsapgod/output/$FNAME"

    echo "filename=$FNAME" >> $GITHUB_OUTPUT
