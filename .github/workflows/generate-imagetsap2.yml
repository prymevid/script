name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Sharp
        run: npm install sharp

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),sharp=require('sharp');
          const OUT='tsapgod/output'; fs.mkdirSync(OUT,{recursive:true});

          const text=process.env.INPUT_TEXT||'';
          const verse=process.env.INPUT_VERSE||'';
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          const VERTICAL_OFFSET=100;
          const OUTPUT_FILENAME_PREFIX="out_";

          // --- ADAPTIVE LAYOUT ENGINE (FIX) ---
          const estimate=(t,fs)=>t.length*fs*0.54;
          function wrapWidth(txt, fs, maxW){
            const words=String(txt).trim().split(/\s+/); const lines=[]; let cur='';
            for(const w of words){
              const test=cur?cur+' '+w:w;
              if(estimate(test,fs)<=maxW){cur=test; continue}
              if(cur) lines.push(cur);
              if(estimate(w,fs)>maxW){let p=''; for(const ch of w){if(estimate(p+ch,fs)<=maxW)p+=ch;else{lines.push(p);p=ch}} cur=p}else cur=w;
            }
            if(cur) lines.push(cur); return lines;
          }

          const cardW=940, padX=60, maxW=cardW-padX*2;
          let verseF=40, textF=58, lh=1.45;
          let verseLines=[], textLines=[];
          for(let i=0;i<18;i++){
            verseLines=wrapWidth(verse, verseF, maxW);
            textLines=wrapWidth(text, textF, maxW);
            const h=verseLines.length*verseF*lh + 50 + textLines.length*textF*lh;
            const wide=verseLines.concat(textLines).some(l=>estimate(l, l===verseLines[0]?verseF:textF)>maxW);
            if(h<1100 &&!wide && textLines.length<=8) break;
            if(wide || textLines.length>6) textF=Math.max(38, textF-2); else verseF=Math.max(30, verseF-1);
          }

          const padY=110;
          const contentH = verseLines.length*verseF*lh + 50 + textLines.length*textF*lh;
          const cardH = Math.min(padY*2 + contentH + 40, 1500);
          const top = (1920 - cardH)/2 - VERTICAL_OFFSET;
          const left = (1080 - cardW)/2;

          (async()=>{
            // 1. Random Picsum + blur
            const seed=Math.floor(Math.random()*999999);
            const imgBuf=await fetch(`https://picsum.photos/seed/${seed}/1080/1920`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(imgBuf))
             .resize(1080,1920,{fit:'cover'})
             .blur(28)
             .modulate({brightness:0.68,saturation:1.22})
             .toBuffer();

            // 2. Styles
            const STYLES=[
              {g1:'#7C3AED',g2:'#EC4899',g3:'#F59E0B',dark:false},
              {g1:'#0EA5E9',g2:'#06B6D4',g3:'#6366F1',dark:false},
              {g1:'#F97316',g2:'#DC2626',g3:'#EAB308',dark:false},
              {g1:'#059669',g2:'#10B981',g3:'#22D3EE',dark:false},
              {g1:'#6366F1',g2:'#8B5CF6',g3:'#EC4899',dark:true},
            ];
            const s=STYLES[Math.floor(Math.random()*STYLES.length)];
            const cardFill=s.dark?'rgba(11,18,32,0.92)':'rgba(255,255,255,0.96)';
            const textColor=s.dark?'#F1F5F9':'#0F172A';

            // 3. Build SVG
            let svg=`<svg width="1080" height="1920" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${s.g1}"/><stop offset="100%" stop-color="${s.g2}"/></linearGradient>
                <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${s.g2}"/><stop offset="100%" stop-color="${s.g3}"/></linearGradient>
                <radialGradient id="halo" cx="50%" cy="20%" r="65%"><stop offset="0%" stop-color="${s.g1}" stop-opacity="0.28"/><stop offset="100%" stop-color="${s.g1}" stop-opacity="0"/></radialGradient>
                <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="${s.dark?0.15:0.9}"/><stop offset="45%" stop-color="white" stop-opacity="0"/></linearGradient>
                <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="38" stdDeviation="44" flood-opacity="${s.dark?0.65:0.28}"/></filter>
                <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="white" opacity="${s.dark?0.06:0.12}"/></pattern>
              </defs>
              <rect width="1080" height="1920" fill="url(#halo)"/>
              <rect width="1080" height="1920" fill="url(#grid)"/>
              <g transform="translate(${left},${top})">
                <rect width="${cardW}" height="${cardH}" rx="48" fill="${cardFill}" filter="url(#shadow)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
                <rect x="0" y="0" width="${cardW}" height="${Math.min(300,cardH*0.4)}" rx="48" fill="url(#sheen)"/>
                <g opacity="0.08"><text x="90" y="${padY+40}" font-family="Georgia" font-size="240" fill="url(#g)">“</text><text x="${cardW-90}" y="${cardH-60}" font-family="Georgia" font-size="240" fill="url(#g2)" text-anchor="end">”</text></g>
                <g transform="translate(40,34)"><rect width="130" height="8" rx="4" fill="url(#g)"/><rect x="144" width="80" height="8" rx="4" fill="url(#g2)" opacity="0.9"/></g>`;

            let y=padY+20;
            // verse pill - dynamic width
            const pillW = Math.min(cardW-120, Math.max(...verseLines.map(l=>estimate(l,verseF)))+64);
            svg+=`<g transform="translate(${(cardW-pillW)/2},${y})"><rect width="${pillW}" height="48" rx="24" fill="url(#g)" opacity="0.16"/><rect x="0.8" y="0.8" width="${pillW-1.6}" height="46.4" rx="23.2" fill="none" stroke="url(#g)" stroke-opacity="0.4"/></g>`;
            y+=34;
            verseLines.forEach(l=>{ svg+=`<text x="${cardW/2}" y="${y}" font-family="Inter, Arial" font-size="${verseF}" font-weight="800" fill="url(#g)" text-anchor="middle">${esc(l.toUpperCase())}</text>`; y+=verseF*lh; });
            y+=18;
            svg+=`<line x1="${cardW/2-110}" y1="${y}" x2="${cardW/2+110}" y2="${y}" stroke="url(#g2)" stroke-width="2.5" opacity="0.5"/>`;
            y+=44;
            textLines.forEach(l=>{ svg+=`<text x="${cardW/2}" y="${y}" font-family="'Cormorant Garamond', Georgia, serif" font-size="${textF}" font-weight="600" fill="${textColor}" text-anchor="middle">${esc(l)}</text>`; y+=textF*lh; });
            svg+=`<g transform="translate(0,${cardH-56})"><rect x="56" y="26" width="${cardW-112}" height="2" fill="url(#g)" opacity="0.3"/><circle cx="${cardW/2}" cy="27" r="3.5" fill="url(#g2)"/></g>`;
            svg+=`</g></svg>`;

            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const fname=`${OUTPUT_FILENAME_PREFIX}${Date.now()}.png`;
            const outPath=path.join(OUT,fname);
            await sharp(bg).composite([{input:overlay}]).png({quality:98}).toFile(outPath);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `filename=${fname}\n`);
          })();
          NODE

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Overlay verse and text on image" && git push || echo "No changes to commit"
