const GITHUB_TOKEN = "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";
const GITHUB_USERNAME = "prymevid";
const GITHUB_REPO = "script";
const GITHUB_BRANCH = "main";
const OUTPUT_FOLDER = "tsapgod/output";

export const code = async (inputs) => {
    const text = inputs.text;
    if (!text) throw new Error('Input text is missing');

    // 1. Dispatch Workflow
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/actions/workflows/generate-image.yml/dispatches`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' },
        body: JSON.stringify({ ref: GITHUB_BRANCH, inputs: { text } })
    });

    if (!res.ok) throw new Error(`Github Dispatch Failed: ${res.status}`);

    const startTime = Date.now();
    let fileUrl = null;

    // 2. Poll for the new file (Check every 10s for max 2 mins)
    for (let i = 0; i < 12; i++) {
        await new Promise(r => setTimeout(r, 10000));
        
        const contentRes = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${OUTPUT_FOLDER}`, {
            headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
        });

        if (contentRes.ok) {
            const files = await contentRes.json();
            const latest = files
                .filter(f => f.name.startsWith('out_'))
                .sort((a, b) => b.name.localeCompare(a.name))[0];

            if (latest) {
                fileUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/${GITHUB_BRANCH}/${OUTPUT_FOLDER}/${latest.name}`;
                break;
            }
        }
    }

    if (!fileUrl) throw new Error("Timeout: Image not found in output folder.");

    return { success: true, url: fileUrl };
};
