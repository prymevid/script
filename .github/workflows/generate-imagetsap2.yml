name: Generate Overlay Image

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text'
        required: true
        type: string
      verse:
        description: 'Verse / Title'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Process Image
        id: proc
        env:
          INPUT_TEXT: ${{ github.event.inputs.text }}
          INPUT_VERSE: ${{ github.event.inputs.verse }}
        run: |
          # ============================================================
          # USER CONFIGURABLE PARAMETERS
          # ============================================================
          
          FONT_FILE="tsapgod/font/crimbold.ttf"
          TEXT_COLOR="0x333333"
          LINE_SPACING="10"
          TEXT_ALIGN="center"
          
          WRAP_LIMIT="28"
          FONT_SIZE_MODE="auto"
          FONT_SIZE_FACTOR="18"
          
          VERTICAL_OFFSET="200" 
          
          IMAGE_DIR="tsapgod/image"
          PROBABILITY_FOR_2="70"
          
          OUTPUT_DIR="tsapgod/output"
          OUTPUT_FILENAME_PREFIX="out_"
          
          # ============================================================
          
          # 1. Image selection
          RAND_VAL=$(( $RANDOM % 100 ))
          if [ $RAND_VAL -lt $PROBABILITY_FOR_2 ]; then
            IMG="$IMAGE_DIR/2.png"
          else
            IMG="$IMAGE_DIR/1.png"
          fi
          
          # 2. Get image width
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 "$IMG")
          
          # 3. Determine font size
          if [ "$FONT_SIZE_MODE" = "auto" ]; then
            FONT_SIZE=$(( WIDTH / FONT_SIZE_FACTOR ))
          else
            FONT_SIZE="$FONT_SIZE_MODE"
          fi
          
          # 4. Wrap main text only
          WRAPPED_TEXT=$(node -e "
            const text = process.env.INPUT_TEXT;
            const words = text.split(' ');
            let lines = [];
            let cur = '';
            words.forEach(w => {
              if ((cur + ' ' + w).length > $WRAP_LIMIT) {
                lines.push(cur.trim());
                cur = w;
              } else {
                cur += ' ' + w;
              }
            });
            lines.push(cur.trim());
            console.log(lines.join('\n'));
          ")
          
          # 5. Combine verse + double newline + text
          COMBINED_TEXT=$(printf "%s\n\n%s" "$INPUT_VERSE" "$WRAPPED_TEXT")
          
          # 6. Create temp file
          TEMP_TXT=$(mktemp)
          printf "%s" "$COMBINED_TEXT" > "$TEMP_TXT"
          
          # 7. Output
          mkdir -p "$OUTPUT_DIR"
          FNAME="${OUTPUT_FILENAME_PREFIX}$(date +%s).png"
          
          # 8. Run FFmpeg with SINGLE drawtext
          ffmpeg -i "$IMG" -vf "drawtext=fontfile=$FONT_FILE:textfile='$TEMP_TXT':fontcolor=$TEXT_COLOR:fontsize=$FONT_SIZE:x=(w-text_w)/2:y=((h-text_h)/2)-$VERTICAL_OFFSET:line_spacing=$LINE_SPACING:text_align=$TEXT_ALIGN" -update 1 "$OUTPUT_DIR/$FNAME"
          
          # 9. Clean up
          rm -f "$TEMP_TXT"
          
          echo "filename=$FNAME" >> $GITHUB_OUTPUT
      
      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tsapgod/output/
          git commit -m "Overlay verse and text on image" && git push || echo "No changes to commit"
