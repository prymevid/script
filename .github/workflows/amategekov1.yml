              L.od.forEach((o,i)=>{const col=style.opts[i%4];optSvg+=`<g><rect x="40" y="${oy}" width="570" height="${o.pillH}" rx="6" fill="${optionBg}" stroke="url(#bevelStroke)" stroke-width="2"/><rect x="40" y="${oy}" width="570" height="${o.pillH}" rx="6" fill="url(#chromeSurface)" opacity="0.25"/><rect x="40" y="${oy}" width="570" height="4" rx="2" fill="white" opacity="0.22"/><rect x="40" y="${oy+o.pillH-4}" width="570" height="4" rx="2" fill="black" opacity="0.18"/><rect x="40" y="${oy}" width="14" height="${o.pillH}" rx="3" fill="${col}"/><rect x="40" y="${oy}" width="14" height="6" fill="white" opacity="0.3"/><rect x="57" y="${oy+o.pillH/2-23}" width="46" height="46" rx="4" fill="${col}" opacity="0.14" stroke="${col}" stroke-width="1"/><rect x="59" y="${oy+o.pillH/2-21}" width="42" height="42" rx="3" fill="${col}"/><rect x="59" y="${oy+o.pillH/2-21}" width="42" height="16" rx="2" fill="white" opacity="0.2"/><text x="80" y="${oy+o.pillH/2+8}" font-family="Impact,Arial,sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=oy+(o.pillH-tb)/2+o.lh*0.76;o.lines.forEach((ln,li)=>optSvg+=`<text x="115" y="${fb+li*o.lh}" font-family="'Arial Narrow',Arial,sans-serif" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);optSvg+=`</g>`;oy+=o.pillH+14});
              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gH" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="chrome1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F8F8F8"/><stop offset="12%" stop-color="#C8C8C8"/><stop offset="25%" stop-color="#E8E8E8"/><stop offset="38%" stop-color="#A8A8A8"/><stop offset="50%" stop-color="#D8D8D8"/><stop offset="62%" stop-color="#989898"/><stop offset="75%" stop-color="#C8C8C8"/><stop offset="88%" stop-color="#B8B8B8"/><stop offset="100%" stop-color="#888888"/></linearGradient><linearGradient id="chromeSurface" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.5"/><stop offset="45%" stop-color="white" stop-opacity="0.05"/><stop offset="55%" stop-color="black" stop-opacity="0.05"/><stop offset="100%" stop-color="black" stop-opacity="0.22"/></linearGradient><linearGradient id="bevelStroke" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.6"/><stop offset="50%" stop-color="${style.dark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.1)'}"/><stop offset="100%" stop-color="black" stop-opacity="0.5"/></linearGradient><linearGradient id="bevelTop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.35"/><stop offset="100%" stop-color="transparent"/></linearGradient><linearGradient id="bevelBot" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="transparent"/><stop offset="100%" stop-color="black" stop-opacity="0.28"/></linearGradient><radialGradient id="rivetBase" cx="40%" cy="40%" r="60%"><stop offset="0%" stop-color="#666"/><stop offset="100%" stop-color="#222"/></radialGradient><radialGradient id="rivetFace" cx="35%" cy="30%" r="65%"><stop offset="0%" stop-color="#DDD"/><stop offset="40%" stop-color="#999"/><stop offset="100%" stop-color="#444"/></radialGradient><radialGradient id="rivetSpecular" cx="30%" cy="25%" r="70%"><stop offset="0%" stop-color="white"/><stop offset="100%" stop-color="rgba(255,255,255,0.1)"/></radialGradient><filter id="s" x="-55%" y="-55%" width="210%" height="210%"><feDropShadow dx="4" dy="32" stdDeviation="${shadow+8}" flood-opacity="0.5" flood-color="#000"/><feDropShadow dx="-2" dy="-2" stdDeviation="3" flood-opacity="0.12" flood-color="white"/></filter><filter id="metal" x="-5%" y="-5%" width="110%" height="110%"><feTurbulence type="fractalNoise" baseFrequency="0.015 0.7" numOctaves="4" seed="42" result="noise"/><feColorMatrix type="matrix" values="0 0 0 0 0.82 0 0 0 0 0.82 0 0 0 0 0.82 0 0 0 0.08 0" in="noise" result="metal"/><feBlend in="SourceGraphic" in2="metal" mode="multiply"/></filter><filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%"><feOffset dx="2" dy="4"/><feGaussianBlur stdDeviation="4" result="blur"/><feComposite operator="out" in="SourceGraphic" in2="blur" result="inverse"/><feFlood flood-color="black" flood-opacity="0.15" result="color"/><feComposite operator="in" in="color" in2="inverse"/><feComposite operator="over" in2="SourceGraphic"/></filter></defs>${chromeBands}${rivets}<g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="12" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="12" fill="url(#chrome1)" opacity="${style.dark?0.08:0.18}" filter="url(#metal)"/><rect width="650" height="${L.th}" rx="12" fill="url(#chromeSurface)" opacity="0.5"/><rect x="0" y="0" width="650" height="28" rx="12" fill="url(#bevelTop)"/><rect x="0" y="${L.th-28}" width="650" height="28" rx="12" fill="url(#bevelBot)"/><rect x="4" y="4" width="642" height="${L.th-8}" rx="9" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/><rect x="4" y="4" width="642" height="${L.th-8}" rx="9" fill="none" stroke="black" stroke-width="4" stroke-opacity="0.15"/><rect x="6" y="6" width="638" height="${L.th-12}" rx="7" fill="url(#gH)" opacity="0.08"/><g transform="translate(240,-66)" filter="url(#s)"><polygon points="85,0 130,22 130,66 85,88 40,66 40,22" fill="url(#chrome1)" opacity="0.9"/><polygon points="85,0 130,22 130,66 85,88 40,66 40,22" fill="url(#g)" opacity="0.9"/><polygon points="85,5 125,25 125,63 85,83 45,63 45,25" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.35"/><polygon points="85,5 125,25 125,63 85,83 45,63 45,25" fill="url(#bevelTop)" opacity="0.5"/><polygon points="85,12 119,29 119,59 85,77 51,59 51,29" fill="none" stroke="white" stroke-width="0.7" stroke-opacity="0.18"/><text x="85" y="54" font-family="Impact,'Arial Narrow',Arial,sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">Q${num}</text></g><line x1="40" y1="78" x2="610" y2="78" stroke="url(#gH)" stroke-width="2" opacity="0.65"/><line x1="40" y1="81" x2="610" y2="81" stroke="white" stroke-width="0.6" opacity="0.2"/><line x1="40" y1="83" x2="610" y2="83" stroke="black" stroke-width="0.6" opacity="0.14"/>${qTextSvg}${optSvg}<rect x="44" y="${L.th-18}" width="562" height="10" rx="3" fill="url(#gH)" opacity="0.9"/><rect x="44" y="${L.th-18}" width="562" height="5" rx="3" fill="url(#bevelTop)" opacity="0.4"/><rect x="44" y="${L.th-23}" width="562" height="3" rx="1.5" fill="url(#gH)" opacity="0.35"/></g></svg>`;
            }

          ];

          const themeIndex = Math.floor(Math.random()*THEMES.length);
          const svg = THEMES[themeIndex]();

          (async()=>{
            const randomId = Math.floor(Math.random()*1084);
            const img=await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(14+Math.floor(Math.random()*8)).modulate({brightness:0.6+Math.random()*0.12,saturation:1+Math.random()*0.2}).toBuffer();
            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const frame=path.join(TMP,'frame.png'); await sharp(bg).composite([{input:overlay}]).png().toFile(frame);
            let audio=null; if(fs.existsSync(MUSIC)){const f=fs.readdirSync(MUSIC).filter(x=>/\.(mp3|m4a|wav)$/i.test(x)); if(f.length) audio=path.join(MUSIC,f[Math.floor(Math.random()*f.length)])}
            const DUR=(4.9+Math.random()*0.6).toFixed(2), CRF=21+Math.floor(Math.random()*4), hue=(Math.random()*20-10).toFixed(1);
            const vf=`zoompan=z='min(zoom+0.0012,${(1+Math.random()*0.025).toFixed(3)})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=${(Math.random()*0.04-0.02).toFixed(3)}:saturation=${(1+Math.random()*0.1).toFixed(2)},hue=h=${hue},noise=alls=${2+Math.floor(Math.random()*3)}:allf=t+u,vignette=${(0.2+Math.random()*0.15).toFixed(2)},format=yuv420p`;
            const out=path.join(OUT,`quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.mp4`);
            const args=['-y','-loglevel','error','-loop','1','-i',frame]; if(audio)args.push('-i',audio);
            args.push('-t',DUR,'-vf',vf,'-r','30','-c:v','libx264','-crf',String(CRF),'-preset','veryfast');
            if(audio)args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out,style.n,'theme',themeIndex+1);
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add premium quiz video" && git push)
