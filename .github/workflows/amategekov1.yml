name: Generate Quiz Video

on:
  workflow_dispatch:
    inputs:
      q: { description: 'Question text', required: true, type: string }
      a: { description: 'Option A', required: true, type: string }
      b: { description: 'Option B', required: true, type: string }
      c: { description: 'Option C', required: false, type: string, default: '' }
      d: { description: 'Option D', required: false, type: string, default: '' }
      x: { description: 'Question number/ID', required: true, type: string }

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_Q: ${{ github.event.inputs.q }}
          INPUT_A: ${{ github.event.inputs.a }}
          INPUT_B: ${{ github.event.inputs.b }}
          INPUT_C: ${{ github.event.inputs.c }}
          INPUT_D: ${{ github.event.inputs.d }}
          INPUT_X: ${{ github.event.inputs.x }}
        run: |
          node - <<'NODE'
          const fs=require('fs'),path=require('path'),{execSync}=require('child_process'),sharp=require('sharp');
          const OUT='roadrules/output',TMP='roadrules/temp',MUSIC='roadrules/song';
          [OUT,TMP].forEach(d=>fs.mkdirSync(d,{recursive:true}));

          const q={id:process.env.INPUT_X||'1',text:process.env.INPUT_Q||'',opts:{a:process.env.INPUT_A,b:process.env.INPUT_B,c:process.env.INPUT_C,d:process.env.INPUT_D}};
          const num=parseInt(q.id)||1;
          const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

          const STYLES=[
            {n:'aurora',g1:'#7C3AED',g2:'#EC4899',card:'#FFFFFF',opts:['#3B82F6','#10B981','#F59E0B','#EF4444']},
            {n:'ocean',g1:'#0EA5E9',g2:'#06B6D4',card:'#F8FAFC',opts:['#0284C7','#0891B2','#0EA5E9','#38BDF8']},
            {n:'sunset',g1:'#F97316',g2:'#DC2626',card:'#FFFBEB',opts:['#EA580C','#DC2626','#F59E0B','#FB923C']},
            {n:'emerald',g1:'#059669',g2:'#10B981',card:'#F0FDF4',opts:['#047857','#059669','#10B981','#34D399']},
            {n:'midnight',g1:'#1E293B',g2:'#0F172A',card:'#0B1120',opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'],dark:true},
            {n:'road',g1:'#EAB308',g2:'#CA8A04',card:'#FFFBEB',opts:['#1F2937','#374151','#4B5563','#6B7280']},
            {n:'neon',g1:'#EC4899',g2:'#8B5CF6',card:'#18181B',opts:['#22D3EE','#A78BFA','#F472B6','#FB7185'],dark:true},
            {n:'clean',g1:'#64748B',g2:'#94A3B8',card:'#FFFFFF',opts:['#0EA5E9','#10B981','#F59E0B','#EF4444']},
            {n:'lavender',g1:'#8B5CF6',g2:'#D946EF',card:'#F5F3FF',opts:['#6366F1','#8B5CF6','#A855F7','#C084FC']},
            {n:'crimson',g1:'#DC2626',g2:'#B91C1C',card:'#FEF2F2',opts:['#991B1B','#DC2626','#EF4444','#F87171']},
            {n:'forest',g1:'#166534',g2:'#15803D',card:'#F0FDF4',opts:['#14532D','#166534','#22C55E','#4ADE80']},
            {n:'golden',g1:'#D97706',g2:'#B45309',card:'#FFFBEB',opts:['#92400E','#B45309','#D97706','#FBBF24']},
            {n:'slate',g1:'#334155',g2:'#1E293B',card:'#0F172A',opts:['#64748B','#94A3B8','#CBD5E1','#E2E8F0'],dark:true},
            {n:'coral',g1:'#F43F5E',g2:'#E11D48',card:'#FFF1F2',opts:['#BE123C','#E11D48','#F43F5E','#FB7185']},
            {n:'mint',g1:'#059669',g2:'#10B981',card:'#ECFDF5',opts:['#047857','#059669','#34D399','#6EE7B7']}
          ];
          const style=STYLES[Math.floor(Math.random()*STYLES.length)];
          const pillR=18+Math.floor(Math.random()*10), cardR=32+Math.floor(Math.random()*12), shadow=18+Math.floor(Math.random()*10);

          const estimateWidth=(t,fs)=>t.length*fs*0.56;
          function wrapText(text,maxW,fs){const w=String(text).trim().split(/\s+/),l=[];let c='';for(const wd of w){const t=c?c+' '+wd:wd;if(estimateWidth(t,fs)<=maxW){c=t;continue}if(c)l.push(c);if(estimateWidth(wd,fs)>maxW){let p='';for(const ch of wd){if(estimateWidth(p+ch,fs)<=maxW)p+=ch;else{l.push(p);p=ch}}c=p}else c=wd}if(c)l.push(c);return l}
          function buildLayout(){
            const opts=['a','b','c','d'].filter(k=>q.opts[k]).map(k=>{
              let t = String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i,'').trim();
              if (t && /^[a-z]/.test(t)) { t = t.charAt(0).toUpperCase() + t.slice(1); }
              return {k:k.toUpperCase(), t};
            });
            const TW=554,OW=440; let qF=34,oF=25;
            for(let i=0;i<25;i++){
              const qL=wrapText(q.text,TW,qF), qH=qL.length*qF*1.35;
              const od=opts.map(o=>{const ls=wrapText(o.t,OW,oF),lh=oF*1.26,ph=Math.max(72,ls.length*lh+34);return{...o,lines:ls,lh,pillH:ph}});
              const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
              if(th<=1180 && qL.length<=12 && od.every(o=>o.lines.length<=8)) return{qF,oF,qL,qH,od,th};
              if(qH>400 || qL.length>7) qF=Math.max(20,qF-1); else oF=Math.max(17,oF-1);
            }
            const qL=wrapText(q.text,TW,20), qH=qL.length*20*1.35;
            const od=opts.map(o=>{const ls=wrapText(o.t,OW,17),lh=17*1.26;return{...o,lines:ls,lh,pillH:Math.max(72,ls.length*lh+34)}});
            const th=90+qH+30+od.reduce((s,o)=>s+o.pillH,0)+Math.max(0,od.length-1)*16+56;
            return{qF:20,oF:17,qL,qH,od,th:Math.min(th,1200)};
          }
          const L=buildLayout(), top=Math.max(20,(1280-L.th)/2-20);
          const icons=[`<g opacity="0.13"><polygon points="30,0 70,0 100,30 100,70 70,100 30,100 0,70 0,30" fill="#DC2626" transform="translate(80,200) scale(0.9)"/><text x="130" y="262" font-size="24" fill="white" font-weight="800" text-anchor="middle">STOP</text></g>`,`<g opacity="0.12"><polygon points="50,0 100,87 0,87" fill="#EAB308" stroke="#000" stroke-width="3" transform="translate(550,900) scale(0.9)"/><text x="600" y="965" font-size="22" fill="black" font-weight="800" text-anchor="middle">!</text></g>`,`<g opacity="0.14" transform="translate(500,250)"><rect x="0" y="0" width="60" height="140" rx="12" fill="#1F2937"/><circle cx="30" cy="30" r="18" fill="#DC2626"/><circle cx="30" cy="70" r="18" fill="#EAB308"/><circle cx="30" cy="110" r="18" fill="#16A34A"/></g>`,`<g opacity="0.13" transform="translate(100,950)"><circle cx="50" cy="50" r="48" fill="white" stroke="#DC2626" stroke-width="8"/><text x="50" y="62" font-size="36" font-weight="800" fill="black" text-anchor="middle">50</text></g>`];
          const roadDecor=icons.sort(()=>0.5-Math.random()).slice(0,2).join('');

          const textColor=style.dark?'#F8FAFC':'#0F172A';
          const cardFill=style.dark?'#0F172A':style.card;
          const cardStroke=style.dark?'rgba(255,255,255,0.09)':'rgba(15,23,42,0.09)';
          const optionBg=style.dark?'#111827':'#FFFFFF';
          const optionStroke=style.dark?'#1F2937':'#E5E7EB';

          const THEMES=[

            // ══════════════════════════════════════════════════════════
            // THEME 1 — ROYAL ORNAMENTAL
            // Ornate gold filigree borders, hexagonal heraldic badge,
            // damask wallpaper texture, chevron wave dividers, corner
            // flourishes with stacked frames and embossed accents
            // ══════════════════════════════════════════════════════════
            ()=>{
              const goldS=`<stop offset="0%" stop-color="#FDE68A"/><stop offset="22%" stop-color="#D97706"/><stop offset="48%" stop-color="#FCD34D"/><stop offset="76%" stop-color="#B45309"/><stop offset="100%" stop-color="#F59E0B"/>`;
              const mkCorner=(tx)=>`<g transform="${tx}"><path d="M0,56 L0,14 Q0,0 14,0 L56,0" fill="none" stroke="url(#gold)" stroke-width="3.5"/><path d="M0,46 L0,18 Q0,9 9,9 L46,9" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.55"/><path d="M18,0 L0,18 M30,0 L0,30" stroke="url(#gold)" stroke-width="0.9" opacity="0.38"/><circle cx="0" cy="56" r="5" fill="url(#gold)"/><circle cx="56" cy="0" r="5" fill="url(#gold)"/><circle cx="0" cy="0" r="9" fill="url(#g)"/><circle cx="0" cy="0" r="5" fill="url(#gold)" opacity="0.7"/><circle cx="0" cy="0" r="2" fill="white" opacity="0.6"/></g>`;
              const qTextSvg=L.qL.map((l,i)=>`<text x="52" y="${98+i*L.qF*1.35}" font-family="Georgia,serif" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('');
              let oy=90+L.qH+30,optSvg='';
              L.od.forEach((o,i)=>{const col=style.opts[i%4];optSvg+=`<g><rect x="40" y="${oy}" width="570" height="${o.pillH}" rx="${pillR}" fill="${optionBg}" stroke="url(#goldH)" stroke-width="2"/><rect x="40" y="${oy}" width="11" height="${o.pillH}" rx="5.5" fill="${col}"/><rect x="41" y="${oy}" width="4" height="${o.pillH}" rx="2" fill="white" opacity="0.22"/><rect x="57" y="${oy+o.pillH/2-23}" width="46" height="46" rx="10" fill="${col}" opacity="0.13"/><rect x="59" y="${oy+o.pillH/2-21}" width="42" height="42" rx="8" fill="${col}"/><rect x="60" y="${oy+o.pillH/2-20}" width="40" height="17" rx="5" fill="white" opacity="0.18"/><text x="80" y="${oy+o.pillH/2+8}" font-family="Georgia,serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=oy+(o.pillH-tb)/2+o.lh*0.76;o.lines.forEach((ln,li)=>optSvg+=`<text x="116" y="${fb+li*o.lh}" font-family="Georgia,serif" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);optSvg+=`</g>`;oy+=o.pillH+16});
              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">${goldS}</linearGradient><linearGradient id="goldH" x1="0" y1="0" x2="1" y2="0">${goldS}</linearGradient><linearGradient id="sheen" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.2"/><stop offset="55%" stop-color="white" stop-opacity="0"/></linearGradient><linearGradient id="badgeGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="50%" stop-color="${style.g2}"/><stop offset="100%" stop-color="${style.g1}"/></linearGradient><pattern id="damask" width="38" height="38" patternUnits="userSpaceOnUse"><rect width="38" height="38" fill="none"/><path d="M19,5 L21,12 L28,12 L22,17 L24,24 L19,19 L14,24 L16,17 L10,12 L17,12 Z" fill="${style.dark?'#FFF':'#000'}" opacity="0.038"/><circle cx="19" cy="19" r="2" fill="${style.dark?'#FFF':'#000'}" opacity="0.028"/><path d="M0,0 L6,6 M38,0 L32,6 M0,38 L6,32 M38,38 L32,32" stroke="${style.dark?'#FFF':'#000'}" stroke-width="0.7" opacity="0.032" fill="none"/></pattern><filter id="s" x="-55%" y="-55%" width="210%" height="210%"><feDropShadow dx="0" dy="32" stdDeviation="${shadow+6}" flood-opacity="0.42" flood-color="#000"/><feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.14" flood-color="#000"/></filter><filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g opacity="0.11">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR+8}" fill="${cardFill}" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR+8}" fill="url(#damask)"/><rect width="650" height="${L.th}" rx="${cardR+8}" fill="url(#sheen)"/><rect x="7" y="7" width="636" height="${L.th-14}" rx="${cardR+2}" fill="none" stroke="url(#gold)" stroke-width="3.5"/><rect x="15" y="15" width="620" height="${L.th-30}" rx="${cardR-4}" fill="none" stroke="url(#goldH)" stroke-width="1.2" opacity="0.48"/><rect x="21" y="21" width="608" height="${L.th-42}" rx="${cardR-10}" fill="none" stroke="${style.dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)'}" stroke-width="0.9"/>${mkCorner('translate(23,23)')}${mkCorner(`translate(627,23) scale(-1,1)`)}${mkCorner(`translate(23,${L.th-23}) scale(1,-1)`)}${mkCorner(`translate(627,${L.th-23}) scale(-1,-1)`)}<g transform="translate(0,77)"><line x1="28" y1="0" x2="230" y2="0" stroke="url(#goldH)" stroke-width="1.6" opacity="0.78"/><line x1="420" y1="0" x2="622" y2="0" stroke="url(#goldH)" stroke-width="1.6" opacity="0.78"/><path d="M230,0 L248,-10 L262,0 L276,10 L290,0 L304,-10 L318,0 L332,10 L346,0 L360,-10 L374,0 L388,10 L402,0 L420,0" fill="none" stroke="url(#goldH)" stroke-width="1.6" opacity="0.78"/><circle cx="325" cy="0" r="6" fill="url(#gold)" opacity="0.92" filter="url(#glow)"/><circle cx="295" cy="0" r="3" fill="url(#gold)" opacity="0.6"/><circle cx="355" cy="0" r="3" fill="url(#gold)" opacity="0.6"/></g><circle cx="325" cy="-48" r="55" fill="${style.g1}" opacity="0.14" filter="url(#glow)"/><g transform="translate(261,-96)" filter="url(#s)"><polygon points="64,0 112,28 112,84 64,112 16,84 16,28" fill="url(#badgeGrad)"/><polygon points="64,5 107,31 107,81 64,107 21,81 21,31" fill="none" stroke="url(#gold)" stroke-width="2.8"/><polygon points="64,14 99,34 99,78 64,98 29,78 29,34" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.42"/><polygon points="64,14 99,34 99,58" fill="white" opacity="0.10"/><path d="M64,30 L67.8,42 L81,42 L70.4,49.6 L74.2,61.6 L64,54 L53.8,61.6 L57.6,49.6 L47,42 L60.2,42 Z" fill="url(#gold)" filter="url(#glow)" opacity="0.95"/><text x="64" y="91" font-family="Georgia,serif" font-size="18" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2.5">Q${num}</text></g>${qTextSvg}${optSvg}<rect x="44" y="${L.th-20}" width="562" height="11" rx="5.5" fill="url(#goldH)" opacity="0.88"/><rect x="46" y="${L.th-19}" width="558" height="3.5" rx="1.75" fill="white" opacity="0.55"/><circle cx="130" cy="${L.th-14}" r="3.5" fill="url(#gold)" filter="url(#glow)" opacity="0.8"/><circle cx="325" cy="${L.th-14}" r="5" fill="url(#gold)" filter="url(#glow)" opacity="0.96"/><circle cx="520" cy="${L.th-14}" r="3.5" fill="url(#gold)" filter="url(#glow)" opacity="0.8"/></g></svg>`;
            },

            // ══════════════════════════════════════════════════════════
            // THEME 2 — CYBERPUNK CIRCUIT BOARD
            // Dark tech aesthetic: hexagonal grid overlay, PCB trace
            // lines, scanline pattern, HUD bracket corners, neon glow
            // filter, monospace typography, data-stream badge
            // ══════════════════════════════════════════════════════════
            ()=>{
              const hexGrid=Array.from({length:7},(_,r)=>Array.from({length:6},(_,c)=>{const hx=55+c*105+(r%2)*52,hy=90+r*88;return `<polygon points="${hx},${hy-26} ${hx+22},${hy-13} ${hx+22},${hy+13} ${hx},${hy+26} ${hx-22},${hy+13} ${hx-22},${hy-13}" fill="none" stroke="${style.g1}" stroke-width="0.9" opacity="0.10"/>`}).join('')).join('');
              const traces=[`M28,90 L28,190 L95,190 L95,260 L160,260`,`M692,110 L692,220 L625,220 L625,340 L560,340`,`M28,480 L110,480 L110,580 L28,580 L28,680 L90,680`,`M692,500 L620,500 L620,600 L692,600 L692,700`,`M28,820 L100,820 L100,920 L180,920`,`M692,840 L610,840 L610,940`].map(d=>`<path d="${d}" fill="none" stroke="${style.g1}" stroke-width="1.8" opacity="0.17" stroke-dasharray="8,4"/>`).join('');
              const dots=Array.from({length:16},(_,i)=>`<circle cx="${28+(i%2)*664}" cy="${160+i*68}" r="${i%3===0?3:2}" fill="${style.g1}" opacity="${0.12+i%3*0.05}"/>`).join('');
              const qTextSvg=L.qL.map((l,i)=>`<text x="48" y="${98+i*L.qF*1.35}" font-family="'Courier New',monospace" font-size="${L.qF}" font-weight="700" fill="${textColor}">${esc(l)}</text>`).join('');
              let oy=90+L.qH+30,optSvg='';
              L.od.forEach((o,i)=>{const col=style.opts[i%4];optSvg+=`<g><rect x="40" y="${oy}" width="570" height="${o.pillH}" rx="3" fill="${style.dark?'rgba(2,12,26,0.88)':'rgba(224,242,254,0.92)'}" stroke="${col}" stroke-width="2.2"/><rect x="40" y="${oy}" width="8" height="${o.pillH}" rx="2" fill="${col}"/><rect x="48" y="${oy}" width="2.5" height="${o.pillH}" fill="white" opacity="0.14"/><rect x="56" y="${oy+4}" width="46" height="${o.pillH-8}" fill="none" stroke="${col}" stroke-width="1.5"/><rect x="56" y="${oy+4}" width="46" height="${o.pillH-8}" fill="${col}" opacity="0.10"/><rect x="56" y="${oy+4}" width="46" height="8" fill="${col}" opacity="0.2"/><text x="79" y="${oy+o.pillH/2+8}" font-family="'Courier New',monospace" font-size="19" font-weight="800" fill="${col}" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=oy+(o.pillH-tb)/2+o.lh*0.76;o.lines.forEach((ln,li)=>optSvg+=`<text x="116" y="${fb+li*o.lh}" font-family="'Courier New',monospace" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);optSvg+=`</g>`;oy+=o.pillH+14});
              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${style.dark?'#07111F':'#EFF6FF'}"/><stop offset="100%" stop-color="${style.dark?'#030912':'#DBEAFE'}"/></linearGradient><pattern id="scan" width="720" height="5" patternUnits="userSpaceOnUse"><line x1="0" y1="2.5" x2="720" y2="2.5" stroke="${style.g1}" stroke-width="0.5" stroke-opacity="0.06"/></pattern><pattern id="microDot" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="6" cy="6" r="0.8" fill="${style.g1}" opacity="0.12"/></pattern><filter id="s" x="-55%" y="-55%" width="210%" height="210%"><feDropShadow dx="0" dy="26" stdDeviation="${shadow+5}" flood-opacity="0.6" flood-color="${style.g1}" flood-opacity="0.35"/><feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.18" flood-color="#000"/></filter><filter id="neon" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b1"/><feGaussianBlur stdDeviation="3" result="b2" in="SourceGraphic"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>${hexGrid}${traces}${dots}<g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#cardBg)" filter="url(#s)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#scan)"/><rect width="650" height="${L.th}" rx="${cardR}" fill="url(#microDot)"/><rect x="3" y="3" width="644" height="${L.th-6}" rx="${cardR-2}" fill="none" stroke="${style.g1}" stroke-width="2.8" opacity="0.9" filter="url(#neon)"/><rect x="9" y="9" width="632" height="${L.th-18}" rx="${cardR-5}" fill="none" stroke="${style.g1}" stroke-width="0.7" opacity="0.32"/><g fill="${style.g1}" opacity="0.9"><rect x="3" y="3" width="38" 