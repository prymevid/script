              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="6" dy="6" stdDeviation="0" flood-opacity="0.35"/></filter></defs><g opacity="0.2">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="0" fill="${cardFill}" stroke="${textColor}" stroke-width="5" filter="url(#s)"/><rect x="15" y="15" width="620" height="${L.th-30}" fill="none" stroke="${textColor}" stroke-width="4" stroke-dasharray="10,6" opacity="0.3"/><rect x="30" y="-38" width="180" height="66" rx="0" fill="${style.dark?'#1F2937':'#F8FAFC'}" stroke="${textColor}" stroke-width="4"/><rect x="34" y="-34" width="172" height="58" fill="url(#g)"/><text x="120" y="5" font-family="Helvetica, sans-serif" font-size="28" font-weight="900" fill="white" text-anchor="middle" stroke="${textColor}" stroke-width="1.5">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${90+i*L.qF*1.35}" font-family="Helvetica, sans-serif" font-size="${L.qF}" font-weight="800" fill="${textColor}">${esc(l)}</text>`).join('')}${(() => {let y=90+L.qH+30, s=''; L.od.forEach((o,i)=>{const col=style.opts[i%4]; s+=`<g><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="0" fill="${style.dark?'#1A1A1A':'#FFF'}" stroke="${textColor}" stroke-width="4"/><rect x="36" y="${y-4}" width="578" height="${o.pillH+8}" fill="none" stroke="${col}" stroke-width="3"/><circle cx="76" cy="${y+o.pillH/2}" r="24" fill="${col}" stroke="${textColor}" stroke-width="3"/><text x="76" y="${y+o.pillH/2+7}" font-family="Helvetica, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" stroke="${textColor}" stroke-width="1">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="116" y="${fb+li*o.lh}" font-family="Helvetica, sans-serif" font-size="${L.oF}" fill="${textColor}" font-weight="600">${esc(ln)}</text>`);s+=`</g>`;y+=o.pillH+16}); return s;})()}</g></svg>`;
            },
            // 15: MINIMALIST BOLD
            ()=>{
              return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="${shadow}" flood-opacity="0.12"/></filter></defs><g opacity="0.12">${roadDecor}</g><g transform="translate(35,${top})"><rect width="650" height="${L.th}" rx="32" fill="${cardFill}" filter="url(#s)"/><rect x="0" y="0" width="650" height="110" rx="32" fill="url(#g)" opacity="0.35"/><rect x="0" y="0" width="650" height="4" rx="2" fill="url(#g)"/><text x="48" y="82" font-family="Arial" font-size="52" font-weight="900" fill="${textColor}" opacity="0.9">Q${num}</text>${L.qL.map((l,i)=>`<text x="48" y="${128+i*L.qF*1.3}" font-family="Arial" font-size="${L.qF}" font-weight="800" fill="${textColor}">${esc(l)}</text>`).join('')}${(() => {let y=Math.max(128+L.qH+24, 210), s=''; L.od.forEach((o,i)=>{const col=style.opts[i%4]; s+=`<g><circle cx="76" cy="${y+o.pillH/2}" r="28" fill="${col}"/><text x="76" y="${y+o.pillH/2+9}" font-family="Arial" font-size="22" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="124" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}" font-weight="600">${esc(ln)}</text>`);y+=o.pillH+20}); return s;})()}</g></svg>`;
            }
          ];
          // =============== END OF USER THEMES SECTION ===============

          const themeIndex = Math.floor(Math.random()*THEMES.length);
          const svg = THEMES[themeIndex]();

          (async()=>{
            const randomId = Math.floor(Math.random()*1084);
            const img=await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r=>r.arrayBuffer());
            const bg=await sharp(Buffer.from(img)).resize(720,1280,{fit:'cover'}).blur(14+Math.floor(Math.random()*8)).modulate({brightness:0.6+Math.random()*0.12,saturation:1+Math.random()*0.2}).toBuffer();
            const overlay=await sharp(Buffer.from(svg)).png().toBuffer();
            const frame=path.join(TMP,'frame.png'); await sharp(bg).composite([{input:overlay}]).png().toFile(frame);
            let audio=null; if(fs.existsSync(MUSIC)){const f=fs.readdirSync(MUSIC).filter(x=>/\.(mp3|m4a|wav)$/i.test(x)); if(f.length) audio=path.join(MUSIC,f[Math.floor(Math.random()*f.length)]);}
            const DUR=(4.9+Math.random()*0.6).toFixed(2), CRF=21+Math.floor(Math.random()*4), hue=(Math.random()*20-10).toFixed(1);
            const vf=`zoompan=z='min(zoom+0.0012,${(1+Math.random()*0.025).toFixed(3)})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=${(Math.random()*0.04-0.02).toFixed(3)}:saturation=${(1+Math.random()*0.1).toFixed(2)},hue=h=${hue},noise=alls=${2+Math.floor(Math.random()*3)}:allf=t+u,vignette=${(0.2+Math.random()*0.15).toFixed(2)},format=yuv420p`;
            const out=path.join(OUT,`quiz_${q.id.replace(/[^a-z0-9]/gi,'_')}_${Date.now()}.mp4`);
            const args=['-y','-loglevel','error','-loop','1','-i',frame]; if(audio)args.push('-i',audio);
            args.push('-t',DUR,'-vf',vf,'-r','30','-c:v','libx264','-crf',String(CRF),'-preset','veryfast');
            if(audio)args.push('-c:a','aac','-b:a','128k','-shortest'); else args.push('-an');
            args.push('-movflags','+faststart',out);
            execSync(`ffmpeg ${args.map(a=>`"${a.replace(/"/g,'\\"')}"`).join(' ')}`);
            console.log('Generated:',out,style.n,'theme',themeIndex+1);
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "Add premium quiz video" && git push)
