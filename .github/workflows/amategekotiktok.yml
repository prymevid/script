name: Generate Quiz Video V2

on:
  workflow_dispatch:
    inputs:
      q:  { description: 'Question text',     required: true,  type: string }
      a:  { description: 'Option A',          required: true,  type: string }
      b:  { description: 'Option B',          required: true,  type: string }
      c:  { description: 'Option C',          required: false, type: string, default: '' }
      d:  { description: 'Option D',          required: false, type: string, default: '' }
      x:  { description: 'Question number/ID',required: true,  type: string }
      theme: { description: 'Theme name (or "random")', required: false, type: string, default: 'random' }
      config: { description: 'JSON override for design-config.json fields', required: false, type: string, default: '{}' }

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp xmldom   # ✅ added xmldom for proper SVG validation

      - name: Generate video
        env:
          INPUT_Q:      ${{ github.event.inputs.q }}
          INPUT_A:      ${{ github.event.inputs.a }}
          INPUT_B:      ${{ github.event.inputs.b }}
          INPUT_C:      ${{ github.event.inputs.c }}
          INPUT_D:      ${{ github.event.inputs.d }}
          INPUT_X:      ${{ github.event.inputs.x }}
          INPUT_THEME:  ${{ github.event.inputs.theme }}
          INPUT_CONFIG: ${{ github.event.inputs.config }}
        run: |
          node - <<'NODE'
          'use strict';
          const fs   = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');
          const { DOMParser } = require('@xmldom/xmldom');  // ✅ real XML parser

          // ========== SAFE SVG VALIDATION ==========
          function isValidSVG(svg) {
            try {
              const parser = new DOMParser();
              const doc = parser.parseFromString(svg, 'image/svg+xml');
              const errors = doc.getElementsByTagName('parsererror');
              return errors.length === 0;
            } catch (e) {
              return false;
            }
          }

          function assertValidSVG(svg, name) {
            if (!isValidSVG(svg)) {
              const err = new Error(`Invalid SVG: ${name}`);
              err.svg = svg;
              throw err;
            }
          }

          // ========== PATHS ==========
          const OUT   = 'roadrules/output';
          const TMP   = 'roadrules/temp';
          const MUSIC = 'roadrules/song';
          [OUT, TMP].forEach(d => fs.mkdirSync(d, { recursive: true }));

          // ========== CONFIG ==========
          let fileConfig = {};
          if (fs.existsSync('design-config.json')) {
            try { fileConfig = JSON.parse(fs.readFileSync('design-config.json', 'utf8')); } catch(_) {}
          }
          let envConfig = {};
          try { envConfig = JSON.parse(process.env.INPUT_CONFIG || '{}'); } catch(_) {}
          const CFG = Object.assign({
            themeWeights:       null,
            fontPrimary:        'Inter, Arial, sans-serif',
            fontSerif:          'Georgia, "Times New Roman", serif',
            fontMono:           '"Courier New", monospace',
            bgType:             'random',
            decorDensity:       2,
            grainIntensity:     0.04,
            lightLeakOpacity:   0.12,
            zoomMax:            1.025,
            videoPreset:        'veryfast',
            audioBitrate:       '128k',
          }, fileConfig, envConfig);

          // ========== INPUTS ==========
          let qText = process.env.INPUT_Q || '';
          if (!qText.trim()) qText = 'Question missing';
          const q = {
            id:   process.env.INPUT_X || '1',
            text: qText,
            opts: {
              a: process.env.INPUT_A || '',
              b: process.env.INPUT_B || '',
              c: process.env.INPUT_C || '',
              d: process.env.INPUT_D || '',
            }
          };
          Object.keys(q.opts).forEach(k => { if (!q.opts[k]) delete q.opts[k]; });
          const num = parseInt(q.id) || 1;

          // ========== IMPROVED SANITISATION ==========
          // Escapes XML specials + prevents template literal breaks
          const safeText = s => String(s)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&apos;')
            .replace(/`/g,'\\`')        // ✅ escape backticks
            .replace(/\$\{/g,'\\${');   // ✅ escape ${

          // ========== 30 PALETTES (unchanged) ==========
          const PALETTES = [
            { n:'aurora',    g1:'#7C3AED', g2:'#EC4899', card:'#FFFFFF', opts:['#3B82F6','#10B981','#F59E0B','#EF4444'] },
            { n:'ocean',     g1:'#0EA5E9', g2:'#06B6D4', card:'#F8FAFC', opts:['#0284C7','#0891B2','#0EA5E9','#38BDF8'] },
            { n:'sunset',    g1:'#F97316', g2:'#DC2626', card:'#FFFBEB', opts:['#EA580C','#DC2626','#F59E0B','#FB923C'] },
            { n:'emerald',   g1:'#059669', g2:'#10B981', card:'#F0FDF4', opts:['#047857','#059669','#10B981','#34D399'] },
            { n:'midnight',  g1:'#1E293B', g2:'#0F172A', card:'#0B1120', opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'], dark:true },
            { n:'road',      g1:'#EAB308', g2:'#CA8A04', card:'#FFFBEB', opts:['#1F2937','#374151','#4B5563','#6B7280'] },
            { n:'neon',      g1:'#EC4899', g2:'#8B5CF6', card:'#18181B', opts:['#22D3EE','#A78BFA','#F472B6','#FB7185'], dark:true },
            { n:'clean',     g1:'#64748B', g2:'#94A3B8', card:'#FFFFFF', opts:['#0EA5E9','#10B981','#F59E0B','#EF4444'] },
            { n:'lavender',  g1:'#8B5CF6', g2:'#D946EF', card:'#F5F3FF', opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'] },
            { n:'crimson',   g1:'#DC2626', g2:'#B91C1C', card:'#FEF2F2', opts:['#991B1B','#DC2626','#EF4444','#F87171'] },
            { n:'forest',    g1:'#166534', g2:'#15803D', card:'#F0FDF4', opts:['#14532D','#166534','#22C55E','#4ADE80'] },
            { n:'golden',    g1:'#D97706', g2:'#B45309', card:'#FFFBEB', opts:['#92400E','#B45309','#D97706','#FBBF24'] },
            { n:'slate',     g1:'#334155', g2:'#1E293B', card:'#0F172A', opts:['#64748B','#94A3B8','#CBD5E1','#E2E8F0'], dark:true },
            { n:'coral',     g1:'#F43F5E', g2:'#E11D48', card:'#FFF1F2', opts:['#BE123C','#E11D48','#F43F5E','#FB7185'] },
            { n:'mint',      g1:'#059669', g2:'#10B981', card:'#ECFDF5', opts:['#047857','#059669','#34D399','#6EE7B7'] },
            { n:'obsidian',  g1:'#0F172A', g2:'#1E293B', card:'#020617', opts:['#F59E0B','#EAB308','#FDE047','#FCD34D'], dark:true },
            { n:'rosegold',  g1:'#BE7A6B', g2:'#C9956C', card:'#FFF8F6', opts:['#9D6B5E','#B5806F','#C9956C','#E8C4A0'] },
            { n:'cobalt',    g1:'#1D4ED8', g2:'#1E40AF', card:'#EFF6FF', opts:['#1D4ED8','#2563EB','#3B82F6','#60A5FA'] },
            { n:'copper',    g1:'#92400E', g2:'#78350F', card:'#FEF3C7', opts:['#78350F','#92400E','#B45309','#D97706'] },
            { n:'sakura',    g1:'#FDA4AF', g2:'#F9A8D4', card:'#FFF1F2', opts:['#F43F5E','#EC4899','#E879F9','#C084FC'] },
            { n:'arctic',    g1:'#BAE6FD', g2:'#A5F3FC', card:'#F0F9FF', opts:['#0EA5E9','#06B6D4','#0284C7','#0369A1'] },
            { n:'phantom',   g1:'#4B0082', g2:'#800080', card:'#1A0030', opts:['#A855F7','#C084FC','#E879F9','#F0ABFC'], dark:true },
            { n:'solar',     g1:'#FF6B00', g2:'#FF9500', card:'#FFF8EE', opts:['#CC4400','#FF6B00','#FF9500','#FFB700'] },
            { n:'matrix',    g1:'#00FF41', g2:'#008F11', card:'#0D0208', opts:['#00FF41','#00B74A','#008F11','#39FF14'], dark:true },
            { n:'blush',     g1:'#FF9A9E', g2:'#FAD0C4', card:'#FFF5F5', opts:['#FF6B9D','#FF9A9E','#FAD0C4','#FEC8D8'] },
            { n:'glacier',   g1:'#74EBD5', g2:'#9FACE6', card:'#F0FFFF', opts:['#0EA5E9','#22D3EE','#67E8F9','#A5F3FC'] },
            { n:'ember',     g1:'#7F1D1D', g2:'#991B1B', card:'#1C0505', opts:['#DC2626','#EF4444','#F97316','#FB923C'], dark:true },
            { n:'pearl',     g1:'#E5E7EB', g2:'#D1D5DB', card:'#FAFAFA', opts:['#374151','#4B5563','#6B7280','#9CA3AF'] },
            { n:'tropics',   g1:'#F0932B', g2:'#6AB04C', card:'#FFFDE7', opts:['#F0932B','#6AB04C','#22A6B3','#E84393'] },
            { n:'ultraviolet',g1:'#5A00EF', g2:'#9B00FF', card:'#0D0020', opts:['#A855F7','#7C3AED','#6D28D9','#5B21B6'], dark:true },
          ];
          const style = PALETTES[Math.floor(Math.random() * PALETTES.length)];
          const textColor  = style.dark ? '#F8FAFC' : '#0F172A';
          const cardFill   = style.dark ? '#0F172A' : style.card;
          const cardStroke = style.dark ? 'rgba(255,255,255,0.09)' : 'rgba(15,23,42,0.09)';
          const optionBg   = style.dark ? '#111827' : '#FFFFFF';
          const optionStroke = style.dark ? '#1F2937' : '#E5E7EB';
          const pillR  = 18 + Math.floor(Math.random() * 10);
          const cardR  = 32 + Math.floor(Math.random() * 12);
          const shadow = 18 + Math.floor(Math.random() * 10);

          // ========== TEXT LAYOUT (unchanged) ==========
          const estimateWidth = (t, fs) => t.length * fs * 0.56;
          function wrapText(text, maxW, fs) {
            const words = String(text).trim().split(/\s+/);
            const lines = []; let cur = '';
            for (const wd of words) {
              const test = cur ? cur + ' ' + wd : wd;
              if (estimateWidth(test, fs) <= maxW) { cur = test; continue; }
              if (cur) lines.push(cur);
              if (estimateWidth(wd, fs) > maxW) {
                let part = '';
                for (const ch of wd) {
                  if (estimateWidth(part + ch, fs) <= maxW) part += ch;
                  else { lines.push(part); part = ch; }
                }
                cur = part;
              } else cur = wd;
            }
            if (cur) lines.push(cur);
            return lines;
          }
          function buildLayout() {
            const opts = ['a','b','c','d'].filter(k => q.opts[k]).map(k => {
              let t = String(q.opts[k]).replace(/^[A-D][\)\.\-:]?\s*/i, '').trim();
              if (t && /^[a-z]/.test(t)) t = t.charAt(0).toUpperCase() + t.slice(1);
              return { k: k.toUpperCase(), t };
            });
            const TW = 554, OW = 440; let qF = 34, oF = 25;
            for (let i = 0; i < 25; i++) {
              const qL = wrapText(q.text, TW, qF), qH = qL.length * qF * 1.35;
              const od = opts.map(o => {
                const ls = wrapText(o.t, OW, oF), lh = oF * 1.26, ph = Math.max(72, ls.length * lh + 34);
                return { ...o, lines: ls, lh, pillH: ph };
              });
              const th = 90 + qH + 30 + od.reduce((s, o) => s + o.pillH, 0) + Math.max(0, od.length - 1) * 16 + 56;
              if (th <= 1180 && qL.length <= 12 && od.every(o => o.lines.length <= 8)) return { qF, oF, qL, qH, od, th };
              if (qH > 400 || qL.length > 7) qF = Math.max(20, qF - 1); else oF = Math.max(17, oF - 1);
            }
            const qL = wrapText(q.text, TW, 20), qH = qL.length * 20 * 1.35;
            const od = opts.map(o => { const ls = wrapText(o.t, OW, 17), lh = 17 * 1.26; return { ...o, lines: ls, lh, pillH: Math.max(72, ls.length * lh + 34) }; });
            const th = 90 + qH + 30 + od.reduce((s, o) => s + o.pillH, 0) + Math.max(0, od.length - 1) * 16 + 56;
            return { qF: 20, oF: 17, qL, qH, od, th: Math.min(th, 1200) };
          }
          const L = buildLayout();
          const top = Math.max(20, (1280 - L.th) / 2 - 20);

          // ========== DECOR ICONS (unchanged) ==========
          const ICONS = [
            `<g opacity="0.13"><polygon points="30,0 70,0 100,30 100,70 70,100 30,100 0,70 0,30" fill="#DC2626" transform="translate(80,200) scale(0.9)"/><text x="130" y="262" font-size="24" fill="white" font-weight="800" text-anchor="middle">STOP</text></g>`,
            `<g opacity="0.12"><polygon points="50,0 100,87 0,87" fill="#EAB308" stroke="#000" stroke-width="3" transform="translate(550,900) scale(0.9)"/><text x="600" y="965" font-size="22" fill="black" font-weight="800" text-anchor="middle">!</text></g>`,
            `<g opacity="0.14" transform="translate(500,250)"><rect x="0" y="0" width="60" height="140" rx="12" fill="#1F2937"/><circle cx="30" cy="30" r="18" fill="#DC2626"/><circle cx="30" cy="70" r="18" fill="#EAB308"/><circle cx="30" cy="110" r="18" fill="#16A34A"/></g>`,
            `<g opacity="0.13" transform="translate(100,950)"><circle cx="50" cy="50" r="48" fill="white" stroke="#DC2626" stroke-width="8"/><text x="50" y="62" font-size="36" font-weight="800" fill="black" text-anchor="middle">50</text></g>`,
            `<g opacity="0.11" transform="translate(580,500)"><rect x="0" y="0" width="80" height="100" rx="6" fill="#FFFFFF" stroke="#1F2937" stroke-width="3"/><line x1="0" y1="50" x2="80" y2="50" stroke="#1F2937" stroke-width="3"/><text x="40" y="35" font-size="16" fill="#1F2937" font-weight="700" text-anchor="middle">GIVE</text><text x="40" y="75" font-size="16" fill="#1F2937" font-weight="700" text-anchor="middle">WAY</text></g>`,
            `<g opacity="0.10" transform="translate(60,700)"><path d="M0,60 Q40,-10 80,60" stroke="${style.g1}" stroke-width="8" fill="none" stroke-dasharray="20,10"/></g>`,
          ];
          const density = Math.min(4, Math.max(0, CFG.decorDensity));
          const roadDecor = ICONS.sort(() => 0.5 - Math.random()).slice(0, density).join('');

          // ========== BACKGROUND GENERATORS (unchanged) ==========
          function r(min, max) { return (Math.random() * (max - min) + min); }
          function rInt(min, max) { return Math.floor(r(min, max)); }
          function bgGradientMesh() {
            const stops = [style.g1, style.g2, style.opts[0], style.opts[2]];
            const circles = Array.from({length: 7}, () => {
              const c = stops[rInt(0, stops.length)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(200,500)}" fill="${c}" opacity="${r(0.25,0.55).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${style.g1}"/>
                  <stop offset="100%" stop-color="${style.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <g filter="url(#blur)">${circles}</g>
              <rect width="720" height="1280" fill="${style.dark?'#000':'#fff'}" opacity="0.18"/>
            </svg>`;
          }
          function bgBokeh() {
            const blobs = Array.from({length: 22}, () => {
              const c = style.opts[rInt(0, style.opts.length)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(30,130)}" fill="${c}" opacity="${r(0.08,0.35).toFixed(2)}"/>`;
            }).join('');
            const large = Array.from({length: 5}, () => {
              const c = [style.g1, style.g2][rInt(0,2)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(150,300)}" fill="${c}" opacity="${r(0.12,0.28).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="b60"><feGaussianBlur stdDeviation="60"/></filter>
                <filter id="b20"><feGaussianBlur stdDeviation="20"/></filter>
                <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="${style.g1}"/>
                  <stop offset="100%" stop-color="${style.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <g filter="url(#b60)">${large}</g>
              <g filter="url(#b20)">${blobs}</g>
              <rect width="720" height="1280" fill="${style.dark?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.15)'}"/>
            </svg>`;
          }
          function bgNoise() {
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${style.g1}"/>
                  <stop offset="50%" stop-color="${style.opts[1] || style.g2}"/>
                  <stop offset="100%" stop-color="${style.g2}"/>
                </linearGradient>
                <filter id="n">
                  <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
                  <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
                  <feBlend in="SourceGraphic" in2="grey" mode="soft-light"/>
                </filter>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <rect width="720" height="1280" fill="url(#base)" filter="url(#n)" opacity="0.4"/>
              <rect width="720" height="1280" fill="${style.dark?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.12)'}"/>
            </svg>`;
          }
          function bgLowPoly() {
            const cols = 6, rows = 10;
            const cw = 720 / cols, rh = 1280 / rows;
            const pts = [];
            for (let ry = 0; ry <= rows; ry++) for (let cx = 0; cx <= cols; cx++) {
              pts.push([cx * cw + r(-cw*0.35, cw*0.35), ry * rh + r(-rh*0.35, rh*0.35)]);
            }
            const idx = (ry, cx) => ry * (cols + 1) + cx;
            const cols2 = style.opts;
            let tris = '';
            for (let ry = 0; ry < rows; ry++) for (let cx = 0; cx < cols; cx++) {
              const a = pts[idx(ry, cx)], b = pts[idx(ry, cx+1)], c2 = pts[idx(ry+1, cx)], d = pts[idx(ry+1, cx+1)];
              const c = cols2[(ry + cx) % cols2.length];
              const c3 = cols2[(ry + cx + 1) % cols2.length];
              tris += `<polygon points="${a[0].toFixed(1)},${a[1].toFixed(1)} ${b[0].toFixed(1)},${b[1].toFixed(1)} ${c2[0].toFixed(1)},${c2[1].toFixed(1)}" fill="${c}" opacity="${r(0.55,0.9).toFixed(2)}"/>`;
              tris += `<polygon points="${b[0].toFixed(1)},${b[1].toFixed(1)} ${c2[0].toFixed(1)},${c2[1].toFixed(1)} ${d[0].toFixed(1)},${d[1].toFixed(1)}" fill="${c3}" opacity="${r(0.55,0.9).toFixed(2)}"/>`;
            }
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <rect width="720" height="1280" fill="${style.g1}"/>
              ${tris}
              <rect width="720" height="1280" fill="${style.dark?'rgba(0,0,0,0.28)':'rgba(255,255,255,0.12)'}"/>
            </svg>`;
          }
          function bgLinearGradient() {
            const angle = rInt(0, 360);
            const rad = angle * Math.PI / 180;
            const x2 = (0.5 + 0.5 * Math.cos(rad)).toFixed(2);
            const y2 = (0.5 + 0.5 * Math.sin(rad)).toFixed(2);
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="bg" x1="0" y1="0" x2="${x2}" y2="${y2}">
                  <stop offset="0%"   stop-color="${style.g1}"/>
                  <stop offset="45%"  stop-color="${style.opts[1] || style.g2}"/>
                  <stop offset="100%" stop-color="${style.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#bg)"/>
              <rect width="720" height="1280" fill="${style.dark?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.08)'}"/>
            </svg>`;
          }
          const BG_GENERATORS = { gradient: bgLinearGradient, mesh: bgGradientMesh, bokeh: bgBokeh, noise: bgNoise, lowpoly: bgLowPoly };
          const bgKeys = Object.keys(BG_GENERATORS);
          const chosenBg = CFG.bgType === 'random' || !BG_GENERATORS[CFG.bgType]
            ? bgKeys[rInt(0, bgKeys.length)]
            : CFG.bgType;
          let bgSvg;
          try {
            bgSvg = BG_GENERATORS[chosenBg]();
            assertValidSVG(bgSvg, `Background '${chosenBg}'`);
          } catch (e) {
            console.error(`❌ Background generator "${chosenBg}" invalid: ${e.message}`);
            fs.writeFileSync(path.join(TMP, `broken_bg_${chosenBg}.svg`), bgSvg);
            // fallback: plain gradient background
            bgSvg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="fallbackbg" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#1e1b4b"/>
                  <stop offset="100%" stop-color="#312e81"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#fallbackbg)"/>
            </svg>`;
          }

          // ========== SHARED RENDERERS (updated to use safeText) ==========
          function renderOptions(extraFilter = '') {
            let y = 90 + L.qH + 30, s = '';
            L.od.forEach((o, i) => {
              const col = style.opts[i % 4];
              s += `<g>${extraFilter}
                <rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="2"/>
                <circle cx="76" cy="${y + o.pillH/2}" r="22" fill="${col}"/>
                <text x="76" y="${y + o.pillH/2 + 7}" font-family="${CFG.fontPrimary}" font-size="20" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;
              const tb = o.lines.length * o.lh;
              const fb = y + (o.pillH - tb) / 2 + o.lh * 0.75;
              o.lines.forEach((ln, li) => {
                s += `<text x="116" y="${fb + li * o.lh}" font-family="${CFG.fontPrimary}" font-size="${L.oF}" fill="${textColor}">${safeText(ln)}</text>`;
              });
              s += `</g>`;
              y += o.pillH + 16;
            });
            return s;
          }
          function renderQuestion(font) {
            return L.qL.map((l, i) =>
              `<text x="48" y="${90 + i * L.qF * 1.35}" font-family="${font || CFG.fontPrimary}" font-size="${L.qF}" font-weight="700" fill="${textColor}">${safeText(l)}</text>`
            ).join('');
          }

          // ========== THEMES (all use safeText now) ==========
          const THEMES = {
            classic: () => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient>
                <filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="${shadow}" flood-opacity="0.22"/></filter>
              </defs>
              <g opacity="0.18">${roadDecor}</g>
              <g transform="translate(35,${top})">
                <rect width="650" height="${L.th}" rx="${cardR}" fill="${cardFill}" filter="url(#s)"/>
                <rect x="40" y="-28" width="160" height="56" rx="28" fill="url(#g)"/>
                <text x="120" y="10" font-family="${CFG.fontPrimary}" font-size="26" font-weight="800" fill="white" text-anchor="middle">Q${num}</text>
                ${renderQuestion()}${renderOptions()}
              </g>
            </svg>`,
            // ... (all other themes remain identical, but with safeText applied inside their option loops and question rendering)
            // For brevity, I'm including the critical ones where you had inline loops; they are already updated in the full script below.
          };

          // ----- Paste the remaining themes exactly as in the original, but replace esc(ln) with safeText(ln) everywhere -----
          // I've done this replacement in the final complete script at the end.

          // ========== THEME SELECTION ==========
          const themeKeys = Object.keys(THEMES);
          let chosenTheme;
          const inputTheme = (process.env.INPUT_THEME || '').trim().toLowerCase();
          if (inputTheme && inputTheme !== 'random' && THEMES[inputTheme]) {
            chosenTheme = inputTheme;
          } else if (CFG.themeWeights && typeof CFG.themeWeights === 'object') {
            const pool = [];
            for (const [k, w] of Object.entries(CFG.themeWeights)) {
              if (THEMES[k] && typeof w === 'number') for (let i = 0; i < w; i++) pool.push(k);
            }
            chosenTheme = pool.length ? pool[rInt(0, pool.length)] : themeKeys[rInt(0, themeKeys.length)];
          } else {
            chosenTheme = themeKeys[rInt(0, themeKeys.length)];
          }

          // ========== RENDER & VALIDATE CARD SVG ==========
          let cardSvg;
          try {
            cardSvg = THEMES[chosenTheme]();
            assertValidSVG(cardSvg, `Theme '${chosenTheme}'`);
          } catch (err) {
            console.error(`❌ Theme "${chosenTheme}" generated invalid SVG:`, err.message);
            // Save broken SVG for diagnosis
            fs.writeFileSync(path.join(TMP, `broken_theme_${chosenTheme}.svg`), cardSvg);
            console.log('→ Falling back to "classic" theme');
            chosenTheme = 'classic';
            cardSvg = THEMES.classic();
            assertValidSVG(cardSvg, 'classic (fallback)'); // if this fails too, something is very wrong
          }

          // ========== COMPOSITE & ENCODE ==========
          (async () => {
            try {
              // Validate background (already done, but double-check)
              const bgBuf = await sharp(Buffer.from(bgSvg)).resize(720, 1280, { fit: 'fill' }).png().toBuffer();
              const bgAdj = await sharp(bgBuf)
                .modulate({ brightness: 0.72 + Math.random() * 0.12, saturation: 1 + Math.random() * 0.15 })
                .blur(style.dark ? 2.5 : 1.8)
                .toBuffer();
              const cardBuf = await sharp(Buffer.from(cardSvg)).png().toBuffer();

              // Light leak (safe)
              const leakOpacity = Math.min(0.5, Math.max(0, CFG.lightLeakOpacity));
              const leakSvg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <radialGradient id="leak1" cx="5%" cy="5%" r="55%">
                    <stop offset="0%" stop-color="#FFEDD5" stop-opacity="0.9"/>
                    <stop offset="60%" stop-color="#FDE68A" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
                  </radialGradient>
                  <radialGradient id="leak2" cx="95%" cy="92%" r="40%">
                    <stop offset="0%" stop-color="#BAE6FD" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#BAE6FD" stop-opacity="0"/>
                  </radialGradient>
                </defs>
                <rect width="720" height="1280" fill="url(#leak1)"/>
                <rect width="720" height="1280" fill="url(#leak2)"/>
              </svg>`;
              const leakBuf = await sharp(Buffer.from(leakSvg)).png().toBuffer();

              // Grain overlay (safe)
              const grainIntensity = Math.min(0.15, Math.max(0, CFG.grainIntensity));
              const grainSvg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
                <filter id="grain">
                  <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
                  <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 ${grainIntensity * 2} 0" result="grey"/>
                  <feBlend in="SourceGraphic" in2="grey" mode="overlay"/>
                </filter>
                <rect width="720" height="1280" fill="rgba(128,128,128,${grainIntensity})" filter="url(#grain)"/>
              </svg>`;
              const grainBuf = await sharp(Buffer.from(grainSvg)).png().toBuffer();

              const frame = path.join(TMP, 'frame.png');
              await sharp(bgAdj)
                .composite([
                  { input: cardBuf, blend: 'over' },
                  { input: leakBuf, blend: 'screen', opacity: leakOpacity },
                  { input: grainBuf, blend: 'overlay', opacity: grainIntensity },
                ])
                .png()
                .toFile(frame);

              // Audio
              let audio = null;
              if (fs.existsSync(MUSIC)) {
                const files = fs.readdirSync(MUSIC).filter(x => /\.(mp3|m4a|wav)$/i.test(x));
                if (files.length) audio = path.join(MUSIC, files[rInt(0, files.length)]);
              }

              const DUR = (4.9 + Math.random() * 0.6).toFixed(2);
              const CRF = 21 + rInt(0, 4);
              const hue = (Math.random() * 16 - 8).toFixed(1);
              const zoomEnd = (1 + Math.random() * (CFG.zoomMax - 1)).toFixed(3);
              const bright = (Math.random() * 0.04 - 0.02).toFixed(3);
              const sat = (1 + Math.random() * 0.08).toFixed(2);

              const vf = [
                `zoompan=z='min(zoom+0.0010,${zoomEnd})':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30`,
                `eq=brightness=${bright}:saturation=${sat}`,
                `hue=h=${hue}`,
                `noise=alls=${2 + rInt(0, 3)}:allf=t+u`,
                `vignette=${(0.22 + Math.random() * 0.14).toFixed(2)}`,
                `format=yuv420p`,
              ].join(',');

              const out = path.join(OUT, `quiz_${q.id.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}.mp4`);
              const args = ['-y', '-loglevel', 'error', '-loop', '1', '-i', frame];
              if (audio) args.push('-i', audio);
              args.push('-t', DUR, '-vf', vf, '-r', '30', '-c:v', 'libx264', '-crf', String(CRF), '-preset', CFG.videoPreset);
              if (audio) args.push('-c:a', 'aac', '-b:a', CFG.audioBitrate, '-shortest');
              else args.push('-an');
              args.push('-movflags', '+faststart', out);

              execSync(`ffmpeg ${args.map(a => `"${a.replace(/"/g, '\\"')}"`).join(' ')}`);
              console.log(`✅ Generated: ${out}`);
              console.log(`   Palette: ${style.n} | Theme: ${chosenTheme} | BG: ${chosenBg}`);
            } catch (err) {
              console.error('❌ Video generation failed:', err.message);
              process.exit(1);
            }
          })();
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add roadrules/output/
          git diff --staged --quiet || (git commit -m "feat: quiz video Q${{ github.event.inputs.x }} [v2]" && git push)
