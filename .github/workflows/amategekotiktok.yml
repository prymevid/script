            radialSpotlight: () => `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient>
                <radialGradient id="spot1" cx="30%" cy="20%" r="60%"><stop offset="0%" stop-color="white" stop-opacity="${style.dark?0.14:0.4}"/><stop offset="100%" stop-color="white" stop-opacity="0"/></radialGradient>
                <radialGradient id="spot2" cx="80%" cy="85%" r="50%"><stop offset="0%" stop-color="${style.g2}" stop-opacity="0.3"/><stop offset="100%" stop-color="${style.g2}" stop-opacity="0"/></radialGradient>
