.opts[i%4];s+=`<g><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+3}" fill="${optionBg}" stroke="${optionStroke}" stroke-width="1.5"/><rect x="40" y="${y}" width="570" height="${o.pillH}" rx="${pillR+3}" fill="${col}" opacity="0.04"/><ellipse cx="60" cy="${y+o.pillH/2}" rx="18" ry="18" fill="${col}" opacity="0.9"/><text x="60" y="${y+o.pillH/2+7}" font-family="Arial" font-size="19" font-weight="800" fill="white" text-anchor="middle">${o.k}</text>`;const tb=o.lines.length*o.lh,fb=y+(o.pillH-tb)/2+o.lh*0.75;o.lines.forEach((ln,li)=>s+=`<text x="104" y="${fb+li*o.lh}" font-family="Arial" font-size="${L.oF}" fill="${textColor}">${esc(ln)}</text>`);s+=`</g>`;y+=o.pillH+18});return s})()}</g></svg>`;
