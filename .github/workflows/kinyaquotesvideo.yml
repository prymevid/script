name: KINYA PREMIER VIDEO

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text to overlay'
        required: true
        type: string
      duration:
        description: 'Video length in seconds'
        required: false
        default: '8'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FFmpeg + ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick

      - name: Prepare folders
        run: mkdir -p kinyaquotes/audio kinyaquotes/output

      - name: Generate Ultra-Premium Video
        env:
          QUOTE_TEXT: ${{ github.event.inputs.text }}
          DURATION_IN: ${{ github.event.inputs.duration }}
        run: |
          set -e
          DURATION=${DURATION_IN:-8}

          # --- 1. CINEMATIC KEN BURNS BACKGROUND ---
          # Fetch high-res image and apply subtle zoom-in animation
          curl -sL "https://picsum.photos/1920/2560?random=$(date +%s%N)" -o /tmp/src.jpg
          ffmpeg -y -i /tmp/src.jpg -vf "scale=-1:10*ih,zoompan=z='min(zoom+0.0008,1.5)':d=125:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=720x1280,boxblur=20:1" -t $DURATION -pix_fmt yuv420p /tmp/bg_zoom.mp4

          # --- 2. CALCULATE DYNAMIC LAYOUT ---
          echo "$QUOTE_TEXT" | fold -s -w 28 > /tmp/lines.txt
          LINES=$(wc -l < /tmp/lines.txt)
          BOX_W=620
          BOX_H=$(( LINES * 62 + 220 ))
          if [ $BOX_H -lt 400 ]; then BOX_H=400; fi
          
          # --- 3. THE "GLASS" BOX DESIGN ---
          # Create a frosted glass plate with white/gold border
          convert -size ${BOX_W}x${BOX_H} xc:none \
            -fill "rgba(255,255,255,0.12)" -draw "roundrectangle 0,0 $((BOX_W-1)) $((BOX_H-1)) 40,40" \
            -stroke "rgba(255,215,0,0.4)" -strokewidth 2 -draw "roundrectangle 2,2 $((BOX_W-3)) $((BOX_H-3)) 38,38" \
            /tmp/glass_base.png

          # Add soft outer glow and deep shadow
          convert /tmp/glass_base.png \( +clone -background "rgba(0,0,0,0.5)" -shadow 80x40+0+20 \) +swap -background none -layers merge /tmp/glass_shadow.png

          # --- 4. LUXURY BRANDING BADGE ---
          # Emerald & Gold gradient badge for the quote icon
          convert -size 80x80 xc:none -fill "gradient:#11998e-#38ef7d" -draw "circle 40,40 40,4" /tmp/badge.png
          convert /tmp/badge.png -font fonts/mineig.ttf -pointsize 48 -fill white -gravity center -annotate +0+4 "“" /tmp/badge_final.png

          # Merge badge onto the glass box
          convert /tmp/glass_shadow.png /tmp/badge_final.png -gravity northwest -geometry -20-20 -compose over -composite /tmp/final_card.png

          # --- 5. TEXT LAYER GENERATION ---
          FILTERS=""
          i=0
          TEXT_START=$(( (BOX_H / 2) - (LINES * 31) + 40 ))
          while IFS= read -r line || [ -n "$line" ]; do
            ESC=$(printf "%s" "$line" | sed "s/'/\\\\''/g; s/:/\\\\:/g")
            Y=$(( TEXT_START + i*62 ))
            # Subtle letter spacing and strong white contrast
            FILTERS="${FILTERS}drawtext=text='${ESC}':fontfile=fonts/mineig.ttf:fontsize=44:fontcolor=white:shadowcolor=black@0.4:shadowx=2:shadowy=2:x=(w-text_w)/2:y=(H-${BOX_H})/2+${Y},"
            i=$((i+1))
          done < /tmp/lines.txt

          # --- 6. FINAL COMPOSITING ---
          AUDIO=$(find kinyaquotes/audio -type f \( -iname "*.mp3" -o -iname "*.m4a" \) 2>/dev/null | shuf -n 1 || true)
          OUT="kinyaquotes/output/premium_$(date +%s).mp4"

          # Composite Background + Glass Box + Animated Fade
          FF_CMD="ffmpeg -y -i /tmp/bg_zoom.mp4 -i /tmp/final_card.png"
          
          if [ -n "$AUDIO" ]; then
            $FF_CMD -i "$AUDIO" -filter_complex "[0:v][1:v]overlay=(W-w)/2:(H-h)/2:format=auto,${FILTERS%,}[v]" \
              -map "[v]" -map 2:a -c:v libx264 -crf 18 -preset slow -c:a aac -b:a 192k \
              -af "afade=t=in:st=0:d=1,afade=t=out:st=$((DURATION-1)):d=1" -shortest -t $DURATION "$OUT"
          else
            $FF_CMD -filter_complex "[0:v][1:v]overlay=(W-w)/2:(H-h)/2:format=auto,${FILTERS%,}[v]" \
              -map "[v]" -an -c:v libx264 -crf 18 -preset slow -t $DURATION "$OUT"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kinyaquotes/output/
          git commit -m "feat: render premium motion quote" || exit 0
          git push
