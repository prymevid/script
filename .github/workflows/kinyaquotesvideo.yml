name: KINYA QUOTES VIDEO

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text to overlay'
        required: true
        type: string
      duration:
        description: 'Video length in seconds'
        required: false
        default: '5'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FFmpeg + ImageMagick
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick

      - name: Prepare folders
        run: mkdir -p kinyaquotes/audio kinyaquotes/output

      - name: Verify custom font
        run: |
          if [! -f "fonts/mineig.ttf" ]; then
            echo "ERROR: fonts/mineig.ttf not found"
            exit 1
          fi

      - name: Generate premium quote video
        env:
          QUOTE_TEXT: ${{ github.event.inputs.text }}
          DURATION_IN: ${{ github.event.inputs.duration }}
        run: |
          set -e
          DURATION=${DURATION_IN:-5}

          # --- 1. CINEMATIC BLURRED BACKGROUND ---
          curl -sL "https://picsum.photos/1920/2560?random=$(date +%s%N)" -o /tmp/src.jpg
          ffmpeg -y -i /tmp/src.jpg -vf "scale=720:1280:force_original_aspect_ratio=increase,crop=720:1280,boxblur=30:1" -vframes 1 /tmp/blur.jpg
          convert /tmp/blur.jpg -brightness-contrast -18x-10 \
            \( -size 720x1280 radial-gradient:"rgba(0,0,0,0.65)-rgba(0,0,0,0)" \) -gravity center -compose multiply -composite /tmp/bg.jpg
          ffmpeg -y -loop 1 -i /tmp/bg.jpg -t $DURATION -r 30 -vf format=yuv420p /tmp/bg.mp4

          # --- 2. PREPARE TEXT ---
          echo "$QUOTE_TEXT" | fold -s -w 30 > /tmp/lines.txt
          LINES=$(wc -l < /tmp/lines.txt)
          BOX_W=640
          BOX_H=$(( LINES * 56 + 180 ))
          [ $BOX_H -lt 340 ] && BOX_H=340
          BOX_Y=$(( (1280 - BOX_H) / 2 ))
          TEXT_START=$(( BOX_Y + 95 ))

          # --- 3. BUILD ULTRA-PREMIUM WHITE CARD ---
          # base white with 28px rounds
          convert -size ${BOX_W}x${BOX_H} xc:none \
            -fill "rgba(255,255,255,0.97)" -draw "roundrectangle 0,0 $((BOX_W-1)) $((BOX_H-1)) 28,28" /tmp/card.png

          # glass top highlight
          convert /tmp/card.png \( -size ${BOX_W}x$((BOX_H*55/100)) gradient:"rgba(255,255,255,0.45)-rgba(255,255,255,0)" \) \
            -gravity north -compose screen -composite /tmp/card2.png

          # subtle inner stroke
          convert /tmp/card2.png -stroke "rgba(0,0,0,0.07)" -strokewidth 1 -fill none \
            -draw "roundrectangle 0.5,0.5 $((BOX_W-1.5)) $((BOX_H-1.5)) 27.5,27.5" /tmp/card3.png

          # DOUBLE SHADOW (big soft + tight)
          convert /tmp/card3.png \( +clone -background black -shadow 90x28+0+32 \) +swap -background none -layers merge +repage /tmp/sh1.png
          convert /tmp/sh1.png \( +clone -background black -shadow 55x16+0+14 \) +swap -background none -layers merge +repage /tmp/card_shadow.png

          # --- 4. PREMIUM GREEN BADGE ---
          convert -size 76x76 xc:none -fill "gradient:#0A6B42-#14B86A" -draw "circle 38,38 38,4" /tmp/badge.png
          convert /tmp/badge.png \( -size 76x76 radial-gradient:"rgba(255,255,255,0.4)-rgba(255,255,255,0)" -gravity north \) -compose screen -composite /tmp/badge2.png
          convert /tmp/badge2.png -stroke "rgba(0,0,0,0.15)" -strokewidth 2 -fill white -font fonts/mineig.ttf -pointsize 46 -gravity center -annotate +0+3 "❝" /tmp/badge_final.png

          # composite badge onto card (overlapping top-left)
          convert /tmp/card_shadow.png /tmp/badge_final.png -gravity northwest -geometry -18-18 -compose over -composite /tmp/premium_box.png

          # --- 5. TEXT FILTERS (dark, premium) ---
          FILTERS=""
          i=0
          while IFS= read -r line || [ -n "$line" ]; do
            ESC=$(printf "%s" "$line" | sed "s/'/\\\\''/g; s/:/\\\\:/g; s/\\[/\\\\[/g; s/\\]/\\\\]/g")
            Y=$(( TEXT_START + i*56 ))
            FILTERS="${FILTERS}drawtext=text='${ESC}':fontfile=fonts/mineig.ttf:fontsize=40:fontcolor=#1a1f2e:shadowcolor=black@0.08:shadowx=1:shadowy=1:x=(w-text_w)/2:y=${Y},"
            i=$((i+1))
          done < /tmp/lines.txt

          # --- 6. AUDIO ---
          AUDIO=$(find kinyaquotes/audio -type f \( -iname "*.mp3" -o -iname "*.m4a" -o -iname "*.wav" \) 2>/dev/null | shuf -n 1 || true)
          OUT="kinyaquotes/output/out_$(date +%s).mp4"

          if [ -n "$AUDIO" ]; then
            FADE_OUT=$(awk "BEGIN{print $DURATION-0.6}")
            ffmpeg -y -i /tmp/bg.mp4 -i /tmp/premium_box.png -i "$AUDIO" \
              -filter_complex "[0:v][1:v]overlay=(W-w)/2:(H-h)/2:format=auto,${FILTERS%,}[v]" \
              -map "[v]" -map 2:a -c:v libx264 -crf 22 -preset medium \
              -c:a aac -b:a 128k -af "afade=t=in:st=0:d=0.5,afade=t=out:st=$FADE_OUT:d=0.5" \
              -shortest -movflags +faststart -pix_fmt yuv420p -t $DURATION "$OUT"
          else
            ffmpeg -y -i /tmp/bg.mp4 -i /tmp/premium_box.png \
              -filter_complex "[0:v][1:v]overlay=(W-w)/2:(H-h)/2:format=auto,${FILTERS%,}[v]" \
              -map "[v]" -an -c:v libx264 -crf 22 -preset medium \
              -movflags +faststart -pix_fmt yuv420p -t $DURATION "$OUT"
          fi

          ls -lh "$OUT"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kinyaquotes/output/
          git commit -m "feat: premium quote video" || exit 0
          git push
