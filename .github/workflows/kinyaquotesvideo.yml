name: KINYA QUOTES VIDEO

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Quote text to overlay'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Prepare folders
        run: mkdir -p kinyaquotes/video tsapgod/output

      - name: Verify custom font
        run: |
          if [! -f "fonts/mineig.ttf" ]; then
            echo "ERROR: fonts/mineig.ttf not found - please commit your font to the repo"
            exit 1
          fi
          echo "Using font: fonts/mineig.ttf"

      - name: Generate video with overlay
        env:
          QUOTE_TEXT: ${{ github.event.inputs.text }}
        run: |
          # 1. Pick random video
          VIDEO=$(find kinyaquotes/video -type f \( -iname "*.mp4" -o -iname "*.mov" -o -iname "*.mkv" \) | shuf -n 1)
          if [ -z "$VIDEO" ]; then
            echo "ERROR: Put at least 1 video in kinyaquotes/video/"
            exit 1
          fi
          echo "Using video: $VIDEO"

          # 2. Get duration
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VIDEO" | cut -d. -f1)
          [ -z "$DURATION" ] && DURATION=10

          # 3. Wrap text to 28 chars (like your script)
          echo "$QUOTE_TEXT" | fold -s -w 28 > /tmp/lines.txt
          LINES=$(wc -l < /tmp/lines.txt)

          # 4. Build drawtext filters for each line
          FILTERS=""
          i=0
          while IFS= read -r line || [ -n "$line" ]; do
            # escape for ffmpeg
            ESC=$(printf "%s" "$line" | sed "s/'/\\''/g; s/:/\\:/g; s/\[/\\[/g; s/\]/\\]/g")
            Y="(h/2-60)-$(($LINES*24))+$((i*48))"
            FILTERS="${FILTERS}drawtext=text='${ESC}':fontfile=fonts/mineig.ttf:fontsize=40:fontcolor=white:borderw=3:bordercolor=black:x=(w-text_w)/2:y=${Y},"
            i=$((i+1))
          done < /tmp/lines.txt

          # 5. Final ffmpeg command - optimized for size like your config
          OUTFILE="tsapgod/output/out_$(date +%s).mp4"
          ffmpeg -y -loglevel error -i "$VIDEO" \
            -vf "scale=720:1280:force_original_aspect_ratio=increase,crop=720:1280,format=yuv420p,${FILTERS%,}" \
            -c:v libx264 -crf 28 -preset slow -tune film \
            -c:a aac -b:a 128k \
            -movflags +faststart \
            -t $DURATION "$OUTFILE"

          ls -lh "$OUTFILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tsapgod/output/
          git commit -m "feat: generate quote video" || exit 0
          git push
