name: Generate English-Kinyarwanda Video

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Video title'
        required: true
        type: string
      content:
        description: 'Lines as: line1: text, line2: text, ...'
        required: true
        type: string

env:
  GITHUB_USERNAME:  prymevid
  GITHUB_REPO:      script
  GITHUB_BRANCH:    main
  AUDIO_FOLDER:     englishkinyarwanda/audio
  OUTPUT_FOLDER:    englishkinyarwanda/output
  TEMP_FOLDER:      englishkinyarwanda/output/temp

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          npm install sharp --no-fund --no-audit --loglevel=error

      - name: Generate video
        env:
          INPUT_TITLE:   ${{ github.event.inputs.title }}
          INPUT_CONTENT: ${{ github.event.inputs.content }}
        run: |
          node - <<'NODE'
          const fs = require('fs'), path = require('path'), { execSync } = require('child_process');
          const sharp = require('sharp');

          const OUT = process.env.OUTPUT_FOLDER || 'englishkinyarwanda/output';
          const TMP = process.env.TEMP_FOLDER   || 'englishkinyarwanda/output/temp';
          const MUSIC = process.env.AUDIO_FOLDER || 'englishkinyarwanda/audio';
          [OUT, TMP].forEach(d => fs.mkdirSync(d, { recursive: true }));

          // ── Parse inputs ────────────────────────────────────────────────────
          const INPUT_TITLE   = process.env.INPUT_TITLE || '';
          const INPUT_CONTENT = process.env.INPUT_CONTENT || '';
          if (!INPUT_TITLE) throw new Error('No title provided');
          if (!INPUT_CONTENT) throw new Error('No content provided');

          const lineMap = {};
          const parts = INPUT_CONTENT.split(/,\s*(?=line\d+\s*:)/i);
          parts.forEach(part => {
            const m = part.match(/^line(\d+)\s*:\s*(.+)$/i);
            if (m) lineMap['line' + m[1]] = m[2].trim();
          });
          const video = { title: INPUT_TITLE, ...lineMap };

          // ── Styles & helpers ───────────────────────────────────────────────
          const STYLES = [
            { n:'aurora',    g1:'#7C3AED', g2:'#EC4899', card:'#FFFFFF', opts:['#3B82F6','#10B981','#F59E0B','#EF4444'] },
            { n:'ocean',     g1:'#0EA5E9', g2:'#06B6D4', card:'#F8FAFC', opts:['#0284C7','#0891B2','#0EA5E9','#38BDF8'] },
            { n:'sunset',    g1:'#F97316', g2:'#DC2626', card:'#FFFBEB', opts:['#EA580C','#DC2626','#F59E0B','#FB923C'] },
            { n:'emerald',   g1:'#059669', g2:'#10B981', card:'#F0FDF4', opts:['#047857','#059669','#10B981','#34D399'] },
            { n:'midnight',  g1:'#1E293B', g2:'#0F172A', card:'#0B1120', opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'], dark:true },
            { n:'road',      g1:'#EAB308', g2:'#CA8A04', card:'#FFFBEB', opts:['#1F2937','#374151','#4B5563','#6B7280'] },
            { n:'neon',      g1:'#EC4899', g2:'#8B5CF6', card:'#18181B', opts:['#22D3EE','#A78BFA','#F472B6','#FB7185'], dark:true },
            { n:'lavender',  g1:'#8B5CF6', g2:'#D946EF', card:'#F5F3FF', opts:['#6366F1','#8B5CF6','#A855F7','#C084FC'] },
            { n:'crimson',   g1:'#DC2626', g2:'#B91C1C', card:'#FEF2F2', opts:['#991B1B','#DC2626','#EF4444','#F87171'] },
            { n:'forest',    g1:'#166534', g2:'#15803D', card:'#F0FDF4', opts:['#14532D','#166534','#22C55E','#4ADE80'] },
            { n:'golden',    g1:'#D97706', g2:'#B45309', card:'#FFFBEB', opts:['#92400E','#B45309','#D97706','#FBBF24'] },
            { n:'slate',     g1:'#334155', g2:'#1E293B', card:'#0F172A', opts:['#64748B','#94A3B8','#CBD5E1','#E2E8F0'], dark:true },
            { n:'coral',     g1:'#F43F5E', g2:'#E11D48', card:'#FFF1F2', opts:['#BE123C','#E11D48','#F43F5E','#FB7185'] },
            { n:'mint',      g1:'#059669', g2:'#10B981', card:'#ECFDF5', opts:['#047857','#059669','#34D399','#6EE7B7'] }
          ];
          const style = STYLES[Math.floor(Math.random() * STYLES.length)];
          const textColor = style.dark ? '#F8FAFC' : '#0F172A';

          const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          const estimateWidth = (t, fs) => t.length * fs * 0.6;
          const wrap = (text, maxW, fs) => {
            const words = text.split(/\s+/);
            const lines = [];
            let cur = '';
            for (const w of words) {
              const test = cur ? cur + ' ' + w : w;
              if (estimateWidth(test, fs) <= maxW) { cur = test; continue; }
              if (cur) lines.push(cur);
              cur = w;
            }
            if (cur) lines.push(cur);
            return lines;
          };

          // ── Build line data ────────────────────────────────────────────────
          const lines = [];
          let engCounter = 1;
          for (let i = 1; i <= 16; i++) {
            const line = video['line' + i];
            if (!line || !line.trim()) continue;
            // Try to parse separator
            const sepM = line.match(/^(.+?)\s*[-—|]\s*(.+)$/);
            if (sepM) {
              lines.push({ english: sepM[1].trim(), kinyarwanda: sepM[2].trim() });
            } else {
              if (i % 2 !== 0) {
                lines.push({ english: engCounter + '. ' + line.trim(), kinyarwanda: '' });
                engCounter++;
              } else {
                // Kinyarwanda alone (indented)
                lines.push({ english: '', kinyarwanda: '    ' + line.trim() });
              }
            }
          }

          // ── Layout inside card ─────────────────────────────────────────────
          const cardWidth = 620, leftMargin = 50, rightMargin = 50;
          const contentX = leftMargin + 25;               // where text starts
          const col2X = contentX + 280;                  // second column
          const col1MaxW = 240, col2MaxW = 230;
          let titleFS = 32, lineFS = 26, spacing = 46;

          // Recursively adjust font sizes to fit within card height (~1100 px usable)
          const buildLayout = () => {
            const titleLines = wrap(video.title, col1MaxW + col2MaxW - 20, titleFS);
            let totalH = 160 + titleLines.length * titleFS * 1.35 + 30;
            const rows = [];
            for (const l of lines) {
              const enLines = l.english ? wrap(l.english, col1MaxW, lineFS) : [];
              const kwLines = l.kinyarwanda ? wrap(l.kinyarwanda, col2MaxW, lineFS) : [];
              const rowH = Math.max(
                enLines.length * lineFS * 1.35 + 8,
                kwLines.length * lineFS * 1.35 + 8,
                40
              );
              totalH += rowH + 8;
              rows.push({ enLines, kwLines, rowH });
            }
            if (totalH > 1120 && titleFS > 22) { titleFS--; lineFS = Math.max(18, titleFS - 6); return buildLayout(); }
            if (totalH > 1120 && lineFS > 18) { lineFS--; return buildLayout(); }
            return { titleLines, rows, totalH };
          };
          const layout = buildLayout();
          const cardTop = Math.max(30, (1280 - layout.totalH - 60) / 2);
          const cardLeft = (720 - cardWidth) / 2;
          const titleY = cardTop + 80;
          const contentStartY = cardTop + 140 + layout.titleLines.length * titleFS * 1.35;

          // ── Build SVG card ─────────────────────────────────────────────────
          const cardR = 32, shadow = 20;
          const cardGrad = `<linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${style.g1}"/><stop offset="100%" stop-color="${style.g2}"/></linearGradient>`;
          const cardDrop = `<filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="${shadow}" flood-opacity="0.22"/></filter>`;
          const roadDecor = [`<g opacity="0.13"><polygon points="30,0 70,0 100,30 100,70 70,100 30,100 0,70 0,30" fill="#DC2626" transform="translate(80,200) scale(0.9)"/><text x="130" y="262" font-size="24" fill="white" font-weight="800" text-anchor="middle">STOP</text></g>`,
          `<g opacity="0.12"><polygon points="50,0 100,87 0,87" fill="#EAB308" stroke="#000" stroke-width="3" transform="translate(550,900) scale(0.9)"/><text x="600" y="965" font-size="22" fill="black" font-weight="800" text-anchor="middle">!</text></g>`].sort(()=>0.5-Math.random()).slice(0,1).join('');

          // Build row backgrounds
          let rowsSvg = '';
          let yPos = contentStartY;
          layout.rows.forEach((r, idx) => {
            const rowH = r.rowH;
            const bgColor = idx % 2 === 0 ? (style.dark ? '#1A1E2B' : '#F1F5F9') : 'transparent';
            rowsSvg += `<rect x="${cardLeft + 20}" y="${yPos - 6}" width="${cardWidth - 40}" height="${rowH}" rx="12" fill="${bgColor}" opacity="0.6"/>`;
            // English text (left column)
            r.enLines.forEach((ln, li) => {
              rowsSvg += `<text x="${cardLeft + contentX}" y="${yPos + li * lineFS * 1.35 + lineFS}" font-family="Arial" font-size="${lineFS}" font-weight="600" fill="${textColor}">${esc(ln)}</text>`;
            });
            // Kinyarwanda text (right column)
            r.kwLines.forEach((ln, li) => {
              rowsSvg += `<text x="${cardLeft + col2X}" y="${yPos + li * lineFS * 1.35 + lineFS}" font-family="Arial" font-size="${lineFS}" font-weight="bold" fill="${textColor}">${esc(ln)}</text>`;
            });
            yPos += rowH + 8;
          });

          const svg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
            <defs>${cardGrad}${cardDrop}</defs>
            ${roadDecor}
            <g transform="translate(${cardLeft},${cardTop})">
              <!-- main card background -->
              <rect width="${cardWidth}" height="${layout.totalH}" rx="${cardR}" fill="${style.card}" filter="url(#s)"/>
              <!-- subtle gradient overlay -->
              <rect width="${cardWidth}" height="${layout.totalH}" rx="${cardR}" fill="url(#g)" opacity="0.06"/>
              <!-- title badge -->
              <g transform="translate(30, -30)">
                <rect width="180" height="60" rx="30" fill="url(#g)"/>
                <text x="90" y="40" font-family="Arial" font-size="28" font-weight="900" fill="white" text-anchor="middle">${esc(video.title)}</text>
              </g>
              <!-- date -->
              <text x="${cardWidth - 40}" y="68" font-family="Arial" font-size="24" fill="${textColor}" opacity="0.8" text-anchor="end">
                ${new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' })}
              </text>
              <!-- separator line -->
              <line x1="30" y1="100" x2="${cardWidth - 30}" y2="100" stroke="url(#g)" stroke-width="2" opacity="0.5"/>
            </g>
            ${rowsSvg}
          </svg>`;

          // ── Composite frame & render video ────────────────────────────────
          (async () => {
            const randomId = Math.floor(Math.random() * 1084);
            const img = await fetch(`https://picsum.photos/id/${randomId}/1200/2000`).then(r => r.arrayBuffer());
            const bg = await sharp(Buffer.from(img))
              .resize(720, 1280, { fit: 'cover' })
              .blur(14 + Math.floor(Math.random() * 8))
              .modulate({ brightness: 0.6 + Math.random() * 0.12, saturation: 1 + Math.random() * 0.2 })
              .toBuffer();
            const overlay = await sharp(Buffer.from(svg)).png().toBuffer();
            const frame = path.join(TMP, 'frame.png');
            await sharp(bg).composite([{ input: overlay }]).png().toFile(frame);

            // Audio
            let audio = null;
            if (fs.existsSync(MUSIC)) {
              const files = fs.readdirSync(MUSIC).filter(f => /\.(mp3|m4a|wav)$/i.test(f));
              if (files.length) audio = path.join(MUSIC, files[Math.floor(Math.random() * files.length)]);
            }

            const DUR = '6.5'; // seconds
            const vf = `zoompan=z='min(zoom+0.0011,1.018)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d=1:s=720x1280:fps=30,eq=brightness=0.01:saturation=1.04,vignette=0.25,format=yuv420p`;
            const safeTitle = video.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const outFile = path.join(OUT, `${safeTitle}_${Date.now()}.mp4`);

            const args = ['-y', '-loglevel', 'error', '-loop', '1', '-i', frame];
            if (audio) args.push('-i', audio);
            args.push('-t', DUR, '-vf', vf, '-r', '30', '-c:v', 'libx264', '-crf', '23', '-preset', 'veryfast');
            if (audio) args.push('-c:a', 'aac', '-b:a', '128k', '-shortest');
            else args.push('-an');
            args.push('-movflags', '+faststart', outFile);

            execSync(`ffmpeg ${args.map(a => `"${a.replace(/"/g, '\\"')}"`).join(' ')}`);
            console.log('Generated:', outFile, 'style:', style.n);
          })().catch(err => { console.error(err); process.exit(1); });
          NODE

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add englishkinyarwanda/output/
          git diff --staged --quiet || (git commit -m "Add teaching card video: ${{ github.event.inputs.title }}" && git push)
