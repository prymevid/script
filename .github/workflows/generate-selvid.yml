name: Generate English-Kinyarwanda Video

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Video title'
        required: true
        type: string
      content:
        description: 'Lines as: line1: text, line2: text, ...'
        required: true
        type: string

# ── ALL PATH / REPO CONFIG DECLARED HERE ─────────────────────────────────────
env:
  GITHUB_USERNAME:  prymevid
  GITHUB_REPO:      script
  GITHUB_BRANCH:    main

  # Resource paths
  FONT_REGULAR:     englishkinyarwanda/fonts/mineig.ttf
  FONT_BOLD:        englishkinyarwanda/fonts/rob.ttf
  AUDIO_FOLDER:     englishkinyarwanda/audio
  OUTPUT_FOLDER:    englishkinyarwanda/output
  TEMP_FOLDER:      englishkinyarwanda/output/temp
  ICON_FOLDER:      englishkinyarwanda/icons/backup/
  ANIMATED_FOLDER:  englishkinyarwanda/animated/
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg and Sharp
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          npm install sharp

      - name: Generate video
        env:
          INPUT_TITLE:   ${{ github.event.inputs.title }}
          INPUT_CONTENT: ${{ github.event.inputs.content }}
        run: |
          TEMP_JS="temp_$(date +%s)_$RANDOM.js"

          cat > "$TEMP_JS" << 'EOF'
          'use strict';
          const fs   = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');
          const sharp = require('sharp');

          // ── CONFIGURATION ──────────────────────────────────────────────────────
          const CONFIG = {
            // Icon Overlay Configuration
            useIcons:             true,
            iconAlign:            'left',
            iconCount:            1,
            iconSize:             240,
            iconSpacing:          25,
            iconMarginBottom:     0,
            iconSideMargin:       70,
            iconFolder:           process.env.ICON_FOLDER  || 'englishkinyarwanda/icons/',

            // Animated Video Overlay Configuration
            useAnimated:          true,
            animatedAlign:        'right',
            animatedCount:        1,
            animatedSize:         240,
            animatedSpacing:      25,
            animatedMarginBottom: 0,
            animatedSideMargin:   50,
            animatedFolder:       process.env.ANIMATED_FOLDER || 'englishkinyarwanda/animated/',

            // Chroma Key (Green Screen) Removal
            useChromaKey:         true,
            chromaKeyColor:       '0x00FF00',
            chromaSimilarity:     0.28,
            chromaBlend:          0.1,

            audioFolder:          process.env.AUDIO_FOLDER || 'englishkinyarwanda/audio',
            outputFolder:         process.env.OUTPUT_FOLDER || 'englishkinyarwanda/output',
            tempFolder:           process.env.TEMP_FOLDER   || 'englishkinyarwanda/output/temp',
            fontFileRegular:      process.env.FONT_REGULAR  || 'englishkinyarwanda/fonts/mineig.ttf',
            fontFileBold:         process.env.FONT_BOLD     || 'englishkinyarwanda/fonts/rob.ttf',

            videoDuration:        6,
            resolution:           '720x1280',
            videoCodec:           'libx264',
            videoPreset:          'medium',
            videoCRF:             23,
            fps:                  25,
            useRandomAudio:       true,
            audioCodec:           'aac',
            audioBitrate:         '128k',
            audioVolume:          '1.0',

            altEnglishWeight:     'regular',
            altKinyarwandaWeight: 'bold',
            altKinyarwandaIndent: '    ',

            fontColor:            '#2b2821',
            titleOpacity:         '1',
            dateOpacity:          '0.95',
            englishOpacity:       '0.75',
            kinyarwandaOpacity:   '1',
            headerFontSize:       42,
            contentFontSize:      35,
            lineSpacing:          53.6,
            headerYPosition:      120,
            contentStartY:        215,
            leftColumnX:          90,
            rightColumnX:         300,
            dateXOffset:          80,
            showTitle:            true,
            maxLines:             16,
            deleteTempFiles:      true,

            // SVG Background settings
            bgBrightness:         0.72,   // 0.0–1.0, darkens the bg so text stays readable
            bgSaturation:         1.08,
            bgBlur:               2.0,
            lightLeakOpacity:     0.10,
            grainIntensity:       0.04,
          };

          // ── 30 PALETTES ───────────────────────────────────────────────────────
          const PALETTES = [
            { n:'aurora',    g1:'#7C3AED', g2:'#EC4899', dark:false, acc:['#3B82F6','#10B981','#F59E0B','#EF4444'] },
            { n:'ocean',     g1:'#0EA5E9', g2:'#06B6D4', dark:false, acc:['#0284C7','#0891B2','#0EA5E9','#38BDF8'] },
            { n:'sunset',    g1:'#F97316', g2:'#DC2626', dark:false, acc:['#EA580C','#DC2626','#F59E0B','#FB923C'] },
            { n:'emerald',   g1:'#059669', g2:'#10B981', dark:false, acc:['#047857','#059669','#10B981','#34D399'] },
            { n:'midnight',  g1:'#1E293B', g2:'#0F172A', dark:true,  acc:['#6366F1','#8B5CF6','#A855F7','#C084FC'] },
            { n:'road',      g1:'#EAB308', g2:'#CA8A04', dark:false, acc:['#1F2937','#374151','#4B5563','#6B7280'] },
            { n:'neon',      g1:'#EC4899', g2:'#8B5CF6', dark:true,  acc:['#22D3EE','#A78BFA','#F472B6','#FB7185'] },
            { n:'lavender',  g1:'#8B5CF6', g2:'#D946EF', dark:false, acc:['#6366F1','#8B5CF6','#A855F7','#C084FC'] },
            { n:'crimson',   g1:'#DC2626', g2:'#B91C1C', dark:false, acc:['#991B1B','#DC2626','#EF4444','#F87171'] },
            { n:'forest',    g1:'#166534', g2:'#15803D', dark:false, acc:['#14532D','#166534','#22C55E','#4ADE80'] },
            { n:'golden',    g1:'#D97706', g2:'#B45309', dark:false, acc:['#92400E','#B45309','#D97706','#FBBF24'] },
            { n:'slate',     g1:'#334155', g2:'#1E293B', dark:true,  acc:['#64748B','#94A3B8','#CBD5E1','#E2E8F0'] },
            { n:'coral',     g1:'#F43F5E', g2:'#E11D48', dark:false, acc:['#BE123C','#E11D48','#F43F5E','#FB7185'] },
            { n:'mint',      g1:'#059669', g2:'#10B981', dark:false, acc:['#047857','#059669','#34D399','#6EE7B7'] },
            { n:'obsidian',  g1:'#0F172A', g2:'#1E293B', dark:true,  acc:['#F59E0B','#EAB308','#FDE047','#FCD34D'] },
            { n:'cobalt',    g1:'#1D4ED8', g2:'#1E40AF', dark:false, acc:['#1D4ED8','#2563EB','#3B82F6','#60A5FA'] },
            { n:'sakura',    g1:'#FDA4AF', g2:'#F9A8D4', dark:false, acc:['#F43F5E','#EC4899','#E879F9','#C084FC'] },
            { n:'arctic',    g1:'#BAE6FD', g2:'#A5F3FC', dark:false, acc:['#0EA5E9','#06B6D4','#0284C7','#0369A1'] },
            { n:'phantom',   g1:'#4B0082', g2:'#800080', dark:true,  acc:['#A855F7','#C084FC','#E879F9','#F0ABFC'] },
            { n:'solar',     g1:'#FF6B00', g2:'#FF9500', dark:false, acc:['#CC4400','#FF6B00','#FF9500','#FFB700'] },
            { n:'matrix',    g1:'#00FF41', g2:'#008F11', dark:true,  acc:['#00FF41','#00B74A','#008F11','#39FF14'] },
            { n:'blush',     g1:'#FF9A9E', g2:'#FAD0C4', dark:false, acc:['#FF6B9D','#FF9A9E','#FAD0C4','#FEC8D8'] },
            { n:'glacier',   g1:'#74EBD5', g2:'#9FACE6', dark:false, acc:['#0EA5E9','#22D3EE','#67E8F9','#A5F3FC'] },
            { n:'ember',     g1:'#7F1D1D', g2:'#991B1B', dark:true,  acc:['#DC2626','#EF4444','#F97316','#FB923C'] },
            { n:'pearl',     g1:'#E5E7EB', g2:'#D1D5DB', dark:false, acc:['#374151','#4B5563','#6B7280','#9CA3AF'] },
            { n:'tropics',   g1:'#F0932B', g2:'#6AB04C', dark:false, acc:['#F0932B','#6AB04C','#22A6B3','#E84393'] },
            { n:'ultraviolet',g1:'#5A00EF',g2:'#9B00FF', dark:true,  acc:['#A855F7','#7C3AED','#6D28D9','#5B21B6'] },
            { n:'copper',    g1:'#92400E', g2:'#78350F', dark:false, acc:['#78350F','#92400E','#B45309','#D97706'] },
            { n:'rosegold',  g1:'#BE7A6B', g2:'#C9956C', dark:false, acc:['#9D6B5E','#B5806F','#C9956C','#E8C4A0'] },
            { n:'luxgold',   g1:'#B8860B', g2:'#FFD700', dark:true,  acc:['#DAA520','#CD853F','#B8860B','#8B6914'] },
          ];

          // ── BACKGROUND GENERATORS ─────────────────────────────────────────────
          function rng(min, max) { return Math.random() * (max - min) + min; }
          function rInt(min, max) { return Math.floor(rng(min, max)); }

          function bgGradientMesh(p) {
            const stops = [p.g1, p.g2, p.acc[0], p.acc[2]];
            const circles = Array.from({ length: 8 }, () => {
              const c = stops[rInt(0, stops.length)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(180,480)}" fill="${c}" opacity="${rng(0.25,0.55).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="blur"><feGaussianBlur stdDeviation="65"/></filter>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/><stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <g filter="url(#blur)">${circles}</g>
              <rect width="720" height="1280" fill="${p.dark?'#000':'#fff'}" opacity="0.15"/>
            </svg>`;
          }

          function bgBokeh(p) {
            const blobs = Array.from({ length: 24 }, () => {
              const c = p.acc[rInt(0, p.acc.length)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(25,110)}" fill="${c}" opacity="${rng(0.07,0.32).toFixed(2)}"/>`;
            }).join('');
            const large = Array.from({ length: 6 }, () => {
              const c = [p.g1, p.g2][rInt(0, 2)];
              return `<circle cx="${rInt(0,720)}" cy="${rInt(0,1280)}" r="${rInt(140,280)}" fill="${c}" opacity="${rng(0.10,0.26).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <filter id="b60"><feGaussianBlur stdDeviation="60"/></filter>
                <filter id="b20"><feGaussianBlur stdDeviation="20"/></filter>
                <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/><stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <g filter="url(#b60)">${large}</g>
              <g filter="url(#b20)">${blobs}</g>
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.28)':'rgba(255,255,255,0.12)'}"/>
            </svg>`;
          }

          function bgNoise(p) {
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/>
                  <stop offset="50%" stop-color="${p.acc[1] || p.g2}"/>
                  <stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
                <filter id="n">
                  <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
                  <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
                  <feBlend in="SourceGraphic" in2="grey" mode="soft-light"/>
                </filter>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <rect width="720" height="1280" fill="url(#base)" filter="url(#n)" opacity="0.42"/>
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.22)':'rgba(255,255,255,0.10)'}"/>
            </svg>`;
          }

          function bgLowPoly(p) {
            const cols = 6, rows = 10;
            const cw = 720 / cols, rh = 1280 / rows;
            const pts = [];
            for (let ry = 0; ry <= rows; ry++)
              for (let cx = 0; cx <= cols; cx++)
                pts.push([cx * cw + rng(-cw * 0.32, cw * 0.32), ry * rh + rng(-rh * 0.32, rh * 0.32)]);
            const idx = (ry, cx) => ry * (cols + 1) + cx;
            let tris = '';
            for (let ry = 0; ry < rows; ry++) {
              for (let cx = 0; cx < cols; cx++) {
                const [a, b, c, d] = [pts[idx(ry,cx)], pts[idx(ry,cx+1)], pts[idx(ry+1,cx)], pts[idx(ry+1,cx+1)]];
                const c1 = p.acc[(ry + cx) % p.acc.length];
                const c2 = p.acc[(ry + cx + 1) % p.acc.length];
                tris += `<polygon points="${a[0].toFixed(1)},${a[1].toFixed(1)} ${b[0].toFixed(1)},${b[1].toFixed(1)} ${c[0].toFixed(1)},${c[1].toFixed(1)}" fill="${c1}" opacity="${rng(0.55,0.92).toFixed(2)}"/>`;
                tris += `<polygon points="${b[0].toFixed(1)},${b[1].toFixed(1)} ${c[0].toFixed(1)},${c[1].toFixed(1)} ${d[0].toFixed(1)},${d[1].toFixed(1)}" fill="${c2}" opacity="${rng(0.55,0.92).toFixed(2)}"/>`;
              }
            }
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <rect width="720" height="1280" fill="${p.g1}"/>
              ${tris}
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.10)'}"/>
            </svg>`;
          }

          function bgLinearGradient(p) {
            const angle = rInt(0, 360);
            const rad = angle * Math.PI / 180;
            const x2 = (0.5 + 0.5 * Math.cos(rad)).toFixed(2);
            const y2 = (0.5 + 0.5 * Math.sin(rad)).toFixed(2);
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="bg" x1="0" y1="0" x2="${x2}" y2="${y2}">
                  <stop offset="0%"   stop-color="${p.g1}"/>
                  <stop offset="45%"  stop-color="${p.acc[1] || p.g2}"/>
                  <stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#bg)"/>
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.08)'}"/>
            </svg>`;
          }

          function bgDiagonalStripes(p) {
            const stripeW = rInt(40, 90);
            const total   = Math.ceil(Math.sqrt(720*720 + 1280*1280) / stripeW) + 2;
            let stripes   = '';
            for (let i = 0; i < total; i++) {
              const c = p.acc[i % p.acc.length];
              const x = i * stripeW - 200;
              stripes += `<rect x="${x}" y="-200" width="${stripeW * 0.6}" height="2000" fill="${c}" opacity="${rng(0.12, 0.30).toFixed(2)}" transform="rotate(-30 360 640)"/>`;
            }
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/><stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              ${stripes}
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.08)'}"/>
            </svg>`;
          }

          function bgConcentricCircles(p) {
            const cx = rInt(200, 520), cy = rInt(300, 900);
            const rings = Array.from({ length: 12 }, (_, i) => {
              const r = 80 + i * 90;
              const c = p.acc[i % p.acc.length];
              return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${c}" stroke-width="${rng(1, 4).toFixed(1)}" opacity="${rng(0.10, 0.35).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/><stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
                <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              <g filter="url(#blur)">${rings}</g>
              ${rings}
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.10)'}"/>
            </svg>`;
          }

          function bgWaves(p) {
            const amp   = rInt(40, 100);
            const freq  = rng(0.004, 0.010).toFixed(4);
            const waves = Array.from({ length: 8 }, (_, i) => {
              const yBase  = 160 * i + 80;
              const offset = rInt(0, 360);
              const c      = p.acc[i % p.acc.length];
              let d = `M 0 ${yBase}`;
              for (let x = 0; x <= 720; x += 10) {
                const y = yBase + amp * Math.sin(freq * x * 6.28 + offset * 0.0174);
                d += ` L ${x} ${y.toFixed(1)}`;
              }
              d += ` L 720 1280 L 0 1280 Z`;
              return `<path d="${d}" fill="${c}" opacity="${rng(0.10, 0.28).toFixed(2)}"/>`;
            }).join('');
            return `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="${p.g1}"/><stop offset="100%" stop-color="${p.g2}"/>
                </linearGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#base)"/>
              ${waves}
              <rect width="720" height="1280" fill="${p.dark?'rgba(0,0,0,0.18)':'rgba(255,255,255,0.08)'}"/>
            </svg>`;
          }

          const BG_GENERATORS = {
            mesh:     bgGradientMesh,
            bokeh:    bgBokeh,
            noise:    bgNoise,
            lowpoly:  bgLowPoly,
            gradient: bgLinearGradient,
            stripes:  bgDiagonalStripes,
            circles:  bgConcentricCircles,
            waves:    bgWaves,
          };
          const BG_KEYS = Object.keys(BG_GENERATORS);

          // ── GENERATE SVG BACKGROUND → PNG FILE ───────────────────────────────
          async function generateBackground(palette, outputPngPath) {
            const bgKey    = BG_KEYS[rInt(0, BG_KEYS.length)];
            const bgSvg    = BG_GENERATORS[bgKey](palette);

            // Grain overlay
            const grain = CONFIG.grainIntensity;
            const grainSvg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <filter id="grain">
                <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise"/>
                <feColorMatrix in="noise" type="matrix"
                  values="0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 ${grain * 2} 0" result="grey"/>
                <feBlend in="SourceGraphic" in2="grey" mode="overlay"/>
              </filter>
              <rect width="720" height="1280" fill="rgba(128,128,128,${grain})" filter="url(#grain)"/>
            </svg>`;

            // Light leak
            const leakOpacity = CONFIG.lightLeakOpacity;
            const leakSvg = `<svg width="720" height="1280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="l1" cx="5%" cy="5%" r="55%">
                  <stop offset="0%" stop-color="#FFEDD5" stop-opacity="0.85"/>
                  <stop offset="60%" stop-color="#FDE68A" stop-opacity="0.15"/>
                  <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
                </radialGradient>
                <radialGradient id="l2" cx="95%" cy="92%" r="40%">
                  <stop offset="0%" stop-color="${palette.acc[0]}" stop-opacity="0.4"/>
                  <stop offset="100%" stop-color="${palette.acc[0]}" stop-opacity="0"/>
                </radialGradient>
              </defs>
              <rect width="720" height="1280" fill="url(#l1)"/>
              <rect width="720" height="1280" fill="url(#l2)"/>
            </svg>`;

            const bgBuf   = await sharp(Buffer.from(bgSvg)).resize(720, 1280, { fit: 'fill' }).png().toBuffer();
            const bgAdj   = await sharp(bgBuf)
              .modulate({
                brightness: CONFIG.bgBrightness + Math.random() * 0.10,
                saturation: CONFIG.bgSaturation + Math.random() * 0.12,
              })
              .blur(palette.dark ? CONFIG.bgBlur + 0.5 : CONFIG.bgBlur)
              .toBuffer();

            const leakBuf  = await sharp(Buffer.from(leakSvg)).png().toBuffer();
            const grainBuf = await sharp(Buffer.from(grainSvg)).png().toBuffer();

            await sharp(bgAdj)
              .composite([
                { input: leakBuf,  blend: 'screen',  opacity: leakOpacity },
                { input: grainBuf, blend: 'overlay',  opacity: grain },
              ])
              .png()
              .toFile(outputPngPath);

            console.log(`Background: palette=${palette.n}, style=${bgKey}`);
          }

          // ── PARSE INPUTS ──────────────────────────────────────────────────────
          const INPUT_TITLE   = process.env.INPUT_TITLE   || '';
          const INPUT_CONTENT = process.env.INPUT_CONTENT || '';

          if (!INPUT_TITLE)   throw new Error('No title provided');
          if (!INPUT_CONTENT) throw new Error('No content provided');

          const lineMap = {};
          const parts = INPUT_CONTENT.split(/,\s*(?=line\d+\s*:)/i);
          parts.forEach(part => {
            const m = part.match(/^line(\d+)\s*:\s*(.+)$/i);
            if (m) lineMap['line' + m[1]] = m[2].trim();
          });

          const video = { title: INPUT_TITLE, ...lineMap };

          // ── HELPERS ───────────────────────────────────────────────────────────
          [CONFIG.outputFolder, CONFIG.tempFolder].forEach(p => {
            if (!fs.existsSync(p)) fs.mkdirSync(p, { recursive: true });
          });

          let tempFiles = [];

          function createTempTextFile(content, prefix) {
            const f = path.join(CONFIG.tempFolder,
              prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(7) + '.txt');
            fs.writeFileSync(f, content, 'utf8');
            tempFiles.push(f);
            return f;
          }

          function escapePath(p) { return p.replace(/\\/g, '/').replace(/ /g, '\\ '); }

          function getValidFont(pref) {
            if (fs.existsSync(pref)) return pref;
            throw new Error('Font not found: ' + pref);
          }

          function getRandomAudio() {
            if (!fs.existsSync(CONFIG.audioFolder)) return null;
            const files = fs.readdirSync(CONFIG.audioFolder).filter(f => /\.(mp3|wav|m4a|aac)$/.test(f));
            return files.length ? path.join(CONFIG.audioFolder, files[Math.floor(Math.random() * files.length)]) : null;
          }

          function getRandomIcons(count) {
            if (!fs.existsSync(CONFIG.iconFolder)) return [];
            const files = fs.readdirSync(CONFIG.iconFolder).filter(f => /\.(png|jpg|jpeg)$/i.test(f));
            if (!files.length) return [];
            return files.sort(() => 0.5 - Math.random()).slice(0, count).map(f => path.join(CONFIG.iconFolder, f));
          }

          function getRandomAnimatedVideos(count) {
            if (!fs.existsSync(CONFIG.animatedFolder)) return [];
            const files = fs.readdirSync(CONFIG.animatedFolder).filter(f => /\.(mp4|mov|avi|webm|mkv)$/i.test(f));
            if (!files.length) return [];
            return files.sort(() => 0.5 - Math.random()).slice(0, count).map(f => path.join(CONFIG.animatedFolder, f));
          }

          const formatEnglishStandard = t => {
            if (!t) return '';
            const text = t.trim().charAt(0).toUpperCase() + t.trim().slice(1);
            return text.endsWith('.') ? text : text + '.';
          };

          const formatKinyarwanda = t =>
            t ? t.trim().charAt(0).toUpperCase() + t.trim().slice(1) : '';

          function parseLineWithSeparator(line) {
            if (!line || line.trim() === '') return { english: '', kinyarwanda: '' };
            for (const sep of [' - ', ' — ', '-', '|']) {
              if (line.includes(sep)) {
                const partsArr = line.split(sep);
                return {
                  english:     formatEnglishStandard(partsArr[0]),
                  kinyarwanda: formatKinyarwanda(partsArr.slice(1).join(sep))
                };
              }
            }
            return null;
          }

          // ── BUILD & RUN FFMPEG ────────────────────────────────────────────────
          async function generateVideo() {
            const fontReg  = escapePath(getValidFont(CONFIG.fontFileRegular));
            const fontBold = escapePath(getValidFont(CONFIG.fontFileBold));
            const fontMap  = { regular: fontReg, bold: fontBold };
            const [w, h]   = CONFIG.resolution.split('x').map(Number);
            const audio    = CONFIG.useRandomAudio ? getRandomAudio() : null;
            const selectedIcons    = CONFIG.useIcons    ? getRandomIcons(CONFIG.iconCount)           : [];
            const selectedAnimated = CONFIG.useAnimated ? getRandomAnimatedVideos(CONFIG.animatedCount) : [];

            // ── Pick palette & render background PNG ──────────────────────────
            const palette   = PALETTES[rInt(0, PALETTES.length)];
            const bgPngPath = path.join(CONFIG.tempFolder, `bg_${Date.now()}.png`);
            tempFiles.push(bgPngPath);
            await generateBackground(palette, bgPngPath);

            const safeTitle  = video.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const timestamp  = Date.now();
            const outputFile = path.join(CONFIG.outputFolder, safeTitle + '_' + timestamp + '.mp4');

            // ── 1. Build Inputs ───────────────────────────────────────────────
            // Background is always a static PNG now (no video background)
            let inputs = [`-loop 1 -framerate ${CONFIG.fps} -i "${escapePath(bgPngPath)}"`];

            selectedAnimated.forEach(animPath => {
              inputs.push(`-stream_loop -1 -i "${escapePath(animPath)}"`);
            });
            selectedIcons.forEach(iconPath => {
              inputs.push(`-i "${escapePath(iconPath)}"`);
            });
            if (audio) {
              inputs.push(`-i "${escapePath(audio)}"`);
            }

            // ── 2. Build Filter Chain ─────────────────────────────────────────
            let filters      = [`[0:v]scale=${w}:${h}:force_original_aspect_ratio=increase,crop=${w}:${h}[bg]`];
            let lastTag      = '[bg]';
            let drawtextFilters = [];

            if (CONFIG.showTitle && video.title) {
              const titleFile = escapePath(createTempTextFile(video.title, 't'));
              drawtextFilters.push(
                `drawtext=fontfile='${fontBold}':textfile='${titleFile}':fontcolor=${CONFIG.fontColor}@${CONFIG.titleOpacity}:fontsize=${CONFIG.headerFontSize}:x=${CONFIG.leftColumnX}:y=${CONFIG.headerYPosition}`
              );
              const d     = new Date();
              const dStr  = (d.getMonth() + 1) + '-' + d.getDate() + '-' + d.getFullYear().toString().slice(-2);
              const dateFile = escapePath(createTempTextFile(dStr, 'd'));
              drawtextFilters.push(
                `drawtext=fontfile='${fontReg}':textfile='${dateFile}':fontcolor=${CONFIG.fontColor}@${CONFIG.dateOpacity}:fontsize=${CONFIG.headerFontSize - 4}:x=(w-text_w-${CONFIG.dateXOffset}):y=${CONFIG.headerYPosition}`
              );
            }

            let row = 0, engCounter = 1;
            for (let i = 1; i <= CONFIG.maxLines; i++) {
              const line = video['line' + i];
              const y    = CONFIG.contentStartY + (row * CONFIG.lineSpacing);
              if (!line || line.trim() === '') {
                if (line !== undefined) row++;
                continue;
              }
              const sepParsed = parseLineWithSeparator(line);
              if (sepParsed) {
                if (sepParsed.english) {
                  const ef = escapePath(createTempTextFile(sepParsed.english, 'e'));
                  drawtextFilters.push(`drawtext=fontfile='${fontReg}':textfile='${ef}':fontcolor=${CONFIG.fontColor}@${CONFIG.englishOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                }
                if (sepParsed.kinyarwanda) {
                  const kf = escapePath(createTempTextFile(sepParsed.kinyarwanda, 'k'));
                  drawtextFilters.push(`drawtext=fontfile='${fontBold}':textfile='${kf}':fontcolor=${CONFIG.fontColor}@${CONFIG.kinyarwandaOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.rightColumnX}:y=${y}`);
                }
              } else {
                if (i % 2 !== 0) {
                  const text = engCounter + '. ' + formatEnglishStandard(line);
                  const ef = escapePath(createTempTextFile(text, 'e'));
                  drawtextFilters.push(`drawtext=fontfile='${fontMap[CONFIG.altEnglishWeight]}':textfile='${ef}':fontcolor=${CONFIG.fontColor}@${CONFIG.englishOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                  engCounter++;
                } else {
                  const text = CONFIG.altKinyarwandaIndent + formatKinyarwanda(line);
                  const kf = escapePath(createTempTextFile(text, 'k'));
                  drawtextFilters.push(`drawtext=fontfile='${fontMap[CONFIG.altKinyarwandaWeight]}':textfile='${kf}':fontcolor=${CONFIG.fontColor}@${CONFIG.kinyarwandaOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                }
              }
              row++;
            }

            filters.push(`[bg]${drawtextFilters.join(',')}[vtext]`);
            lastTag = '[vtext]';

            // ── Animated Video Overlays with Chroma Key ───────────────────────
            if (selectedAnimated.length > 0) {
              const totalW = selectedAnimated.length * CONFIG.animatedSize
                           + (selectedAnimated.length - 1) * CONFIG.animatedSpacing;
              let startX;
              if      (CONFIG.animatedAlign === 'left')  startX = CONFIG.animatedSideMargin;
              else if (CONFIG.animatedAlign === 'right') startX = w - totalW - CONFIG.animatedSideMargin;
              else                                       startX = (w - totalW) / 2;
              const animY = h - CONFIG.animatedMarginBottom - CONFIG.animatedSize;

              selectedAnimated.forEach((_, idx) => {
                const inputIdx = idx + 1;
                const curX    = startX + idx * (CONFIG.animatedSize + CONFIG.animatedSpacing);
                const nextTag = `[v_anim${idx}]`;
                if (CONFIG.useChromaKey) {
                  filters.push(`[${inputIdx}:v]chromakey=${CONFIG.chromaKeyColor}:${CONFIG.chromaSimilarity}:${CONFIG.chromaBlend}[chroma${idx}]`);
                  filters.push(`[chroma${idx}]scale=${CONFIG.animatedSize}:${CONFIG.animatedSize}[scaled_anim${idx}]`);
                } else {
                  filters.push(`[${inputIdx}:v]scale=${CONFIG.animatedSize}:${CONFIG.animatedSize}[scaled_anim${idx}]`);
                }
                filters.push(`${lastTag}[scaled_anim${idx}]overlay=${curX}:${animY}${nextTag}`);
                lastTag = nextTag;
              });
            }

            // ── Icon Overlays ─────────────────────────────────────────────────
            if (selectedIcons.length > 0) {
              const totalW = selectedIcons.length * CONFIG.iconSize
                           + (selectedIcons.length - 1) * CONFIG.iconSpacing;
              let startX;
              if      (CONFIG.iconAlign === 'left')  startX = CONFIG.iconSideMargin;
              else if (CONFIG.iconAlign === 'right') startX = w - totalW - CONFIG.iconSideMargin;
              else                                   startX = (w - totalW) / 2;
              const iconY       = h - CONFIG.iconMarginBottom - CONFIG.iconSize;
              const animCount   = selectedAnimated.length;

              selectedIcons.forEach((_, idx) => {
                const inputIdx = animCount + 1 + idx;
                const curX    = startX + idx * (CONFIG.iconSize + CONFIG.iconSpacing);
                const nextTag = `[v_ic${idx}]`;
                filters.push(`[${inputIdx}:v]scale=${CONFIG.iconSize}:${CONFIG.iconSize}[scaled_ic${idx}]`);
                filters.push(`${lastTag}[scaled_ic${idx}]overlay=${curX}:${iconY}${nextTag}`);
                lastTag = nextTag;
              });
            }

            const audioIdx  = selectedAnimated.length + selectedIcons.length + 1;
            const audioArgs = audio
              ? `-c:a ${CONFIG.audioCodec} -b:a ${CONFIG.audioBitrate} -af "volume=${CONFIG.audioVolume}" -shortest`
              : '';

            const cmd = [
              `ffmpeg`,
              inputs.join(' '),
              `-filter_complex "${filters.join(';')}"`,
              `-map "${lastTag}"`,
              audio ? `-map ${audioIdx}:a` : '',
              `-t ${CONFIG.videoDuration}`,
              `-c:v ${CONFIG.videoCodec} -preset ${CONFIG.videoPreset} -crf ${CONFIG.videoCRF}`,
              `-pix_fmt yuv420p`,
              audioArgs,
              `-y "${escapePath(outputFile)}"`,
            ].filter(Boolean).join(' ');

            execSync(cmd, { stdio: 'inherit' });

            if (CONFIG.deleteTempFiles) {
              tempFiles.forEach(f => { try { if (fs.existsSync(f)) fs.unlinkSync(f); } catch {} });
              tempFiles = [];
            }

            console.log('SUCCESS: ' + path.basename(outputFile));
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'filename=' + path.basename(outputFile) + '\n');
            }
          }

          generateVideo().catch(err => { console.error(err); process.exit(1); });
          EOF

          node "$TEMP_JS"
          rm -f "$TEMP_JS"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "${{ env.OUTPUT_FOLDER }}/"
          git diff --staged --quiet || (git commit -m "Add video: ${{ github.event.inputs.title }}" && git push)
