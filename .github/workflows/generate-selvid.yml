name: Generate English-Kinyarwanda Video

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Video title'
        required: true
        type: string
      content:
        description: 'Lines as: line1: text, line2: text, ...'
        required: true
        type: string

# ── ALL PATH / REPO CONFIG DECLARED HERE ─────────────────────────────────────
env:
  GITHUB_USERNAME:  prymevid
  GITHUB_REPO:      script
  GITHUB_BRANCH:    main

  # Resource paths
  FONT_REGULAR:     englishkinyarwanda/fonts/mineig.ttf
  FONT_BOLD:        englishkinyarwanda/fonts/rob.ttf
  INPUT_IMAGE:      englishkinyarwanda/imageorvideo/input.png
  AUDIO_FOLDER:     englishkinyarwanda/audio
  OUTPUT_FOLDER:    englishkinyarwanda/output
  TEMP_FOLDER:      englishkinyarwanda/output/temp
  ICON_FOLDER:      englishkinyarwanda/icons/
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Generate video
        env:
          INPUT_TITLE:   ${{ github.event.inputs.title }}
          INPUT_CONTENT: ${{ github.event.inputs.content }}
        run: |
          TEMP_JS="temp_$(date +%s)_$RANDOM.js"

          cat > "$TEMP_JS" << 'EOF'
          const fs   = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          // ── CONFIGURATION ──────────────────────────────────────────────────────
          const CONFIG = {
            // Icon Overlay Configuration
            useIcons:             true,        // true = on, false = off
            iconAlign:            'left',    // Options: 'left', 'middle', 'right'
            iconCount:            3,           // Number of icons to use
            iconSize:             120,         // Width and Height (square)
            iconSpacing:          25,          // Horizontal space between icons
            iconMarginBottom:     70,          // Distance from the bottom edge
            iconSideMargin:       50,          // Horizontal margin for 'left' or 'right' alignment
            iconFolder:           process.env.ICON_FOLDER || 'englishkinyarwanda/icons/',

            inputImage:           process.env.INPUT_IMAGE   || 'englishkinyarwanda/imageorvideo/input.png',
            audioFolder:          process.env.AUDIO_FOLDER  || 'englishkinyarwanda/audio',
            outputFolder:         process.env.OUTPUT_FOLDER || 'englishkinyarwanda/output',
            tempFolder:           process.env.TEMP_FOLDER   || 'englishkinyarwanda/output/temp',
            fontFileRegular:      process.env.FONT_REGULAR  || 'englishkinyarwanda/fonts/mineig.ttf',
            fontFileBold:         process.env.FONT_BOLD     || 'englishkinyarwanda/fonts/rob.ttf',

            videoDuration:        6,
            resolution:           '720x1280',
            videoCodec:           'libx264',
            videoPreset:          'medium',
            videoCRF:             23,
            fps:                  25,
            useRandomAudio:       true,
            audioCodec:           'aac',
            audioBitrate:         '128k',
            audioVolume:          '1.0',

            altEnglishWeight:    'regular',
            altKinyarwandaWeight:'bold',
            altKinyarwandaIndent:'    ',

            fontColor:            '#2b2821',
            titleOpacity:         '1',
            dateOpacity:          '0.95',
            englishOpacity:       '0.75',
            kinyarwandaOpacity:   '1',
            headerFontSize:       42,
            contentFontSize:      35,
            lineSpacing:          53.6,
            headerYPosition:      120,
            contentStartY:        215,
            leftColumnX:          90,
            rightColumnX:         300,
            dateXOffset:          80,
            showTitle:            true,
            maxLines:             16,
            deleteTempFiles:      true
          };

          // ── PARSE INPUTS ──────────────────────────────────────────────────────
          const INPUT_TITLE   = process.env.INPUT_TITLE   || '';
          const INPUT_CONTENT = process.env.INPUT_CONTENT || '';

          if (!INPUT_TITLE)   throw new Error('No title provided');
          if (!INPUT_CONTENT) throw new Error('No content provided');

          const lineMap = {};
          const parts = INPUT_CONTENT.split(/,\s*(?=line\d+\s*:)/i);
          parts.forEach(part => {
            const m = part.match(/^line(\d+)\s*:\s*(.+)$/i);
            if (m) lineMap['line' + m[1]] = m[2].trim();
          });

          const video = { title: INPUT_TITLE, ...lineMap };

          // ── HELPERS ───────────────────────────────────────────────────────────
          [CONFIG.outputFolder, CONFIG.tempFolder].forEach(p => {
            if (!fs.existsSync(p)) fs.mkdirSync(p, { recursive: true });
          });

          let tempFiles = [];

          function createTempTextFile(content, prefix) {
            const f = path.join(CONFIG.tempFolder, prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(7) + '.txt');
            fs.writeFileSync(f, content, 'utf8');
            tempFiles.push(f);
            return f;
          }

          function escapePath(p) {
            return p.replace(/\\/g, '/').replace(/ /g, '\\ ');
          }

          function getValidFont(pref) {
            if (fs.existsSync(pref)) return pref;
            throw new Error('Font not found: ' + pref);
          }

          function getRandomAudio() {
            if (!fs.existsSync(CONFIG.audioFolder)) return null;
            const files = fs.readdirSync(CONFIG.audioFolder).filter(f => /\.(mp3|wav|m4a|aac)$/.test(f));
            return files.length ? path.join(CONFIG.audioFolder, files[Math.floor(Math.random() * files.length)]) : null;
          }

          function getRandomIcons(count) {
            if (!fs.existsSync(CONFIG.iconFolder)) return [];
            const files = fs.readdirSync(CONFIG.iconFolder)
              .filter(f => /\.(png|jpg|jpeg)$/i.test(f))
              .filter(f => !CONFIG.inputImage.includes(f));
            
            if (files.length === 0) return [];
            const shuffled = files.sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count).map(f => path.join(CONFIG.iconFolder, f));
          }

          const formatEnglishStandard = (t) => {
            if (!t) return '';
            let text = t.trim().charAt(0).toUpperCase() + t.trim().slice(1);
            return text.endsWith('.') ? text : text + '.';
          };

          const formatKinyarwanda = (t) => t ? t.trim().charAt(0).toUpperCase() + t.trim().slice(1) : '';

          function parseLineWithSeparator(line) {
            if (!line || line.trim() === '') return { english: '', kinyarwanda: '' };
            for (const sep of [' - ', ' — ', '-', '|']) {
              if (line.includes(sep)) {
                const partsArr = line.split(sep);
                return {
                  english:     formatEnglishStandard(partsArr[0]),
                  kinyarwanda: formatKinyarwanda(partsArr.slice(1).join(sep))
                };
              }
            }
            return null;
          }

          // ── BUILD & RUN FFMPEG ────────────────────────────────────────────────
          function generateVideo() {
            const fontReg  = escapePath(getValidFont(CONFIG.fontFileRegular));
            const fontBold = escapePath(getValidFont(CONFIG.fontFileBold));
            const fontMap  = { regular: fontReg, bold: fontBold };
            const [w, h]   = CONFIG.resolution.split('x').map(Number);
            const audio    = CONFIG.useRandomAudio ? getRandomAudio() : null;
            const selectedIcons = CONFIG.useIcons ? getRandomIcons(CONFIG.iconCount) : [];

            const safeTitle  = video.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const timestamp  = Date.now();
            const outputFile = path.join(CONFIG.outputFolder, safeTitle + '_' + timestamp + '.mp4');

            let inputs = [`-loop 1 -framerate ${CONFIG.fps} -i "${escapePath(CONFIG.inputImage)}"`];
            selectedIcons.forEach(iconPath => {
              inputs.push(`-i "${escapePath(iconPath)}"`);
            });
            if (audio) {
              inputs.push(`-i "${escapePath(audio)}"`);
            }

            let filters = [`[0:v]scale=${w}:${h}:force_original_aspect_ratio=increase,crop=${w}:${h}[bg]`];
            let lastFilterTag = '[bg]';
            let drawtextFilters = [];

            if (CONFIG.showTitle && video.title) {
              const titleFile = escapePath(createTempTextFile(video.title, 't'));
              drawtextFilters.push(`drawtext=fontfile='${fontBold}':textfile='${titleFile}':fontcolor=${CONFIG.fontColor}@${CONFIG.titleOpacity}:fontsize=${CONFIG.headerFontSize}:x=${CONFIG.leftColumnX}:y=${CONFIG.headerYPosition}`);

              const d = new Date();
              const dStr = (d.getMonth() + 1) + '-' + d.getDate() + '-' + d.getFullYear().toString().slice(-2);
              const dateFile = escapePath(createTempTextFile(dStr, 'd'));
              drawtextFilters.push(`drawtext=fontfile='${fontReg}':textfile='${dateFile}':fontcolor=${CONFIG.fontColor}@${CONFIG.dateOpacity}:fontsize=${CONFIG.headerFontSize - 4}:x=(w-text_w-${CONFIG.dateXOffset}):y=${CONFIG.headerYPosition}`);
            }

            let row = 0;
            let engCounter = 1;
            for (let i = 1; i <= CONFIG.maxLines; i++) {
              const line = video['line' + i];
              const y    = CONFIG.contentStartY + (row * CONFIG.lineSpacing);
              if (!line || line.trim() === '') {
                if (line !== undefined) row++;
                continue;
              }
              const sepParsed = parseLineWithSeparator(line);
              if (sepParsed) {
                if (sepParsed.english) {
                  const ef = escapePath(createTempTextFile(sepParsed.english, 'e'));
                  drawtextFilters.push(`drawtext=fontfile='${fontReg}':textfile='${ef}':fontcolor=${CONFIG.fontColor}@${CONFIG.englishOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                }
                if (sepParsed.kinyarwanda) {
                  const kf = escapePath(createTempTextFile(sepParsed.kinyarwanda, 'k'));
                  drawtextFilters.push(`drawtext=fontfile='${fontBold}':textfile='${kf}':fontcolor=${CONFIG.fontColor}@${CONFIG.kinyarwandaOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.rightColumnX}:y=${y}`);
                }
              } else {
                if (i % 2 !== 0) {
                  const text = engCounter + '. ' + formatEnglishStandard(line);
                  const ef = escapePath(createTempTextFile(text, 'e'));
                  drawtextFilters.push(`drawtext=fontfile='${fontMap[CONFIG.altEnglishWeight]}':textfile='${ef}':fontcolor=${CONFIG.fontColor}@${CONFIG.englishOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                  engCounter++;
                } else {
                  const text = CONFIG.altKinyarwandaIndent + formatKinyarwanda(line);
                  const kf = escapePath(createTempTextFile(text, 'k'));
                  drawtextFilters.push(`drawtext=fontfile='${fontMap[CONFIG.altKinyarwandaWeight]}':textfile='${kf}':fontcolor=${CONFIG.fontColor}@${CONFIG.kinyarwandaOpacity}:fontsize=${CONFIG.contentFontSize}:x=${CONFIG.leftColumnX}:y=${y}`);
                }
              }
              row++;
            }
            
            filters.push(`[bg]${drawtextFilters.join(',')}[vtext]`);
            lastFilterTag = '[vtext]';

            if (selectedIcons.length > 0) {
              const totalIconsWidth = (selectedIcons.length * CONFIG.iconSize) + ((selectedIcons.length - 1) * CONFIG.iconSpacing);
              let startX;
              
              if (CONFIG.iconAlign === 'left') {
                startX = CONFIG.iconSideMargin;
              } else if (CONFIG.iconAlign === 'right') {
                startX = w - totalIconsWidth - CONFIG.iconSideMargin;
              } else {
                startX = (w - totalIconsWidth) / 2;
              }

              let iconY = h - CONFIG.iconMarginBottom - CONFIG.iconSize;

              selectedIcons.forEach((_, idx) => {
                const inputIdx = idx + 1;
                const currentIconX = startX + (idx * (CONFIG.iconSize + CONFIG.iconSpacing));
                const nextTag = `[v_ic${inputIdx}]`;
                
                filters.push(`[${inputIdx}:v]scale=${CONFIG.iconSize}:${CONFIG.iconSize}[scaled${inputIdx}]`);
                filters.push(`${lastFilterTag}[scaled${inputIdx}]overlay=${currentIconX}:${iconY}${nextTag}`);
                
                lastFilterTag = nextTag;
              });
            }

            const audioIdx = selectedIcons.length + 1;
            const audioArgs = audio ? `-c:a ${CONFIG.audioCodec} -b:a ${CONFIG.audioBitrate} -af "volume=${CONFIG.audioVolume}" -shortest` : '';

            const cmd = `ffmpeg ${inputs.join(' ')} -filter_complex "${filters.join(';')}" -map "${lastFilterTag}" ${audio ? `-map ${audioIdx}:a` : ''} -t ${CONFIG.videoDuration} -c:v ${CONFIG.videoCodec} -preset ${CONFIG.videoPreset} -crf ${CONFIG.videoCRF} -pix_fmt yuv420p -y "${escapePath(outputFile)}"`;

            console.log('Running FFmpeg...');
            execSync(cmd, { stdio: 'inherit' });

            if (CONFIG.deleteTempFiles) {
              tempFiles.forEach(f => { try { if (fs.existsSync(f)) fs.unlinkSync(f); } catch {} });
              tempFiles = [];
            }

            console.log('SUCCESS: ' + path.basename(outputFile));
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'filename=' + path.basename(outputFile) + '\n');
            }
          }

          generateVideo();
          EOF

          node "$TEMP_JS"
          rm -f "$TEMP_JS"

      - name: Commit and push video
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "${{ env.OUTPUT_FOLDER }}/"
          git diff --staged --quiet || (git commit -m "Add video: ${{ github.event.inputs.title }}" && git push)
