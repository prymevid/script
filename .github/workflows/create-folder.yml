---
- name: Create folder with .keep file
  hosts: localhost
  vars:
    folder_path: "/path/to/your/folder"  # Change this to your desired location
  
  tasks:
    - name: Create directory
      ansible.builtin.file:
        path: "{{ folder_path }}"
        state: directory
        mode: '0755'
    
    - name: Create .keep file
      ansible.builtin.file:
        path: "{{ folder_path }}/.keep"
        state: touch
        mode: '0644'