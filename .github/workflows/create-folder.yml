---
- name: Create font folder with .keep file
  hosts: localhost
  vars:
    folder_path: "./font"  # Creates 'font' folder in the current directory
  
  tasks:
    - name: Create font directory
      ansible.builtin.file:
        path: "{{ folder_path }}"
        state: directory
        mode: '0755'
    
    - name: Create .keep file in font folder
      ansible.builtin.file:
        path: "{{ folder_path }}/.keep"
        state: touch
        mode: '0644'